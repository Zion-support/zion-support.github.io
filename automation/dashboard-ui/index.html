<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PM2 Automation Dashboard</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.15);
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }

        .stat-label {
            font-size: 1rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-online { color: #10b981; }
        .status-stopped { color: #ef4444; }
        .status-error { color: #f59e0b; }

        .main-content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }

        .processes-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f3f4f6;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #374151;
        }

        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.3s ease;
        }

        .refresh-btn:hover {
            background: #5a67d8;
        }

        .processes-list {
            max-height: 600px;
            overflow-y: auto;
        }

        .process-item {
            display: grid;
            grid-template-columns: 1fr auto auto auto auto auto;
            gap: 15px;
            align-items: center;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            background: #f9fafb;
            border-left: 4px solid #e5e7eb;
            transition: all 0.3s ease;
        }

        .process-item:hover {
            background: #f3f4f6;
            transform: translateX(5px);
        }

        .process-item.online {
            border-left-color: #10b981;
            background: #f0fdf4;
        }

        .process-item.stopped {
            border-left-color: #ef4444;
            background: #fef2f2;
        }

        .process-item.error {
            border-left-color: #f59e0b;
            background: #fffbeb;
        }

        .process-name {
            font-weight: 600;
            color: #374151;
        }

        .process-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            text-transform: uppercase;
        }

        .process-status.online {
            background: #d1fae5;
            color: #065f46;
        }

        .process-status.stopped {
            background: #fee2e2;
            color: #991b1b;
        }

        .process-status.error {
            background: #fef3c7;
            color: #92400e;
        }

        .process-memory, .process-cpu, .process-uptime {
            text-align: center;
            font-size: 0.9rem;
            color: #6b7280;
        }

        .process-actions {
            display: flex;
            gap: 5px;
        }

        .action-btn {
            padding: 4px 8px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }

        .action-btn.restart {
            background: #f59e0b;
            color: white;
        }

        .action-btn.stop {
            background: #ef4444;
            color: white;
        }

        .action-btn.start {
            background: #10b981;
            color: white;
        }

        .action-btn:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        .alerts-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
        }

        .alerts-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .alert-item {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 4px solid;
            background: #f9fafb;
        }

        .alert-item.warning {
            border-left-color: #f59e0b;
            background: #fffbeb;
        }

        .alert-item.error {
            border-left-color: #ef4444;
            background: #fef2f2;
        }

        .alert-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .alert-type {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            padding: 2px 8px;
            border-radius: 12px;
        }

        .alert-type.warning {
            background: #fef3c7;
            color: #92400e;
        }

        .alert-type.error {
            background: #fee2e2;
            color: #991b1b;
        }

        .alert-time {
            font-size: 0.8rem;
            color: #6b7280;
        }

        .alert-message {
            font-size: 0.9rem;
            color: #374151;
            line-height: 1.4;
        }

        .chart-section {
            grid-column: 1 / -1;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            margin-top: 30px;
        }

        .chart-container {
            height: 300px;
            position: relative;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #6b7280;
        }

        .error {
            background: #fef2f2;
            color: #991b1b;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            border-left: 4px solid #ef4444;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .process-item {
                grid-template-columns: 1fr;
                gap: 10px;
                text-align: center;
            }
            
            .process-actions {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 PM2 Automation Dashboard</h1>
            <p>Real-time monitoring and management of automation processes</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="totalProcesses">-</div>
                <div class="stat-label">Total Processes</div>
            </div>
            <div class="stat-card">
                <div class="stat-number status-online" id="onlineProcesses">-</div>
                <div class="stat-label">Online</div>
            </div>
            <div class="stat-card">
                <div class="stat-number status-stopped" id="stoppedProcesses">-</div>
                <div class="stat-label">Stopped</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalMemory">-</div>
                <div class="stat-label">Total Memory (MB)</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalCPU">-</div>
                <div class="stat-label">Total CPU (%)</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="alertsCount">-</div>
                <div class="stat-label">Active Alerts</div>
            </div>
        </div>

        <div class="main-content">
            <div class="processes-section">
                <div class="section-header">
                    <h2 class="section-title">Process Status</h2>
                    <button class="refresh-btn" onclick="refreshData()">🔄 Refresh</button>
                </div>
                <div class="processes-list" id="processesList">
                    <div class="loading">Loading processes...</div>
                </div>
            </div>

            <div class="alerts-section">
                <div class="section-header">
                    <h2 class="section-title">Active Alerts</h2>
                </div>
                <div class="alerts-list" id="alertsList">
                    <div class="loading">No alerts at the moment</div>
                </div>
            </div>
        </div>

        <div class="chart-section">
            <div class="section-header">
                <h2 class="section-title">Performance Metrics</h2>
            </div>
            <div class="chart-container">
                <canvas id="performanceChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        // Initialize Socket.IO connection
        const socket = io();
        
        // Chart instance
        let performanceChart;
        
        // Data storage
        let processesData = [];
        let metricsData = [];
        let alertsData = [];

        // Initialize dashboard
        document.addEventListener('DOMContentLoaded', function() {
            initializeChart();
            setupSocketListeners();
        });

        function setupSocketListeners() {
            socket.on('processes', function(processes) {
                processesData = processes;
                updateProcessesList();
                updateStats();
            });

            socket.on('metrics', function(metrics) {
                metricsData = metrics;
                updateStats();
                updateChart();
            });

            socket.on('alerts', function(alerts) {
                alertsData = alerts;
                updateAlertsList();
                updateStats();
            });
        }

        function updateStats() {
            if (metricsData) {
                document.getElementById('totalProcesses').textContent = metricsData.totalProcesses || 0;
                document.getElementById('onlineProcesses').textContent = metricsData.onlineProcesses || 0;
                document.getElementById('stoppedProcesses').textContent = metricsData.stoppedProcesses || 0;
                document.getElementById('totalMemory').textContent = Math.round((metricsData.totalMemory || 0) / 1024 / 1024);
                document.getElementById('totalCPU').textContent = Math.round((metricsData.totalCPU || 0) * 100) / 100;
            }
            
            document.getElementById('alertsCount').textContent = alertsData.length || 0;
        }

        function updateProcessesList() {
            const container = document.getElementById('processesList');
            
            if (!processesData || processesData.length === 0) {
                container.innerHTML = '<div class="loading">No processes found</div>';
                return;
            }

            container.innerHTML = processesData.map(process => `
                <div class="process-item ${process.status}">
                    <div class="process-name">${process.name}</div>
                    <div class="process-status ${process.status}">${process.status}</div>
                    <div class="process-memory">${Math.round(process.memory / 1024 / 1024)}MB</div>
                    <div class="process-cpu">${process.cpu}%</div>
                    <div class="process-uptime">${formatUptime(process.uptime)}</div>
                    <div class="process-actions">
                        ${process.status === 'online' ? 
                            `<button class="action-btn restart" onclick="restartProcess('${process.name}')">Restart</button>
                             <button class="action-btn stop" onclick="stopProcess('${process.name}')">Stop</button>` :
                            `<button class="action-btn start" onclick="startProcess('${process.name}')">Start</button>`
                        }
                    </div>
                </div>
            `).join('');
        }

        function updateAlertsList() {
            const container = document.getElementById('alertsList');
            
            if (!alertsData || alertsData.length === 0) {
                container.innerHTML = '<div class="loading">No alerts at the moment</div>';
                return;
            }

            container.innerHTML = alertsData.map(alert => `
                <div class="alert-item ${alert.type}">
                    <div class="alert-header">
                        <span class="alert-type ${alert.type}">${alert.type}</span>
                        <span class="alert-time">${formatTime(alert.timestamp)}</span>
                    </div>
                    <div class="alert-message">${alert.message}</div>
                </div>
            `).join('');
        }

        function initializeChart() {
            const ctx = document.getElementById('performanceChart').getContext('2d');
            performanceChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Memory Usage (MB)',
                        data: [],
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        tension: 0.4
                    }, {
                        label: 'CPU Usage (%)',
                        data: [],
                        borderColor: '#10b981',
                        backgroundColor: 'rgba(16, 185, 129, 0.1)',
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'top',
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
        }

        function updateChart() {
            if (!performanceChart || !metricsData) return;

            const now = new Date().toLocaleTimeString();
            
            // Add new data point
            performanceChart.data.labels.push(now);
            performanceChart.data.datasets[0].data.push(Math.round((metricsData.totalMemory || 0) / 1024 / 1024));
            performanceChart.data.datasets[1].data.push(Math.round((metricsData.totalCPU || 0) * 100) / 100);

            // Keep only last 20 data points
            if (performanceChart.data.labels.length > 20) {
                performanceChart.data.labels.shift();
                performanceChart.data.datasets[0].data.shift();
                performanceChart.data.datasets[1].data.shift();
            }

            performanceChart.update();
        }

        function formatUptime(uptime) {
            if (!uptime) return 'N/A';
            
            const hours = Math.floor(uptime / 3600000);
            const minutes = Math.floor((uptime % 3600000) / 60000);
            
            if (hours > 0) {
                return `${hours}h ${minutes}m`;
            }
            return `${minutes}m`;
        }

        function formatTime(timestamp) {
            return new Date(timestamp).toLocaleTimeString();
        }

        function refreshData() {
            fetch('/api/processes')
                .then(response => response.json())
                .then(data => {
                    processesData = data;
                    updateProcessesList();
                })
                .catch(error => {
                    console.error('Error refreshing data:', error);
                });
        }

        async function restartProcess(name) {
            try {
                const response = await fetch(`/api/processes/${name}/restart`, { method: 'POST' });
                const result = await response.json();
                
                if (response.ok) {
                    alert(`Process ${name} restarted successfully`);
                    refreshData();
                } else {
                    alert(`Error restarting process: ${result.error}`);
                }
            } catch (error) {
                alert(`Error restarting process: ${error.message}`);
            }
        }

        async function stopProcess(name) {
            try {
                const response = await fetch(`/api/processes/${name}/stop`, { method: 'POST' });
                const result = await response.json();
                
                if (response.ok) {
                    alert(`Process ${name} stopped successfully`);
                    refreshData();
                } else {
                    alert(`Error stopping process: ${result.error}`);
                }
            } catch (error) {
                alert(`Error stopping process: ${error.message}`);
            }
        }

        async function startProcess(name) {
            try {
                const response = await fetch(`/api/processes/${name}/start`, { method: 'POST' });
                const result = await response.json();
                
                if (response.ok) {
                    alert(`Process ${name} started successfully`);
                    refreshData();
                } else {
                    alert(`Error starting process: ${result.error}`);
                }
            } catch (error) {
                alert(`Error starting process: ${error.message}`);
            }
        }

        // Auto-refresh every 30 seconds
        setInterval(refreshData, 30000);
    </script>
</body>
</html>
