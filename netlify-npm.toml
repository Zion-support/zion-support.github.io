[build]
  # Build command using npm instead of yarn
  command = "bash scripts/netlify-build-npm.sh"
  
  # Directory to publish
  publish = "dist"
  
  # Functions directory
  functions = "netlify/functions"

[build.environment]
  # Node.js version
  NODE_VERSION = "20"
  
  # Build environment
  NODE_OPTIONS = "--max-old-space-size=6144"
  NODE_ENV = "production"
  
  # NPM configuration - optimized for reliable builds
  NPM_CONFIG_LEGACY_PEER_DEPS = "true"
  NPM_CONFIG_INCLUDE = "dev"
  
  # Disable Next.js auto-detection since this is a Vite project
  NETLIFY_USE_NEXTJS = "false"
  
  # Additional build optimizations
  CI = "true"
  GENERATE_SOURCEMAP = "false"

# Cache configuration to prevent dependency issues
[build.cache]
  directories = ["node_modules/.cache"]

# Plugin configurations
[[plugins]]
  package = "netlify-plugin-cloudinary"

# Disable Next.js auto-detection since this is a Vite project
[build.processing]
  skip_processing = false

# Explicitly disable Next.js plugin
[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

# Static redirects for exported site
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache static assets
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache API routes
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"