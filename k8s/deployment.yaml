apiVersion: apps/v1
kind: Deployment
metadata:
  name: ziontechgroup-app
  namespace: ziontechgroup
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ziontechgroup-app
  template:
    metadata:
      labels:
        app: ziontechgroup-app
    spec:
      containers:
      - name: app
        image: ziontechgroup:latest
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: "production"
        - name: MONGODB_URI
          valueFrom:
            secretKeyRef:
              name: mongodb-secret
              key: uri
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5