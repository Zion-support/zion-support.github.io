apiVersion: apps/v1
kind: Deployment
metadata:
  name: zion-tech-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: zion-tech-app
  template:
    metadata:
      labels:
        app: zion-tech-app
    spec:
      containers:
      - name: app
        image: zion-tech-app:latest
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"