<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>{{ title }}</title>
	<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50">
	<header class="bg-white border-b">
		<div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-6 flex items-center justify-between">
			<h1 class="text-2xl md:text-3xl font-bold text-gray-900">{{ course.title }}</h1>
			<nav class="space-x-4">
				<a href="/courses" class="text-gray-700 hover:text-gray-900">All Courses</a>
				<a href="/" class="text-gray-700 hover:text-gray-900">Home</a>
			</nav>
		</div>
	</header>

	<main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
		<p class="text-gray-700 mb-6">{{ course.description }}</p>

		<section>
			<h3 class="text-xl font-semibold text-gray-900 mb-4">Lessons</h3>
			<ol class="space-y-3">
				{% for lesson in course.lessons.order_by('lesson_order') %}
				<li class="bg-white border rounded-lg p-4">
					<div class="flex items-start justify-between">
						<div>
							<p class="font-medium text-gray-900">{{ lesson.lesson_order }}. {{ lesson.title }}</p>
							<p class="text-sm text-gray-600">Type: {{ lesson.content_type }}</p>
						</div>
						<button class="px-3 py-1 text-sm bg-blue-600 text-white rounded">Start</button>
					</div>
				</li>
				{% else %}
				<li class="text-gray-600">No lessons yet.</li>
				{% endfor %}
			</ol>
		</section>
	</main>
</body>
</html>
