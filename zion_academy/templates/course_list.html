<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>{{ title }}</title>
	<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50">
	<header class="bg-white border-b">
		<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 flex items-center justify-between">
			<h1 class="text-2xl md:text-3xl font-bold text-gray-900">All Courses</h1>
			<nav class="space-x-4">
				<a href="/" class="text-gray-700 hover:text-gray-900">Home</a>
				<a href="/admin/dashboard" class="text-gray-700 hover:text-gray-900">Admin</a>
			</nav>
		</div>
	</header>

	<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
		<div class="grid grid-cols-1 md:grid-cols-3 gap-6">
			{% for course in courses %}
			<a href="/course/{{ course.id }}" class="block bg-white rounded-xl border hover:shadow-md transition">
				<div class="p-5">
					<h4 class="font-semibold text-gray-900 mb-1">{{ course.title }}</h4>
					<p class="text-sm text-gray-600 line-clamp-3">{{ course.description }}</p>
				</div>
			</a>
			{% else %}
			<p class="text-gray-600">No courses available yet. Try seeding the database.</p>
			{% endfor %}
		</div>
	</main>
</body>
</html>
