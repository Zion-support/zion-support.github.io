<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zion Tech Group | AI & IT Solutions</title>
    <meta name="description" content="Zion Tech Group - Autonomous AI solutions for modern businesses. Conversion Copilot, Incident Commander, and Growth Intelligence platforms.">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .container { max-width: 800px; padding: 2rem; }
        h1 { font-size: 3rem; margin-bottom: 1rem; background: linear-gradient(90deg, #00d9ff, #00ff88); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { font-size: 1.25rem; margin-bottom: 2rem; opacity: 0.9; }
        .cta { display: inline-block; padding: 1rem 2rem; background: linear-gradient(90deg, #00d9ff, #00ff88); color: #000; text-decoration: none; border-radius: 30px; font-weight: bold; transition: transform 0.3s; }
        .cta:hover { transform: scale(1.05); }
        .features { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-top: 3rem; }
        .feature { background: rgba(255,255,255,0.1); padding: 1.5rem; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Zion Tech Group</h1>
        <p>Autonomous AI Solutions for the Modern Enterprise</p>
        <a href="mailto:contact@ziontechgroup.com" class="cta">Get in Touch</a>
        <div class="features">
            <div class="feature">
                <h3>🤖 Autonomous Conversion Copilot</h3>
                <p>AI-powered lead conversion that works 24/7</p>
            </div>
            <div class="feature">
                <h3>⚡ Incident Commander</h3>
                <p>Real-time incident response and resolution</p>
            </div>
            <div class="feature">
                <h3>📊 Growth Intelligence</h3>
                <p>Predictive analytics for business growth</p>
            </div>
        </div>
    </div>
</body>
</html>
