<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#8b5cf6" />
    <meta name="description" content="Leading provider of AI-powered solutions, IT services, and digital transformation." />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Preconnect to external domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- DNS Prefetch -->
    <link rel="dns-prefetch" href="//fonts.googleapis.com" />
    <link rel="dns-prefetch" href="//fonts.gstatic.com" />
    
    <!-- Security Headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta http-equiv="X-XSS-Protection" content="1; mode=block" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
    
    <!-- Open Graph -->
    <meta property="og:title" content="Zion Tech Group - AI & IT Solutions" />
    <meta property="og:description" content="Leading provider of AI-powered solutions, IT services, and digital transformation." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ziontechgroup.com" />
    <meta property="og:image" content="https://ziontechgroup.com/og-image.jpg" />
    <meta property="og:site_name" content="Zion Tech Group" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Zion Tech Group - AI & IT Solutions" />
    <meta name="twitter:description" content="Leading provider of AI-powered solutions, IT services, and digital transformation." />
    <meta name="twitter:image" content="https://ziontechgroup.com/twitter-image.jpg" />
    
    <title>Zion Tech Group - AI & IT Solutions</title>
  </head>

    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
