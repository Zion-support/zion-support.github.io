<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#8b5cf6" />
    <meta
      name="description"
      content="Leading provider of AI-powered solutions, cybersecurity, and digital transformation services. Transform your business with cutting-edge technology."
    />
    <meta
      name="keywords"
      content="AI solutions, IT services, cybersecurity, cloud computing, digital transformation, technology services, Zion Tech Group"
    />
    <meta name="author" content="Zion Tech Group" />
    <meta name="robots" content="index, follow" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="format-detection" content="telephone=no,address=no,email=no" />
    <meta name="color-scheme" content="dark light" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://ziontechgroup.com" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ziontechgroup.com" />
    <meta property="og:title" content="Zion Tech Group - AI & IT Solutions" />
    <meta
      property="og:description"
      content="Leading provider of AI-powered solutions, cybersecurity, and digital transformation services."
    />
    <meta
      property="og:image"
      content="https://ziontechgroup.com/og-image.svg"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Zion Tech Group - AI and IT Solutions"
    />
    <meta property="og:site_name" content="Zion Tech Group" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://ziontechgroup.com" />
    <meta name="twitter:title" content="Zion Tech Group - AI & IT Solutions" />
    <meta
      name="twitter:description"
      content="Leading provider of AI-powered solutions, cybersecurity, and digital transformation services."
    />
    <meta
      name="twitter:image"
      content="https://ziontechgroup.com/og-image.svg"
    />
    <meta name="twitter:site" content="@ziontechgroup" />
    <meta name="twitter:creator" content="@ziontechgroup" />

    <!-- Preconnect to external domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- DNS prefetch for performance -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <!-- Critical CSS inline -->
    <style>
      /* Critical CSS for above-the-fold content */
      body {
        margin: 0;
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          "Roboto",
          "Oxygen",
          "Ubuntu",
          "Cantarell",
          sans-serif;
        background: linear-gradient(
          135deg,
          #0f172a 0%,
          #581c87 50%,
          #0f172a 100%
        );
        color: #ffffff;
        line-height: 1.6;
      }
      #root {
        min-height: 100vh;
      }
      .loading {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #0f172a, #581c87);
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid rgba(139, 92, 246, 0.3);
        border-top: 4px solid #8b5cf6;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      /* Accessibility improvements */
      @media (prefers-reduced-motion: reduce) {
        .spinner {
          animation: none;
        }
      }

      /* High contrast mode */
      @media (prefers-contrast: high) {
        body {
          background: #000000;
          color: #ffffff;
        }
      }

      /* Skip navigation link */
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .sr-only:focus {
        position: absolute;
        width: auto;
        height: auto;
        padding: 0.5rem 1rem;
        margin: 0;
        overflow: visible;
        clip: auto;
        white-space: normal;
        z-index: 1000;
      }
    </style>

    <!-- Web App Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="/images/icon-192x192.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/images/icon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/images/icon-16x16.png" />
    
    <!-- Favicon -->
    <link rel="shortcut icon" href="/favicon.ico" />
    
    <!-- React Scheduler Polyfill -->
    <script src="/scheduler-polyfill.js"></script>
  </head>
  <body>
    <!-- Skip Navigation Link for Accessibility -->
    <a
      href="#main-content"
      class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 bg-cyan-500 text-white px-4 py-2 rounded-lg z-50"
    >
      Skip to main content
    </a>

    <div id="root">
      <div class="loading">
        <div class="spinner"></div>
      </div>
    </div>
    <script type="module" src="/main.tsx"></script>
    
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('SW registered: ', registration);
            })
            .catch((registrationError) => {
              console.log('SW registration failed: ', registrationError);
            });
        });
      }
    </script>
  </body>
</html>
