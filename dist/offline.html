<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Zion Tech Group</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0A1024 0%, #141A3C 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        
        .offline-container {
            max-width: 500px;
            width: 100%;
        }
        
        .offline-icon {
            font-size: 4rem;
            margin-bottom: 2rem;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(45deg, #00FFFF, #A450FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            color: #94A3B8;
            line-height: 1.6;
        }
        
        .retry-button {
            background: linear-gradient(45deg, #00FFFF, #A450FF);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-right: 1rem;
        }
        
        .retry-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 255, 255, 0.3);
        }
        
        .offline-features {
            margin-top: 3rem;
            text-align: left;
        }
        
        .offline-features h3 {
            color: #00FFFF;
            margin-bottom: 1rem;
        }
        
        .offline-features ul {
            list-style: none;
            padding: 0;
        }
        
        .offline-features li {
            padding: 0.5rem 0;
            color: #94A3B8;
        }
        
        .offline-features li:before {
            content: "✓";
            color: #00FFFF;
            font-weight: bold;
            margin-right: 0.5rem;
        }
        
        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            background: #ff6b6b;
            border-radius: 50%;
            margin-right: 0.5rem;
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.3; }
        }
        
        .connection-status {
            margin-top: 2rem;
            padding: 1rem;
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid rgba(255, 107, 107, 0.3);
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">📡</div>
        <h1>You're Offline</h1>
        <p>It looks like you've lost your internet connection. Don't worry, we've got you covered!</p>
        
        <button class="retry-button" onclick="window.location.reload()">
            🔄 Try Again
        </button>
        
        <div class="offline-features">
            <h3>What you can still do:</h3>
            <ul>
                <li>View previously loaded pages</li>
                <li>Access cached content</li>
                <li>Use basic app features</li>
                <li>View your saved data</li>
            </ul>
        </div>
        
        <div class="connection-status">
            <span class="status-indicator"></span>
            <span>No internet connection detected</span>
        </div>
    </div>

    <script>
        // Check for internet connection
        function checkConnection() {
            if (navigator.onLine) {
                window.location.reload();
            }
        }
        
        // Listen for online event
        window.addEventListener('online', checkConnection);
        
        // Check connection every 5 seconds
        setInterval(checkConnection, 5000);
        
        // Show connection status
        function updateConnectionStatus() {
            const statusElement = document.querySelector('.connection-status span:last-child');
            const indicator = document.querySelector('.status-indicator');
            
            if (navigator.onLine) {
                statusElement.textContent = 'Internet connection restored!';
                indicator.style.background = '#00ff88';
                indicator.style.animation = 'none';
                
                // Reload after 2 seconds
                setTimeout(() => {
                    window.location.reload();
                }, 2000);
            } else {
                statusElement.textContent = 'No internet connection detected';
                indicator.style.background = '#ff6b6b';
                indicator.style.animation = 'blink 1s infinite';
            }
        }
        
        // Update status on load
        updateConnectionStatus();
        
        // Update status when connection changes
        window.addEventListener('online', updateConnectionStatus);
        window.addEventListener('offline', updateConnectionStatus);
    </script>
</body>
</html>
