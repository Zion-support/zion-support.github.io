name: Dependencies

on:
  schedule:
    - cron: '0 2 * * 1' # Weekly on Monday at 2 AM UTC
  workflow_dispatch: {}
  push:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dependencies:
    name: Update Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Check for outdated packages
        id: outdated
        run: |
          npm outdated --json > outdated.json || echo '{}' > outdated.json
          echo "outdated=$(cat outdated.json)" >> $GITHUB_OUTPUT
          
      - name: Update dependencies
        if: steps.outdated.outputs.outdated != '{}'
        run: |
          npm update
          npm audit fix --force
          
      - name: Create Pull Request
        if: steps.outdated.outputs.outdated != '{}'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update dependencies'
          title: '🔄 Update Dependencies'
          body: |
            ## Dependency Updates
            
            This PR updates outdated dependencies to their latest versions.
            
            ### Changes Made:
            - Updated npm packages to latest versions
            - Applied security fixes where possible
            
            ### Testing:
            - [ ] Build passes
            - [ ] Tests pass
            - [ ] No breaking changes
            
            Auto-generated by GitHub Actions.
          branch: dependency-updates
          delete-branch: true
          labels: dependencies, automated