name: Dependency Management
on:
  schedule:
    - cron: '0 4 * * *' # Run daily at 4 AM UTC
  workflow_dispatch:
    inputs:
      update_type:
        description: 'Type of dependency update'
        required: true
        default: 'security'
        type: choice
        options:
        - security
        - minor
        - major
        - all
      auto_merge:
        description: 'Auto-merge PRs'
        required: false
        default: false
        type: boolean
env:
  NODE_VERSION: '20.18.1'
jobs:
  check-dependencies:
    name: Check Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: package-lock.json
    - name: Install dependencies
      run: npm ci --prefer-offline --no-audit
    - name: Check npm outdated
      id: outdated_check
      run: |
        echo "📦 Checking for outdated packages..."
        npm outdated --json > outdated.json || echo "{}" > outdated.json
        OUTDATED_COUNT=$(jq 'length' outdated.json)
        echo "outdated_count=$OUTDATED_COUNT" >> $GITHUB_OUTPUT
        if [ "$OUTDATED_COUNT" -gt 0 ]; then
          echo "Found $OUTDATED_COUNT outdated packages"
          cat outdated.json
        else
          echo "✅ All packages are up to date"
        fi
    - name: Check security vulnerabilities
      id: security_check
      run: |
        echo "🔒 Checking for security vulnerabilities..."
        npm audit --json > audit.json || echo "{}" > audit.json
        VULNERABILITIES=$(jq '.metadata.vulnerabilities.total // 0' audit.json)
        echo "vulnerabilities=$VULNERABILITIES" >> $GITHUB_OUTPUT
        if [ "$VULNERABILITIES" -gt 0 ]; then
          echo "⚠️ Found $VULNERABILITIES security vulnerabilities"
          cat audit.json
        else
          echo "✅ No security vulnerabilities found"
        fi
    - name: Upload dependency reports
      uses: actions/upload-artifact@v4
      with:
        name: dependency-reports
        path: |
          outdated.json
          audit.json
        retention-days: 7
  update-dependencies:
    name: Update Dependencies
    runs-on: ubuntu-latest
    needs: check-dependencies
    if: needs.check-dependencies.outputs.outdated_count > 0 || needs.check-dependencies.outputs.vulnerabilities > 0
    timeout-minutes: 20
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: package-lock.json
    - name: Install dependencies
      run: npm ci
    - name: Update packages
      run: |
        echo "🚀 Updating dependencies..."
        if [ "${{ github.event.inputs.update_type }}" == "security" ]; then
          npm audit fix --force || true
        elif [ "${{ github.event.inputs.update_type }}" == "minor" ]; then
          npx npm-check-updates -u --target minor
        elif [ "${{ github.event.inputs.update_type }}" == "major" ]; then
          npx npm-check-updates -u --target major
        else # all
          npx npm-check-updates -u
        fi
        npm install
    - name: Build project
      run: npm run build
    - name: Run tests
      run: |
        npm run lint
        npm run type-check
    - name: Create Pull Request
      id: create_pr
      uses: peter-evans/create-pull-request@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: "chore(deps): update dependencies (${{ github.event.inputs.update_type }})"
        title: "chore(deps): Automated dependency update (${{ github.event.inputs.update_type }})"
        body: |
          Automated dependency update triggered by ${{ github.event_name }}.
          
          - Update type: `${{ github.event.inputs.update_type }}`
          - Outdated packages found: `${{ needs.check-dependencies.outputs.outdated_count }}`
          - Security vulnerabilities found: `${{ needs.check-dependencies.outputs.vulnerabilities }}`
          
          Please review and merge.
        branch: automation/dependency-updates-${{ github.run_id }}
        delete-branch: true
        labels: |
          dependencies
          automation
          ${{ github.event.inputs.update_type == 'security' && 'security' || '' }}
    - name: Auto-merge PR
      id: auto-merge
      if: github.event.inputs.auto_merge == true && steps.create_pr.outputs.pull-request-number
      uses: peter-evans/enable-pull-request-automerge@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        pull-request-number: ${{ steps.create_pr.outputs.pull-request-number }}
        merge-method: squash
  notify-team:
    name: Notify Team
    runs-on: ubuntu-latest
    needs: [check-dependencies, update-dependencies]
    if: always()
    steps:
    - name: Dependency update summary
      run: |
        echo "📢 Dependency Update Summary"
        echo "=========================="
        echo "Update Type: ${{ github.event.inputs.update_type }}"
        echo "Outdated packages: ${{ needs.check-dependencies.outputs.outdated_count }}"
        echo "Security vulnerabilities: ${{ needs.check-dependencies.outputs.vulnerabilities }}"
        echo "PR Created: ${{ needs.update-dependencies.outputs.pull-request-number || 'N/A' }}"
        echo "Auto-merged: ${{ needs.auto-merge.result == 'success' }}"
        echo ""
        echo "Team has been notified of the dependency updates."