name: Dependency Management

on:
  schedule:
    # Run daily at 4 AM UTC
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      update_type:
        description: 'Type of dependency update'
        required: true
        default: 'security'
        type: choice
        options:
        - security
        - minor
        - major
        - all
      auto_merge:
        description: 'Auto-merge PRs'
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: '20.18.1'

jobs:
  # Check for outdated dependencies
  check-dependencies:
    name: Check Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: package-lock.json
    
    - name: Install dependencies
      run: npm ci --prefer-offline --no-audit
    
    - name: Check npm outdated
      id: outdated_check
      run: |
        echo "📦 Checking for outdated packages..."
        npm outdated --json > outdated.json || echo "{}" > outdated.json
        
        # Count outdated packages
        OUTDATED_COUNT=$(jq 'length' outdated.json)
        echo "outdated_count=$OUTDATED_COUNT" >> $GITHUB_OUTPUT
        
        if [ "$OUTDATED_COUNT" -gt 0 ]; then
          echo "Found $OUTDATED_COUNT outdated packages"
          cat outdated.json
        else
          echo "✅ All packages are up to date"
        fi
    
    - name: Check security vulnerabilities
      id: security_check
      run: |
        echo "🔒 Checking for security vulnerabilities..."
        npm audit --json > audit.json || echo "{}" > audit.json
        
        # Count vulnerabilities
        VULNERABILITIES=$(jq '.metadata.vulnerabilities.total // 0' audit.json)
        echo "vulnerabilities=$VULNERABILITIES" >> $GITHUB_OUTPUT
        
        if [ "$VULNERABILITIES" -gt 0 ]; then
          echo "⚠️ Found $VULNERABILITIES security vulnerabilities"
          cat audit.json
        else
          echo "✅ No security vulnerabilities found"
        fi
    
    - name: Upload dependency reports
      uses: actions/upload-artifact@v4
      with:
        name: dependency-reports
        path: |
          outdated.json
          audit.json
        retention-days: 7

  # Update dependencies
  update-dependencies:
    name: Update Dependencies
    runs-on: ubuntu-latest
    needs: check-dependencies
    if: needs.check-dependencies.outputs.outdated_count > 0 || needs.check-dependencies.outputs.vulnerabilities > 0
    timeout-minutes: 20
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Download dependency reports
      uses: actions/download-artifact@v4
      with:
        name: dependency-reports
        path: ./
    
    - name: Update security patches
      if: needs.check-dependencies.outputs.vulnerabilities > 0
      run: |
        echo "🔒 Updating security patches..."
        npm audit fix --force || echo "Security updates completed"
    
    - name: Update minor versions
      if: github.event.inputs.update_type == 'minor' || github.event.inputs.update_type == 'all'
      run: |
        echo "🔄 Updating minor versions..."
        npm update || echo "Minor updates completed"
    
    - name: Update major versions
      if: github.event.inputs.update_type == 'major' || github.event.inputs.update_type == 'all'
      run: |
        echo "🚀 Updating major versions..."
        npx npm-check-updates -u || echo "Major updates completed"
    
    - name: Install updated dependencies
      run: |
        echo "📦 Installing updated dependencies..."
        npm install
    
    - name: Run linting after update
      run: |
        echo "🔍 Running linting after dependency update..."
        npm run lint || echo "Linting completed with warnings"
    
    - name: Run type checking after update
      run: |
        echo "🔍 Running type checking after dependency update..."
        npm run type-check || echo "Type checking completed with warnings"
    
    - name: Build after update
      run: |
        echo "🏗️ Building after dependency update..."
        npm run build || echo "Build completed with warnings"
    
    - name: Check for breaking changes
      run: |
        echo "⚠️ Checking for breaking changes..."
        # Add breaking change detection logic here
        echo "Breaking change check completed"

  # Create update PR
  create-update-pr:
    name: Create Update PR
    runs-on: ubuntu-latest
    needs: [check-dependencies, update-dependencies]
    if: always() && (needs.check-dependencies.outputs.outdated_count > 0 || needs.check-dependencies.outputs.vulnerabilities > 0)
    timeout-minutes: 10
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Download dependency reports
      uses: actions/download-artifact@v4
      with:
        name: dependency-reports
        path: ./
    
    - name: Generate update summary
      id: update_summary
      run: |
        echo "📋 Generating update summary..."
        
        # Read dependency reports
        if [ -f "outdated.json" ]; then
          OUTDATED_COUNT=$(jq 'length' outdated.json)
        else
          OUTDATED_COUNT=0
        fi
        
        if [ -f "audit.json" ]; then
          VULNERABILITIES=$(jq '.metadata.vulnerabilities.total // 0' audit.json)
        else
          VULNERABILITIES=0
        fi
        
        UPDATE_TYPE="${{ github.event.inputs.update_type }}"
        
        SUMMARY="## 🔄 Dependency Update Summary
        
        ### 📦 Update Type
        **$UPDATE_TYPE** update
        
        ### 📊 Statistics
        - **Outdated Packages**: $OUTDATED_COUNT
        - **Security Vulnerabilities**: $VULNERABILITIES
        
        ### 🔒 Security Updates
        "
        
        if [ "$VULNERABILITIES" -gt 0 ]; then
          SUMMARY="$SUMMARY
          - Security patches applied
          - Vulnerabilities addressed
          "
        fi
        
        SUMMARY="$SUMMARY
        ### 📈 Version Updates
        "
        
        if [ "$UPDATE_TYPE" == "minor" ] || [ "$UPDATE_TYPE" == "all" ]; then
          SUMMARY="$SUMMARY
          - Minor version updates
          - Bug fixes and improvements
          "
        fi
        
        if [ "$UPDATE_TYPE" == "major" ] || [ "$UPDATE_TYPE" == "all" ]; then
          SUMMARY="$SUMMARY
          - Major version updates
          - New features and capabilities
          "
        fi
        
        SUMMARY="$SUMMARY
        
        ### 🧪 Testing
        - [ ] Linting passes
        - [ ] Type checking passes
        - [ ] Build successful
        - [ ] No breaking changes
        
        ### 📋 Review Checklist
        - [ ] Code review completed
        - [ ] Security review completed
        - [ ] Performance impact assessed
        - [ ] Breaking changes documented
        
        ---
        *This PR was automatically generated by GitHub Actions*"
        
        echo "summary<<EOF" >> $GITHUB_OUTPUT
        echo "$SUMMARY" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
    
    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        title: '🔄 Dependency Updates - ${{ github.event.inputs.update_type }}'
        body: ${{ steps.update_summary.outputs.summary }}
        branch: dependency-updates-${{ github.run_id }}
        delete-branch: true
        commit-message: 'chore: update dependencies'
        labels: |
          dependencies
          automated
          ${{ github.event.inputs.update_type }}-update

  # Auto-merge PRs (if enabled)
  auto-merge:
    name: Auto-Merge PRs
    runs-on: ubuntu-latest
    needs: create-update-pr
    if: github.event.inputs.auto_merge == 'true'
    timeout-minutes: 5
    
    steps:
    - name: Auto-merge dependency PRs
      run: |
        echo "🤖 Auto-merging dependency update PRs..."
        # Add auto-merge logic here
        echo "Auto-merge completed"

  # Notify team
  notify-team:
    name: Notify Team
    runs-on: ubuntu-latest
    needs: [check-dependencies, create-update-pr]
    if: always()
    timeout-minutes: 5
    
    steps:
    - name: Dependency update summary
      run: |
        echo "📊 Dependency Update Summary"
        echo "============================"
        echo "Outdated packages: ${{ needs.check-dependencies.outputs.outdated_count }}"
        echo "Security vulnerabilities: ${{ needs.check-dependencies.outputs.vulnerabilities }}"
        echo "Update PR created: ${{ needs.create-update-pr.result }}"
        
        if [ "${{ needs.create-update-pr.result }}" == "success" ]; then
          echo "✅ Dependency update PR created successfully"
        else
          echo "❌ Failed to create dependency update PR"
        fi
    
    - name: Send notifications
      run: |
        echo "📢 Sending team notifications..."
        # Add notification logic here (Slack, email, etc.)