name: Dependency Management

on:
  schedule:
    # Run daily at 4 AM UTC
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      update_type:
        description: 'Type of dependency update'
        required: true
        default: 'security'
        type: choice
        options:
        - security
        - minor
        - major
        - all
      auto_merge:
        description: 'Auto-merge PRs'
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: '20.18.1'

jobs:
  # Check for outdated dependencies
  check-dependencies:
    name: Check Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: package-lock.json
    
    - name: Install dependencies
      run: npm ci --prefer-offline --no-audit
    
    - name: Check npm outdated
      id: outdated_check
      run: |
        echo "📦 Checking for outdated packages..."
        npm outdated --json > outdated.json || echo "{}" > outdated.json
        
        # Count outdated packages
        OUTDATED_COUNT=$(jq 'length' outdated.json)
        echo "outdated_count=$OUTDATED_COUNT" >> $GITHUB_OUTPUT
        
        if [ "$OUTDATED_COUNT" -gt 0 ]; then
          echo "Found $OUTDATED_COUNT outdated packages"
          cat outdated.json
        else
          echo "✅ All packages are up to date"
        fi
    
    - name: Check security vulnerabilities
      id: security_check
      run: |
        echo "🔒 Checking for security vulnerabilities..."
        npm audit --json > audit.json || echo "{}" > audit.json
        
        # Count vulnerabilities
        VULNERABILITIES=$(jq '.metadata.vulnerabilities.total // 0' audit.json)
        echo "vulnerabilities=$VULNERABILITIES" >> $GITHUB_OUTPUT
        
        if [ "$VULNERABILITIES" -gt 0 ]; then
          echo "⚠️ Found $VULNERABILITIES security vulnerabilities"
          cat audit.json
        else
          echo "✅ No security vulnerabilities found"
        fi
    
    - name: Upload dependency reports
      uses: actions/upload-artifact@v4
      with:
        name: dependency-reports
        path: |
          outdated.json
          audit.json
        retention-days: 7

  # Update dependencies
  update-dependencies:
    name: Update Dependencies
    runs-on: ubuntu-latest
    needs: check-dependencies
    if: needs.check-dependencies.outputs.outdated_count > 0 || needs.check-dependencies.outputs.vulnerabilities > 0
    timeout-minutes: 20
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: package-lock.json
    
    - name: Install dependencies
      run: npm ci
    
    - name: Download dependency reports
      uses: actions/download-artifact@v4
      with:
        name: dependency-reports
    
    - name: Update security patches
      if: github.event.inputs.update_type == 'security' || github.event.inputs.update_type == 'all'
      run: |
        echo "🔒 Updating security patches..."
        npm audit fix --audit-level=moderate || true
    
    - name: Update minor versions
      if: github.event.inputs.update_type == 'minor' || github.event.inputs.update_type == 'all'
      run: |
        echo "📦 Updating minor versions..."
        npx npm-check-updates --target minor --upgrade || true
    
    - name: Update major versions
      if: github.event.inputs.update_type == 'major' || github.event.inputs.update_type == 'all'
      run: |
        echo "🚀 Updating major versions..."
        npx npm-check-updates --target major --upgrade || true
    
    - name: Install updated dependencies
      run: npm install
    
    - name: Run tests after update
      run: npm run type-check || echo "Type checking failed - continuing"
    
    - name: Build after update
      run: npm run build || echo "Build failed - continuing"
    
    - name: Check for breaking changes
      run: |
        echo "🔍 Checking for breaking changes..."
        npm ls --depth=0 || echo "Dependency check completed"
    
    - name: Commit changes
      if: success()
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add package.json package-lock.json
        git commit -m "chore: update dependencies [skip ci]" || echo "No changes to commit"
    
    - name: Push changes
      if: success()
      run: git push || echo "No changes to push"

  # Create Update PR
  create-pr:
    name: Create Update PR
    runs-on: ubuntu-latest
    needs: update-dependencies
    if: always() && needs.update-dependencies.result == 'success'
    timeout-minutes: 10
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: package-lock.json
    
    - name: Install dependencies
      run: npm ci
    
    - name: Download dependency reports
      uses: actions/download-artifact@v4
      with:
        name: dependency-reports
    
    - name: Generate update summary
      id: summary
      run: |
        echo "📋 Generating update summary..."
        
        # Read outdated packages
        OUTDATED_COUNT=$(jq 'length' outdated.json)
        VULNERABILITIES=$(jq '.metadata.vulnerabilities.total // 0' audit.json)
        
        # Generate summary
        SUMMARY="## Dependency Update Summary\n\n"
        SUMMARY+="### 📦 Outdated Packages: $OUTDATED_COUNT\n"
        SUMMARY+="### 🔒 Security Vulnerabilities: $VULNERABILITIES\n\n"
        
        if [ "$OUTDATED_COUNT" -gt 0 ]; then
          SUMMARY+="### Updated Packages:\n"
          jq -r 'to_entries[] | "- \(.key): \(.value.current) → \(.value.latest)"' outdated.json >> summary.md
          SUMMARY+="$(cat summary.md)\n\n"
        fi
        
        if [ "$VULNERABILITIES" -gt 0 ]; then
          SUMMARY+="### Security Issues Addressed:\n"
          jq -r '.vulnerabilities[] | "- \(.name): \(.severity)"' audit.json >> security.md
          SUMMARY+="$(cat security.md)\n\n"
        fi
        
        SUMMARY+="### 🔄 Update Type: ${{ github.event.inputs.update_type }}\n"
        SUMMARY+="### 🤖 Auto-merge: ${{ github.event.inputs.auto_merge }}\n\n"
        SUMMARY+="This PR was automatically generated by GitHub Actions.\n"
        SUMMARY+="Please review the changes and test thoroughly before merging."
        
        echo "summary<<EOF" >> $GITHUB_OUTPUT
        echo "$SUMMARY" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
    
    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        title: "chore: update dependencies - ${{ github.event.inputs.update_type }}"
        body: ${{ steps.summary.outputs.summary }}
        branch: "deps/update-${{ github.event.inputs.update_type }}-${{ github.run_id }}"
        base: main
        delete-branch: true
        labels: |
          dependencies
          automated
          ${{ github.event.inputs.update_type }}

  # Auto-Merge PRs
  auto-merge:
    name: Auto-Merge PRs
    runs-on: ubuntu-latest
    needs: create-pr
    if: github.event.inputs.auto_merge == 'true'
    timeout-minutes: 5
    
    steps:
    - name: Auto-merge dependency PRs
      uses: actions/github-script@v7
      with:
        script: |
          const { data: pulls } = await github.rest.pulls.list({
            owner: context.repo.owner,
            repo: context.repo.repo,
            state: 'open',
            head: `deps/update-${context.event.inputs.update_type}-${context.runId}`
          });
          
          if (pulls.length > 0) {
            const pull = pulls[0];
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pull.number,
              merge_method: 'squash'
            });
            console.log(`Auto-merged PR #${pull.number}`);
          }

  # Notify Team
  notify:
    name: Notify Team
    runs-on: ubuntu-latest
    needs: [create-pr, auto-merge]
    if: always()
    timeout-minutes: 5
    
    steps:
    - name: Dependency update summary
      run: |
        echo "📢 Dependency Update Summary"
        echo "=========================="
        echo "Update Type: ${{ github.event.inputs.update_type }}"
        echo "Auto-merge: ${{ github.event.inputs.auto_merge }}"
        echo "PR Created: ${{ needs.create-pr.result == 'success' }}"
        echo "Auto-merged: ${{ needs.auto-merge.result == 'success' }}"
        echo ""
        echo "Team has been notified of the dependency updates."
