# AI Content Burst - Template-Only Maximum Velocity
# No LLM required. Runs template blog + case studies + industry pages in parallel.
# 11x daily for fastest possible content creation without API costs.

name: AI Content Burst

concurrency:
  group: content-burst
  cancel-in-progress: false

permissions:
  contents: write

on:
  schedule:
    - cron: '0 3 * * *'
    - cron: '0 5 * * *'
    - cron: '0 7 * * *'
    - cron: '0 9 * * *'
    - cron: '0 11 * * *'
    - cron: '0 13 * * *'
    - cron: '0 15 * * *'
    - cron: '0 17 * * *'
    - cron: '0 19 * * *'
    - cron: '0 21 * * *'
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      max_template_blog:
        description: 'Template blog posts (default 10)'
        required: false
        default: '10'
      max_template_case_studies:
        description: 'Template case studies (default 10)'
        required: false
        default: '10'
      max_industry_pages:
        description: 'Industry solution pages (default 6)'
        required: false
        default: '6'
      max_product_pages:
        description: 'New Zion AI product pages (default 3)'
        required: false
        default: '3'
      trigger_deploy:
        description: 'Trigger Netlify deploy after commit'
        required: false
        default: true
        type: boolean

jobs:
  burst:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run content burst (template-only, no LLM)
        env:
          NETLIFY_BUILD_HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
          MAX_TEMPLATE_BLOG: ${{ github.event.inputs.max_template_blog || '10' }}
          MAX_TEMPLATE_CASE_STUDIES: ${{ github.event.inputs.max_template_case_studies || '10' }}
          MAX_INDUSTRY_PAGES: ${{ github.event.inputs.max_industry_pages || '6' }}
          MAX_PRODUCT_PAGES: ${{ github.event.inputs.max_product_pages || '3' }}
          MAX_ADD: "6"
        run: node automation/ai-content-burst-agent.cjs

      - name: Validate build (catch content errors before push)
        run: npm run build

      - name: Commit, push, and deploy
        env:
          TRIGGER_DEPLOY: ${{ github.event.inputs.trigger_deploy != 'false' && '1' || '' }}
          NETLIFY_BUILD_HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "chore(content): content burst - template blog + case studies + industry pages"
            git push
            if [ -n "$NETLIFY_BUILD_HOOK" ] && [ "$TRIGGER_DEPLOY" = "1" ]; then
              curl -sSf -o /dev/null "$NETLIFY_BUILD_HOOK" || true
            fi
          fi
