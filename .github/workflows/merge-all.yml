name: Merge All Mergeable PRs

on:
  workflow_dispatch:

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Merge all mergeable PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          prs=$(gh pr list --state open --json number,isDraft,mergeable,labels --jq '.[] | select(.isDraft==false) | select(.mergeable=="MERGEABLE") | select(any(.labels[]?; .name=="automerge")) | .number')
          for pr in $prs; do
            echo "Merging PR #$pr"
            gh pr merge $pr --squash --auto --delete-branch || true
          done
