name: AI Post Push Route Verify

permissions:
  contents: read
  issues: write

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  verify-routes:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify promoted routes
        id: verify
        run: |
          set -euo pipefail
          failed=0
          failures_file="route-failures.txt"
          : > "$failures_file"

          while IFS= read -r path; do
            if [ -z "$path" ] || [[ "$path" == \#* ]]; then
              continue
            fi
            code=$(curl --silent --show-error --max-time 12 -o /dev/null -w "%{http_code}" "https://ziontechgroup.com$path" || echo "000")
            if [ "$code" = "200" ]; then
              echo "OK $path ($code)"
            else
              echo "FAIL $path ($code)"
              echo "- $path => $code" >> "$failures_file"
              failed=1
            fi
          done < config/smoke-routes.txt

          if [ $failed -eq 1 ]; then
            echo "has_failures=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_failures=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update route failure issue
        if: steps.verify.outputs.has_failures == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          title="AI route verification failures on production"
          body_file="issue-body.md"
          {
            echo "## Route verification failed"
            echo ""
            echo "Branch: \`${GITHUB_REF}\`"
            echo "Commit: \`${GITHUB_SHA}\`"
            echo "Workflow: \`${GITHUB_WORKFLOW}\`"
            echo ""
            echo "### Failing routes"
            cat route-failures.txt
          } > "$body_file"

          existing=$(gh issue list --state open --search "$title in:title" --json number --jq '.[0].number')
          if [ -n "${existing:-}" ] && [ "$existing" != "null" ]; then
            gh issue comment "$existing" --body-file "$body_file"
          else
            gh issue create --title "$title" --body-file "$body_file" --label bug
          fi

