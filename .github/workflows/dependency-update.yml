name: Dependency Update Bot

on:
  schedule:
    - cron: '0 4 * * *'   # daily at 04:00 UTC
  workflow_dispatch:

jobs:
  update-deps:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        ref: main
        fetch-depth: 0

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install ncu
      run: npm install -g npm-check-updates

    - name: Check for updates
      id: check
      run: |
        ncu --deep --packageFile package.json > updates.txt
        if [ -s updates.txt ]; then
          echo "has_updates=true" >> $GITHUB_OUTPUT
        else
          echo "has_updates=false" >> $GITHUB_OUTPUT
        fi

    - name: Create branch
      if: steps.check.outputs.has_updates == 'true'
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git checkout -b dependency-updates

    - name: Run ncu upgrade
      if: steps.check.outputs.has_updates == 'true'
      run: ncu -u

    - name: Commit and push
      if: steps.check.outputs.has_updates == 'true'
      run: |
        git add package.json package-lock.json
        git commit -m "chore: update npm dependencies"
        git push -u origin dependency-updates --force

    - name: Create Pull Request
      if: steps.check.outputs.has_updates == 'true'
      uses: actions/github-script@v7
      with:
        script: |
          const { data: pr } = await github.rest.pulls.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: "chore: update npm dependencies",
            body: "Automated dependency updates via npm-check-updates",
            head: "dependency-updates",
            base: "main"
          });
          console.log("PR created:", pr.number);

    - name: Wait for CI
      if: steps.check.outputs.has_updates == 'true'
      run: |
        for i in {1..30}; do
          sleep 10
          status=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs?branch=dependency-updates" | \
            jq '.workflow_runs[0].conclusion')
          if [ "$status" != "null" ]; then
            echo "CI finished: $status"
            break
          fi
        done

    - name: Auto-merge PR
      if: steps.check.outputs.has_updates == 'true'
      uses: actions/github-script@v7
      with:
        script: |
          const prs = await github.rest.pulls.list({
            owner: context.repo.owner,
            repo: context.repo.repo,
            state: 'open',
            head: 'dependency-updates'
          });
          if (prs.data.length > 0) {
            const pr = prs.data[0];
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              merge_method: 'squash'
            });
            console.log("PR merged:", pr.number);
          }