name: AI Push helper adoption audit (weekly)

permissions:
  contents: read

on:
  schedule:
    - cron: '34 15 * * 1'
  pull_request:
    paths:
      - "automation/audit-push-helper-adoption.cjs"
  workflow_dispatch:

concurrency:
  group: ai-push-helper-adoption-audit-weekly
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run push-helper adoption audit
        run: node automation/audit-push-helper-adoption.cjs

      - name: Upload adoption report artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: push-helper-adoption-${{ github.run_id }}
          path: automation/reports/workflow-push-helper-adoption-latest.json
          if-no-files-found: error
          retention-days: 14
