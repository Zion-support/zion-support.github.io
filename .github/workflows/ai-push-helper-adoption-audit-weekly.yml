name: AI Push helper adoption audit (weekly)
permissions:
  contents: read
on:
  schedule:
    - cron: 34 15 * * 1
  pull_request:
    paths:
      - automation/audit-push-helper-adoption.cjs
  workflow_dispatch: null
concurrency:
  group: ai-push-helper-adoption-audit-weekly
  cancel-in-progress: true
jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NEXT_TELEMETRY_DISABLED: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false
      - name: Run push-helper adoption audit
        run: node automation/audit-push-helper-adoption.cjs
      - name: Upload adoption report artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: push-helper-adoption-${{ github.run_id }}
          path: automation/reports/workflow-push-helper-adoption-latest.json
          if-no-files-found: error
          retention-days: 14
