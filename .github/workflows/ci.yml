name: CI/CD Pipeline

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * 1' # Weekly on Monday at 2 AM UTC

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: 'npm'

      - name: Install dependencies (clean)
        run: npm ci --no-audit --no-fund --include=optional

      - name: Rebuild optional rollup binaries (tolerate failure)
        run: npm rebuild rollup @rollup/rollup-linux-x64-gnu || true

      - name: Build
        env:
          NODE_ENV: production
          SKIP_TYPE_CHECK: 'true'
          ROLLUP_SKIP_NODEJS_NATIVE: 'true'
        run: npm run build:ci

      - name: Upload build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

      - name: Build size analysis
        if: success()
        run: |
          echo "Build size analysis:"
          du -sh dist/
          find dist -name "*.js" -exec wc -c {} + | sort -n | tail -10
          find dist -name "*.css" -exec wc -c {} + | sort -n | tail -5

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: 'npm'

      - name: Install dependencies (clean)
        run: npm ci --no-audit --no-fund --include=optional

      - name: ESLint
        run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: 'npm'

      - name: Install dependencies (clean)
        run: npm ci --no-audit --no-fund --include=optional

      - name: TypeScript Check (no emit)
        run: npm run type-check

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --include=optional

      - name: Security audit
        run: npm audit --audit-level=moderate

      - name: Check for known vulnerabilities
        run: |
          echo "Checking for security vulnerabilities..."
          npm audit --json > audit-results.json || true
          if [ -s audit-results.json ]; then
            echo "Security audit completed. Check audit-results.json for details."
          else
            echo "No security issues found."
          fi

  performance:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --include=optional

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Performance test
        run: |
          echo "Running performance tests..."
          npm run build:analyze || echo "Build analysis completed"
