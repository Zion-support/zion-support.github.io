name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint and type-check
        run: |
          npm run lint || echo "Linting failed, continuing..."
          npm run type-check || echo "Type checking failed, continuing..."
        continue-on-error: true

      - name: Build project
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -d out ]; then
            echo "Build failed: out folder not found"
            exit 1
          fi
          echo "Build completed successfully"
          echo "Build artifacts:"
          ls -la out/

      - name: Security scan (non-blocking)
        run: npm run security:scan || echo "Security scan not configured"
        continue-on-error: true

      - name: Run tests (non-blocking)
        run: npm test || echo "Tests not configured"
        continue-on-error: true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ci-build
          path: out/
          retention-days: 30

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Check for known vulnerabilities
        run: |
          if npm audit --audit-level=high; then
            echo "No high severity vulnerabilities found"
          else
            echo "High severity vulnerabilities detected"
            exit 1
          fi


