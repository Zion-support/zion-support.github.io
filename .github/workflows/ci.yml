name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run every 6 hours as an alternative to PM2 automation
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        
    - name: Install dependencies
      run: |
        npm ci
        cd server && npm ci
        
    - name: Type checking
      run: |
        npm run type-check:all
        
    - name: Linting
      run: |
        npm run lint:all
        
    - name: Build frontend
      run: npm run build
      
    - name: Build backend
      run: npm run build:backend
      
    - name: Run tests (if available)
      run: npm test || echo "No tests configured"
      
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-${{ matrix.node-version }}
        path: |
          dist/
          server/dist/
        retention-days: 7

  quality-checks:
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Security audit
      run: npm audit --audit-level=moderate || true
      
    - name: Check for outdated dependencies
      run: npm outdated || echo "All dependencies are up to date"
      
    - name: Bundle analysis
      run: |
        npm run build
        npx vite-bundle-analyzer dist || echo "Bundle analyzer not available"

  link-checking:
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build for link checking
      run: npm run build
      
    - name: Check internal links
      run: |
        npx linkinator dist --config .linkinatorrc || echo "Linkinator not configured"
        
    - name: Check external links
      run: |
        npx broken-link-checker dist || echo "Broken link checker not available"