name: WORKFLOW_NAME_PLACEHOLDER
'on':
  workflow_dispatch: {}
  schedule:
  - cron: '*/30 * * * *'
concurrency:
  group: workflow-workflow_name_placeholder-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: read
jobs:
  main:
    name: Main Job
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: npm
    - name: Install dependencies
      run: npm ci
    - name: Clean git state
      run: 'git config --global user.name "github-actions[bot]"

        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

  update:
        include: ${{ fromJSON(needs.list.outputs.prs) }}
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ matrix.headRef }}
      - name: Merge main into PR branch
        run: |
          git fetch origin main
          git merge --no-edit origin/main || true
      - name: Push updated branch
        run: |
          git push origin HEAD:${{ matrix.headRef }} || echo "Push failed (likely fork)