name: AI Development Agent

permissions:
  contents: write
  issues: write

concurrency:
  group: ai-development-agent
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 9 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'run'
        type: choice
        options:
          - run
          - analyze
          - continuous

jobs:
  ai-development:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GH_TOKEN || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run AI Development Agent
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FAST_MODE: 'true'
          CONTINUOUS_MODE: 'true'
          AUTO_COMMIT: 'true'
          AUTO_PUSH: 'false'
          MAX_CHANGES_PER_RUN: '20'
          ANALYSIS_INTERVAL: '120000'
          ORCHESTRATION_INTERVAL: '120000'
          MAX_CONCURRENT_TASKS: '10'
        run: |
          mode="${{ inputs.mode || 'run' }}"
          node automation/ai-development-agent.cjs "$mode"

      - name: Push changes
        if: success()
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No changes to push"
            exit 0
          fi
          git fetch origin main --depth=1
          if ! git rebase origin/main; then
            echo "::warning::Rebase conflict — skipping push."
            git rebase --abort || true
            exit 0
          fi
          git push origin HEAD:main || echo "::warning::Push rejected — skipping."
