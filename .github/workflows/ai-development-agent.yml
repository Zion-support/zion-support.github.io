name: AI Development Agent

concurrency:
  group: ai-development-agent-${{ github.ref }}
  cancel-in-progress: false

on:
  # Run every 30 minutes to avoid run pileups
  schedule:
    - cron: '*/30 * * * *'
  
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'run'
        type: choice
        options:
          - run
          - analyze
          - continuous
  
  # Run on push to main (after other changes)
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'automation/**'
      - 'package.json'
  
  # Run on pull request (to catch issues early)
  pull_request:
    paths:
      - 'src/**'
      - 'automation/**'
      - 'package.json'

jobs:
  ai-development:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    permissions:
      contents: write
      issues: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN || github.token }}
      
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Configure Git
        if: github.event_name != 'pull_request'
        run: |
          git config --global user.name "AI Development Agent"
          git config --global user.email "ai-agent@ziontechgroup.com"
      
      - name: Run AI Development Agent
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FAST_MODE: 'true'
          CONTINUOUS_MODE: 'true'
          AUTO_COMMIT: 'true'
          AUTO_PUSH: 'false'
          MAX_CHANGES_PER_RUN: '20'
          ANALYSIS_INTERVAL: '120000'
          ORCHESTRATION_INTERVAL: '120000'
          MAX_CONCURRENT_TASKS: '10'
        run: |
          mode="${{ github.event.inputs.mode || 'run' }}"
          node automation/ai-development-agent.cjs $mode

      - name: Run AI Development Agent (PR analysis mode)
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AUTO_COMMIT: 'false'
          AUTO_PUSH: 'false'
        run: |
          node automation/ai-development-agent.cjs analyze
      
      - name: Push changes
        if: success() && github.event_name != 'pull_request'
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No changes to push"
            exit 0
          fi

          echo "Changes detected, syncing with origin/main before push..."
          git fetch origin main

          if ! git rebase origin/main; then
            echo "::warning::Rebase failed. Skipping push for this run."
            git rebase --abort || true
            exit 0
          fi

          git push origin HEAD:main || {
            echo "::warning::Push rejected after rebase. Skipping without failing workflow."
          }
      
      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          github-token: ${{ secrets.GH_TOKEN || github.token }}
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🤖 AI Development Agent Failed',
              body: `The AI Development Agent encountered an error during execution.
              
              **Workflow Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
              **Triggered by:** ${{ github.event_name }}
              **Branch:** ${{ github.ref }}
              
              Please review the logs and fix any issues.`,
              labels: ['ai-agent', 'automated', 'bug']
            });

