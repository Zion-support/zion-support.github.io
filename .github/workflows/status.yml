name: Status (DISABLED - Migrated to PM2)

on:
  # This workflow is disabled and migrated to PM2 automation
  # The original workflow was handling status updates for other workflows
  # Now that other workflows are disabled, this is no longer needed
  # PM2 processes provide real-time status monitoring
  workflow_dispatch: # Only manual triggers allowed
  # All automatic triggers removed

jobs:
  disabled:
    name: Workflow Disabled
    runs-on: ubuntu-latest
    steps:
      - name: Workflow Disabled
        run: |
          echo "This workflow has been disabled and migrated to PM2 automation."
          echo "Status monitoring is now handled by PM2 processes:"
          echo "- All PM2 processes provide real-time status via 'pm2 status'"
          echo "- PM2 monitoring: 'pm2 monit'"
          echo "- PM2 logs: 'pm2 logs <process-name>'"
          echo "PM2 ecosystem.config.cjs contains the full automation configuration."
          exit 0