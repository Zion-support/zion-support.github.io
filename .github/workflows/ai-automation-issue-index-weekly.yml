name: AI Automation Issue Index (weekly)

permissions:
  contents: write
  issues: read

on:
  schedule:
    - cron: '42 9 * * 1'
  workflow_dispatch:

jobs:
  issue-index:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main

      - name: Generate automation fingerprint issue index
        env:
          GH_TOKEN: ${{ github.token }}
        run: node automation/generate-automation-issue-index.cjs

      - name: Commit index snapshot
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add automation/reports/automation-open-issues-index-latest.json
          if git diff --staged --quiet; then
            echo "No issue index changes."
            exit 0
          fi
          git commit -m "chore(reports): refresh automation open-issue fingerprint index"
          git push origin HEAD:main
