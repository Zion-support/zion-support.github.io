name: Field Performance & Real User Web Vitals Aggregator

on:
  schedule:
    - cron: '0 11 * * *'  # Daily 11:00 UTC (after digest, before midday)
  workflow_dispatch:      # Manual trigger

permissions:
  contents: read

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run Field Performance Aggregator
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID || '8435383377' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node automation/field-performance-aggregator.cjs

      - name: Upload aggregation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: field-performance-report
          path: |
            .hermes/memory/field-performance/daily-aggregates.json
            .hermes/memory/field-performance/history.json
          retention-days: 30
