name: "TypeScript Type Coverage & Dead Code Check"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 15 * * 1'  # Weekly Monday 15:00 UTC (digest only — still fails PRs)
  workflow_dispatch:

jobs:
  type-coverage:
    name: Type Coverage & Dead Code
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Type Coverage Enforcer
        id: coverage
        env:
          TS_CONFIG: ${{ github.workspace }}/tsconfig.json
          TYPE_COVERAGE_MIN: ${{ vars.TYPE_COVERAGE_MIN || '90' }}
          TYPE_COVERAGE_ANY_BLOCKLIST: ${{ vars.TYPE_COVERAGE_ANY_BLOCKLIST || 'true' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          node automation/type-coverage-enforcer.cjs
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: type-coverage-report
          path: .hermes/memory/type-coverage/report-latest.json
          retention-days: 7

      - name: Comment on PR if failed
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const reportPath = '.hermes/memory/type-coverage/report-latest.json';
            let body = '🚨 **Type Coverage / Dead Code Check Failed**\n\n';
            try {
              const r = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
              body += `**Coverage:** ${r.coveragePercent}% (minimum: ${process.env.TYPE_COVERAGE_MIN || 90}%)\n`;
              body += `**Any usage:** ${r.anyCount} occurrences\n`;
              body += `**Unused exports:** ${r.unusedExports}\n\n`;
              body += '**Errors:**\n';
              r.findings.filter((f: any) => f.severity === 'error').slice(0, 20).forEach((f: any) => {
                const rel = f.file.replace(process.env.GITHUB_WORKSPACE + '/', '');
                body += `- [${rel}:${f.line}] (${f.type}) ${f.message}\n`;
              });
              if (r.findings.filter((f: any) => f.severity === 'error').length > 20) {
                body += `… and more (see full report)\n`;
              }
              body += '\nPlease fix typing issues or adjust coverage threshold if intentionally allowed.';
            } catch (e) {
              body += 'Could not parse detailed report. Check workflow logs.';
            }
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Open issue on main branch regression
        if: github.event_name == 'push' && failure() && github.ref == 'refs/heads/main'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const title = '🚨 Type Coverage Regression on Main';
            const reportPath = '.hermes/memory/type-coverage/report-latest.json';
            let body = '**TypeScript type coverage or dead code issues detected on `main`.**\n\n';
            try {
              const r = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
              body += `Coverage: ${r.coveragePercent}% (minimum: ${process.env.TYPE_COVERAGE_MIN || 90}%)\n`;
              body += `Any usage: ${r.anyCount}\n`;
              body += `Unused exports: ${r.unusedExports}\n\n`;
              body += '**Top errors:**\n';
              r.findings.filter((f: any) => f.severity === 'error').slice(0, 15).forEach((f: any) => {
                body += `- ${f.file}:${f.line} — [${f.type}] ${f.message}\n`;
              });
            } catch (e) {
              body += 'Could not parse full report; see artifact.';
            }
            body += `\n*Committed by: ${context.payload.committer?.name || 'unknown'}*\n`;
            body += `*Commit: ${context.payload.headCommit?.id?.slice(0, 7) || 'N/A'}*\n`;

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['type-coverage', 'autonomous'],
              state: 'open'
            });
            const already = existing.data.find((i: any) => i.title === title);
            if (!already) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['type-coverage', 'autonomous', 'code-quality']
              });
            }

      - name: Notify Telegram on failure
        if: failure()
        run: |
          node automation/notify-telegram.js "🚨 Type Coverage check failed — type any usage or coverage regression detected. Review GitHub issues."

      - name: Notify Telegram on success (weekly digest)
        if: success() && github.event_name == 'schedule'
        run: |
          node automation/notify-telegram.js "✅ Weekly Type Coverage Report — type hygiene baseline updated."
