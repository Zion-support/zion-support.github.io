name: Code Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: code-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run ESLint
        run: yarn lint

      - name: Run TypeScript type checking
        run: yarn type-check

      - name: Check code formatting
        run: |
          echo "Checking code formatting..."
          # Add prettier check if available
          if yarn prettier --check . 2>/dev/null; then
            echo "✅ Code formatting is correct"
          else
            echo "⚠️  Code formatting check not available"
          fi

      - name: Check for console statements
        run: |
          echo "Checking for console statements..."
          if grep -r "console\." src/ --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" 2>/dev/null; then
            echo "⚠️  Found console statements in source code"
          else
            echo "✅ No console statements found"
          fi

      - name: Check for TODO comments
        run: |
          echo "Checking for TODO comments..."
          if grep -r "TODO\|FIXME\|HACK" src/ --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" 2>/dev/null; then
            echo "⚠️  Found TODO/FIXME/HACK comments in source code"
          else
            echo "✅ No TODO comments found"
          fi

      - name: Check bundle size
        run: |
          echo "Building project to check bundle size..."
          yarn build
          
          if [ -d ".next" ]; then
            echo "✅ Build successful"
            echo "Bundle size check completed"
          else
            echo "❌ Build failed"
            exit 1
          fi

      - name: Upload quality report
        uses: actions/upload-artifact@v4
        with:
          name: quality-report
          path: .next/
          retention-days: 7