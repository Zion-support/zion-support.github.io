name: AI Evolution Backlog Auto-Runner

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *' # Daily at 06:00 UTC

jobs:
  backlog-auto-runner:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run deploy readiness gate
        id: readiness
        run: |
          set +e
          npm run deploy:readiness
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Apply safe backlog items (dry-run guard)
        if: steps.readiness.outputs.status == '0'
        env:
          AUTO_APPLY: '1'
          MAX_APPLY: '3'
        run: |
          npm run app:backlog-implement || true

