name: WORKFLOW_NAME_PLACEHOLDER
'on':
  workflow_dispatch: {}
  schedule:
  - cron: '*/30 * * * *'
concurrency:
  group: workflow-workflow_name_placeholder-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: read
jobs:
  main:
    name: Main Job
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: npm
    - name: Install dependencies
      run: npm ci
    - name: Clean git state
      run: 'git config --global user.name "github-actions[bot]"

  guardian:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Run workflow
        run: |
          echo "Workflow completed successfully"
          
