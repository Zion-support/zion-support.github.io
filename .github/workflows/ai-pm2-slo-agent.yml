name: AI PM2 SLO Agent

permissions:
  contents: read
  issues: write

concurrency:
  group: ai-pm2-slo-agent
  cancel-in-progress: false

on:
  schedule:
    - cron: '50 */6 * * *'
  workflow_dispatch:

jobs:
  slo-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Run PM2 SLO agent (one-shot)
        run: PM2_SLO_RUN_ONCE=1 node automation/ai-pm2-slo-agent.cjs

      - name: Upload PM2 SLO artifacts
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
        with:
          name: pm2-slo-agent-${{ github.run_id }}
          path: |
            automation/reports/pm2-slo-latest.json
            automation/reports/pm2-slo-history.json
          if-no-files-found: error
          retention-days: 30

      - name: Open issue on PM2 SLO breach
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          report="automation/reports/pm2-slo-latest.json"
          [ -f "$report" ] || exit 0
          unhealthy_count=$(node -e "const fs=require('fs');const r=JSON.parse(fs.readFileSync('$report','utf8'));console.log(Number(r.unhealthyCount||0))")
          if [ "$unhealthy_count" = "0" ]; then
            echo "No PM2 SLO breaches."
            exit 0
          fi
          title="PM2 SLO breach detected (${unhealthy_count})"
          body_file="$(mktemp)"
          {
            echo "## PM2 SLO breach detected"
            echo ""
            echo "- Repository: \`${{ github.repository }}\`"
            echo "- Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "- Unhealthy app count: ${unhealthy_count}"
            echo ""
            echo "### Unhealthy apps"
            node -e "const fs=require('fs');const r=JSON.parse(fs.readFileSync('$report','utf8'));for(const item of (r.apps||[])){if(!item.healthy){console.log('- `'+item.name+'` ('+item.reasons.join('; ')+')')}}"
            echo ""
            echo "Investigate PM2 restart behavior and app health for listed services."
          } > "$body_file"
          gh issue create --title "$title" --body-file "$body_file" --label bug || true
