name: Continuous Improvement
'on':
  workflow_dispatch: {}
  schedule:
    - cron: '0 2 * * 1'  # Run weekly on Monday at 2 AM UTC
  workflow_dispatch:
    inputs:
      improvement_type:
        description: 'Type of improvement to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - linting
          - security
          - dependencies

permissions:
  contents: write
  actions: read
  pull-requests: write
concurrency:
  group: continuous-improvement-${{ github.ref }}
  cancel-in-progress: false
jobs:
  disabled:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          
      - name: Install dependencies
        run: npm ci
      - name: Run site analysis
        run: |
          npm run analyze:site || true
          npm run links:scan || true
      - name: Create Pull Request
        if: steps.changes.outputs.changes == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(improvement): continuous improvement and site analysis"
          title: "chore(improvement): apply continuous improvement and site analysis results"
          body: |
            Automated improvement and analysis loop.

            - Runs site analysis and link scanning
            - Updates site structure and content
          branch: automation/continuous-improvement
          delete-branch: true
          signoff: false
          labels: |
            automation
            improvement
            auto-merge

      - name: Enable Auto-merge
        if: steps.cpr.outputs.pull-request-number
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
          merge-method: squash
