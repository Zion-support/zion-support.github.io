name: Continuous Improvement

on:
  schedule:
    - cron: '0 2 * * *'  # Run daily at 2 AM UTC instead of every 4 hours
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  improve:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      
      - name: Build project
        run: yarn build
      
      - name: Run improvement checks
        run: |
          echo "Running improvement checks..."
          # Add any actual improvement scripts here when they exist
          echo "No improvement scripts found - skipping"
      
      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(improvement): continuous improvement results"
          title: "chore(improvement): apply continuous improvement results"
          body: |
            Automated improvement loop.
            
            - Build verification completed
            - Improvement checks run
          branch: automation/continuous-improvement
          delete-branch: true
          signoff: false
          labels: |
            automation
            improvement
      
      - name: Enable Auto-merge
        if: steps.cpr.outputs.pull-request-number
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
          merge-method: squash
