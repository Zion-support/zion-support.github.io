name: Continuous Improvement

on:
  schedule:
    - cron: '0 2 * * 1'  # Weekly on Monday at 2 AM
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  maintenance:
    name: Repository Maintenance
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
      - name: Build project
        run: npm run build
      - name: Run code quality checks
        run: |
          echo "Running continuous improvement checks..."
          npm run automation:improvement || echo "Automation improvement script not configured"
          npm run diversify || echo "Diversification script not configured"
      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(improvement): continuous improvement and code quality"
          title: "chore(improvement): apply continuous improvement and code quality"
          body: |
            Automated improvement and code quality loop.

            - Runs linting checks
            - Runs type checking
            - Ensures build success
          branch: automation/continuous-improvement
          delete-branch: true
          signoff: false
          labels: |
            maintenance
            automated
            weekly
