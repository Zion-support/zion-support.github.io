name: Continuous Improvement

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  improve:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run build verification
        run: npm run build
      - name: Run linting (warnings only)
        run: npm run lint || echo "Linting completed with warnings"
        continue-on-error: true
      - name: Run type checking (warnings only)
        run: npm run type-check || echo "Type checking completed with warnings"
        continue-on-error: true
      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(improvement): continuous improvement results"
          title: "chore(improvement): apply continuous improvement results"
          body: |
            Automated improvement loop.

            - Verified build process
            - Ran linting checks (warnings only)
            - Ran type checking (warnings only)
          branch: automation/continuous-improvement
          delete-branch: true
          signoff: false
          labels: |
            automation
            improvement
            auto-merge
      - name: Enable Auto-merge
        if: steps.cpr.outputs.pull-request-number
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
          merge-method: squash
      - name: Attempt immediate merge
        if: steps.cpr.outputs.pull-request-number
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = Number(core.getInput('pr'))
            try {
              await github.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr,
                merge_method: 'squash'
              })
            } catch (e) {
              core.info(`Merge not completed yet: ${e.message}`)
            }
          result-encoding: string
          inputs: |
            pr: ${{ steps.cpr.outputs.pull-request-number }}
