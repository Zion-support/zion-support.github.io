name: Continuous Improvement

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours instead of 4
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Force run even if no changes'
        required: false
        default: 'false'

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  improve:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Check for automation scripts
        run: |
          echo "Available scripts:"
          npm run --silent
          
      - name: Run continuous improvement
        run: |
          # Try to run improvement scripts if they exist
          if npm run | grep -q "automation:improvement"; then
            npm run automation:improvement || echo "automation:improvement failed"
          fi
          
          if npm run | grep -q "diversify"; then
            npm run diversify || echo "diversify failed"
          fi
          
          echo "Improvement process completed"
          
      - name: Check for changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected:"
            git status --porcelain
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          fi
          
      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(improvement): continuous improvement results"
          title: "chore(improvement): apply continuous improvement results"
          body: |
            Automated improvement loop results.
            
            - Runs automation:improvement orchestration
            - Runs diversification orchestrator
            - Generated on: ${{ github.event.schedule || 'manual' }}
          branch: automation/continuous-improvement-${{ github.run_id }}
          delete-branch: true
          signoff: false
          labels: |
            automation
            improvement
            auto-merge
            
      - name: Enable Auto-merge
        if: steps.cpr.outputs.pull-request-number
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
          merge-method: squash
          
      - name: Attempt immediate merge
        if: steps.cpr.outputs.pull-request-number
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = Number('${{ steps.cpr.outputs.pull-request-number }}')
            try {
              await github.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr,
                merge_method: 'squash'
              })
              core.info(`Successfully merged PR #${pr}`)
            } catch (e) {
              core.info(`Merge not completed yet: ${e.message}`)
            }
          result-encoding: string
          inputs: |
            pr: ${{ steps.cpr.outputs.pull-request-number }}
