name: Continuous Improvement

on:
  schedule:
    - cron: '0 2 * * 1'  # Run weekly on Monday at 2 AM UTC
  workflow_dispatch:
    inputs:
      improvement_type:
        description: 'Type of improvement to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - linting
          - security
          - dependencies

permissions:
  contents: write
  pull-requests: write

jobs:
  improve:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          
      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run linting improvements
        if: github.event.inputs.improvement_type == 'all' || github.event.inputs.improvement_type == 'linting'
        run: |
          echo "Running linting improvements..."
          yarn lint --fix || true
          yarn type-check || true

      - name: Run security improvements
        if: github.event.inputs.improvement_type == 'all' || github.event.inputs.improvement_type == 'security'
        run: |
          echo "Running security improvements..."
          yarn security:scan || true
          yarn audit --audit-level=moderate || true

      - name: Update dependencies
        if: github.event.inputs.improvement_type == 'all' || github.event.inputs.improvement_type == 'dependencies'
        run: |
          echo "Checking for dependency updates..."
          yarn outdated || echo "No outdated dependencies found"

      - name: Build project to verify improvements
        run: yarn build

      - name: Check for changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changes=true" >> $GITHUB_OUTPUT
            git add .
            git commit -m "chore(improvement): apply automated improvements" || echo "No changes to commit"
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.changes == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(improvement): apply automated improvements"
          title: "chore(improvement): apply automated improvements"
          body: |
            Automated improvements applied:
            
            - Linting fixes
            - Security improvements  
            - Dependency updates
            - Code quality improvements
            
            This PR was automatically generated by the continuous improvement workflow.
          branch: automation/continuous-improvement
          delete-branch: true
          signoff: false
          labels: |
            automation
            improvement
            auto-merge

      - name: Enable Auto-merge
        if: steps.cpr.outputs.pull-request-number
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
          merge-method: squash

  cleanup:
    runs-on: ubuntu-latest
    needs: improve
    if: always()
    steps:
      - name: Cleanup
        run: |
          echo "Continuous improvement workflow completed"
          echo "Status: ${{ needs.improve.result }}"
