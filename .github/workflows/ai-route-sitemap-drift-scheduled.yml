name: AI route vs sitemap drift

permissions:
  contents: read

concurrency:
  group: ai-route-sitemap-drift
  cancel-in-progress: false

on:
  workflow_dispatch:
  schedule:
    - cron: '45 11 * * 2'

jobs:
  drift:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SITEMAP_URL: https://ziontechgroup.com/sitemap.xml
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Compare app routes to production sitemap
        run: node automation/app-route-sitemap-drift.cjs

      - name: Upload drift report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: app-route-sitemap-drift-${{ github.run_id }}
          path: automation/reports/app-route-sitemap-drift-latest.json
          if-no-files-found: ignore
          retention-days: 90
