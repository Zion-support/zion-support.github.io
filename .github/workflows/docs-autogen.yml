name: docs-autogen
'on':
  workflow_dispatch: {}
  schedule:
    - cron: 0 */2 * * *
permissions:
  contents: write
  actions: read
jobs:
  main:
    name: Main Job
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: npm
    - name: Install dependencies
      run: npm ci
    - name: Clean git state
      run: 'git config --global user.name "github-actions[bot]"

  generate-docs:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate docs summary
        run: |
          echo "Workflow Workflow completed successfully"
    runs_on: ubuntu-latest
concurrency:
  group: docs-autogen.yml-${{ github.ref }}
  cancel-in-progress: true
