# Ruby-only workflow contract check (no Node/npm). Catches YAML/struct issues even if package scripts break.

name: Workflow Ruby parse smoke (weekly)

permissions:
  contents: read

on:
  schedule:
    - cron: '22 8 * * 1' # Mondays 08:22 UTC
  workflow_dispatch:

concurrency:
  group: workflow-ruby-parse-smoke-weekly
  cancel-in-progress: true

jobs:
  parse:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Parse workflow YAML (names, job ids, local uses, cron, timeouts, contracts)
        run: ruby scripts/automation/parse-github-workflows-yaml.rb
