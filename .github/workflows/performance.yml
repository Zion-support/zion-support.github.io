name: Performance Testing

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  performance-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build application
      run: npm run build
      
    - name: Run performance audit
      run: npm run audit:performance
      
    - name: Check bundle size
      run: |
        BUNDLE_SIZE=$(du -s dist | cut -f1)
        MAX_SIZE=500000 # 500KB
        if [ $BUNDLE_SIZE -gt $MAX_SIZE ]; then
          echo "Bundle size ($BUNDLE_SIZE bytes) exceeds maximum allowed size ($MAX_SIZE bytes)"
          exit 1
        fi
        echo "Bundle size check passed: $BUNDLE_SIZE bytes"