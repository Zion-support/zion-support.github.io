name: workflow integrity audit dispatch smoke (weekly)
permissions:
  contents: read
on:
  schedule:
    - cron: 14 9 * * 4
  workflow_dispatch: null
concurrency:
  group: workflow-integrity-audit-dispatch-smoke-weekly
  cancel-in-progress: true
jobs:
  integrity-audit-dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: workflow-integrity-audit-dispatch.yml anchors
        run: |
          set -euo pipefail
          f=.github/workflows/workflow-integrity-audit-dispatch.yml
          test -f "$f"
          test -s "$f"
          grep -Fq 'name: Workflow integrity audit (manual)' "$f"
          grep -Fq 'workflow_dispatch:' "$f"
          grep -Fq 'group: workflow-integrity-audit-dispatch' "$f"
          grep -Fq 'github-workflow-integrity-auditor.cjs' "$f"
          grep -Fq 'github-workflow-integrity-audit-' "$f"
          grep -Fq 'github.run_id' "$f"
          grep -Fq 'actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f' "$f"
          echo "ok: $f"
