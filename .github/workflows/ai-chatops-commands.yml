name: AI ChatOps Commands

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  chatops:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Install deps
        run: npm ci --prefer-offline --no-audit --fund=false
      - name: Run ChatOps handler
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHATOPS_BODY: ${{ github.event.comment.body }}
        run: node scripts/chatops-handler.cjs