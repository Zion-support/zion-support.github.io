name: AI Autonomy Quick Cycle

on:
  workflow_dispatch:
  schedule:
    - cron: '30 5 * * *' # Daily at 05:30 UTC

jobs:
  autonomy-quick-cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run deploy readiness gate
        id: readiness
        run: |
          set +e
          npm run deploy:readiness
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run autonomy quick cycle (improvement + deploy)
        if: steps.readiness.outputs.status == '0'
        env:
          NETLIFY_BUILD_HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm run app:autonomy-quick-cycle

