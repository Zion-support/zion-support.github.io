name: Workflow push policy smoke (weekly)
permissions:
  contents: read
on:
  schedule:
    - cron: 50 6 * * 5
  workflow_dispatch: null
concurrency:
  group: workflow-push-policy-smoke-weekly
  cancel-in-progress: true
jobs:
  push-policy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Push policy guards (subset)
        run: bash scripts/automation/run-workflow-grep-guards.sh --push
