name: Autonomous Automations (DISABLED - Migrated to PM2)

on:
  # This workflow is disabled and migrated to PM2 automation
  # The original workflow was handling autonomous automation tasks
  # Now handled by PM2 processes: continuous-improvement, link-checker, etc.
  workflow_dispatch: # Only manual triggers allowed
  # All automatic triggers removed

jobs:
  disabled:
    runs-on: ubuntu-latest
    steps:
      - name: Workflow Disabled
        run: |
          echo "This workflow has been disabled and migrated to PM2 automation."
          echo "Autonomous automation tasks are now handled by:"
          echo "- continuous-improvement PM2 process (every 2 hours)"
          echo "- link-checker PM2 process (every 30 minutes)"
          echo "- link-integrity PM2 process (every 2 hours)"
          echo "- front-maximizer PM2 process (every 4 hours)"
          echo "PM2 ecosystem.config.cjs contains the full automation configuration."
          exit 0