name: Link Checker

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly instead of every 30 minutes
  workflow_dispatch:
    inputs:
      max_shards:
        description: Max number of parallel agents
        default: '8'
        required: true
        type: string
      max_depth:
        description: Crawl depth
        default: '2'
        required: true
        type: string

permissions:
  contents: read  # Changed from write to read for security
  actions: read
  issues: write

concurrency:
  group: link-checker
  cancel-in-progress: false

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          
      - name: Install dependencies
        run: yarn install --frozen-lockfile
        
      - id: queue
        name: Read queue length
        run: |
          file="state/queue.json"
          if [ ! -f "$file" ]; then 
            mkdir -p state && echo '[]' > "$file"
          fi
  agent:
    needs: [generate-matrix]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      max-parallel: 8  # Reduced from 16
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix).include }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          
      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install linkinator
        run: npm install -g linkinator

      - name: Check main site links
        run: |
          file="state/queue.json"
          if [ ! -f "$file" ]; then 
            mkdir -p state && echo '[]' > "$file"
          fi
          jq -r --argjson s "$SHARD" --argjson n "$NUM_SHARDS" '
            to_entries | map(select(.key % $n == $s)) | map(.value) | .[]
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: shard-${{ matrix.shard }}-report
          path: report.json
          retention-days: 7

  aggregate:
    needs: [agent, generate-matrix]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all shard reports
        uses: actions/download-artifact@v4
        with:
          path: reports

      - name: Merge reports and summarize
        id: merge
        run: |
          set -e
          
          # Find and merge all reports
          find reports -name 'report.json' -maxdepth 2 -type f -print0 | xargs -0 jq -s '
            reduce .[] as $r ({"links":[]};
              .links += ($r.links // [])
            )
<<<<<<< HEAD
          ' > merged.json || echo '{"links":[]}' > merged.json
=======
          ' > merged.json 2>/dev/null || echo '{"links":[]}' > merged.json
          # Broken links summary
          jq '
            [.links[] | select(.state=="BROKEN") |
              {source:.parent, target:.url, status:(.status // "unknown")}
            ] | sort_by(.source, .target)
          # Next queue (new seeds from successes, bounded)
          jq '
            [.links[] | select(.state!="BROKEN") | .url] |
<<<<<<< HEAD
            unique | .[:1000]  # Reduced from 5000
          ' merged.json > next_queue.json
=======
            unique | .[:5000]
          ' merged.json > next_queue.json 2>/dev/null || echo '[]' > next_queue.json
          # Markdown summary
          jq -n --slurpfile b broken.json '
            { broken: ($b[0] | length), sample: ($b[0] | .[:20]) } as $meta |  # Reduced sample size
            "Broken links: \($meta.broken)\n\n" +
            (if $meta.broken>0 then
              "| Source | Target | Status |\n|---|---|---|\n" +
<<<<<<< HEAD
              ([$b[0][:50][] | "| " + .source + " | " + .target + " | " + (.status|tostring) + " |"] | join("\n"))
            ' > BROKEN_SUMMARY.md
          else
            echo "No broken links found." > BROKEN_SUMMARY.md
          fi
=======
              ([$meta.sample[] | "| " + .source + " | " + .target + " | " + (.status|tostring) + " |"] | join("\n"))
             else "No broken links found." end)
          ' > BROKEN_SUMMARY.md 2>/dev/null || echo "No broken links found." > BROKEN_SUMMARY.md
      - name: Upload merged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: merged
          path: |
            merged.json
            broken.json
            BROKEN_SUMMARY.md
            next_queue.json
          retention-days: 30

      - name: Create issue with report
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Broken links report - $(date +%Y-%m-%d)"
          content-filepath: BROKEN_SUMMARY.md
          labels: link-check,automated,maintenance
          assignees: ''

      - name: Update queue (read-only mode)
        run: |
          echo "Queue update disabled for security - queue file would be updated here in production"
          # In production, this would update the queue file
          # For now, just log what would happen
          echo "Would update queue with $(cat next_queue.json | jq 'length') URLs"