            if [ -f "$report" ]; then
              broken=$(jq '.links[] | select(.state=="BROKEN") | length' "$report" 2>/dev/null || echo "0")
              checked=$(jq '.links | length' "$report" 2>/dev/null || echo "0")
              total_broken=$((total_broken + broken))
              total_checked=$((total_checked + checked))
