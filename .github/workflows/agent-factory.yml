name: Link Checker

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  issues: write

concurrency:
  group: link-checker
  cancel-in-progress: false

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install linkinator
        run: npm install -g linkinator

      - name: Check main site links
        run: |
          echo "Checking main site links..."
          linkinator https://ziontechgroup.com --recurse --concurrency 10 --skip '.*(logout|signout).*' --format json > main-site-report.json || true

      - name: Check internal links
        run: |
          echo "Checking internal links..."
          find . -name "*.tsx" -o -name "*.ts" -o -name "*.jsx" -o -name "*.js" | head -20 | xargs grep -h "href=" | grep -o 'href="[^"]*"' | sed 's/href="//g' | sed 's/"//g' | grep -v "^#" | grep -v "^mailto:" | sort | uniq > internal-links.txt || true
          
          if [ -s internal-links.txt ]; then
            echo "Found internal links to check:"
            cat internal-links.txt
          else
            echo "No internal links found to check"
          fi

      - name: Generate report
        run: |
          echo "# Link Check Report" > LINK_REPORT.md
          echo "" >> LINK_REPORT.md
          echo "Generated: $(date)" >> LINK_REPORT.md
          echo "" >> LINK_REPORT.md
          
          if [ -f main-site-report.json ]; then
            echo "## Main Site Check" >> LINK_REPORT.md
            echo "" >> LINK_REPORT.md
            echo "Main site link check completed." >> LINK_REPORT.md
          fi
          
          if [ -s internal-links.txt ]; then
            echo "" >> LINK_REPORT.md
            echo "## Internal Links Found" >> LINK_REPORT.md
            echo "" >> LINK_REPORT.md
            echo "Internal links found in codebase:" >> LINK_REPORT.md
            echo "" >> LINK_REPORT.md
            cat internal-links.txt | while read link; do
              echo "- $link" >> LINK_REPORT.md
            done
          fi

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: link-check-report
          path: |
            LINK_REPORT.md
            main-site-report.json
            internal-links.txt
          retention-days: 30

      - name: Create issue with report
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Link Check Report - $(date +%Y-%m-%d)"
          content-filepath: LINK_REPORT.md
          labels: link-check, automated
          assignees: ''