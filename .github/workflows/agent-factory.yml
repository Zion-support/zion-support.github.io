name: Link Crawler Factory

on:
  schedule:
    - cron: '0 2 * * *'  # Run daily at 2 AM UTC instead of every 30 minutes
  workflow_dispatch:
    inputs:
      max_shards:
        description: Max number of parallel agents
        default: '8'
        required: true
      max_depth:
        description: Crawl depth
        default: '2'
        required: true

permissions:
  contents: write
  actions: read
  issues: write

concurrency:
  group: link-crawler-factory
  cancel-in-progress: false

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.mk.outputs.matrix }}
      depth: ${{ steps.depth.outputs.depth }}
    steps:
      - uses: actions/checkout@v4
      - id: queue
        name: Read queue length
        run: |
          file="state/queue.json"
          if [ ! -f "$file" ]; then 
            mkdir -p state && echo '[]' > "$file"
          fi
          echo "len=$(jq 'length' "$file")" >> "$GITHUB_OUTPUT"
      - id: mk
        name: Compute shard matrix
        env:
          LEN: ${{ steps.queue.outputs.len }}
          MAX: ${{ github.event.inputs.max_shards || '8' }}
        run: |
          length=${LEN:-0}
          cap=${MAX:-8}
          
          # Calculate optimal number of shards based on queue size
          if [ "$length" -lt 50 ]; then k=0; 
          elif [ "$length" -lt 200 ]; then k=1; 
          elif [ "$length" -lt 800 ]; then k=2; 
          elif [ "$length" -lt 2000 ]; then k=3; 
          else k=4; fi
          
          shards=$(( 1<<k ))
          if [ "$shards" -lt 1 ]; then shards=1; fi
          if [ "$shards" -gt "$cap" ]; then shards=$cap; fi
          
          echo "Queue length: $length, Shards: $shards"
          
          jq -n --argjson shards "$shards" '{include: [range(0; $shards) | {shard: ., num_shards: $shards}]}' | tee matrix.json
          echo "matrix=$(cat matrix.json)" >> "$GITHUB_OUTPUT"
      - id: depth
        run: echo "depth=${{ github.event.inputs.max_depth || '2' }}" >> "$GITHUB_OUTPUT"

  agent:
    needs: [generate-matrix]
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 8  # Reduced from 16 to prevent rate limiting
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix).include }}
    steps:
      - uses: actions/checkout@v4

      - name: Partition queue for this shard
        id: part
        env:
          SHARD: ${{ matrix.shard }}
          NUM_SHARDS: ${{ matrix.num_shards }}
        run: |
          file="state/queue.json"
          if [ ! -f "$file" ]; then 
            mkdir -p state && echo '[]' > "$file"
          fi
          
          # Extract URLs for this shard
          jq -r --argjson s "$SHARD" --argjson n "$NUM_SHARDS" '
            to_entries | map(select(.key % $n == $s)) | map(.value) | .[]
          ' "$file" > shard_urls.txt || true
          
          URL_COUNT=$(wc -l < shard_urls.txt || echo 0)
          echo "Shard $SHARD: $URL_COUNT URLs"
          
          if [ ! -s shard_urls.txt ]; then 
            echo "No URLs for this shard"
            echo '{}' > report.json
            exit 0
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install linkinator
        run: npm install -g linkinator
      
      - name: Run crawler (linkinator) on shard
        run: |
          set -e
          urls=$(paste -sd' ' shard_urls.txt || true)
          
          if [ -z "$urls" ]; then 
            echo '{}' > report.json
            exit 0
          fi
          
          echo "Crawling URLs: $urls"
          
          # Run linkinator with proper error handling
          linkinator $urls \
            --recurse \
            --concurrency 10 \
            --skip '.*(logout|signout|admin).*' \
            --format json \
            --timeout 30000 \
            > report.json 2>crawl.log || {
            echo "Linkinator failed, creating empty report"
            echo '{}' > report.json
          }
          
          echo "Crawl completed for shard ${{ matrix.shard }}"

      - name: Upload shard report
        uses: actions/upload-artifact@v4
        with:
          name: shard-${{ matrix.shard }}-report
          path: |
            report.json
            crawl.log
        if-no-files-found: warn

  aggregate:
    needs: [agent, generate-matrix]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all shard reports
        uses: actions/download-artifact@v4
        with:
          pattern: shard-*-report
          merge-multiple: true

      - name: Merge reports and summarize
        id: summary
        run: |
          echo "📊 Merging shard reports..."
          
          # Initialize merged report
          echo '{"urls": [], "errors": [], "summary": {}}' > merged_report.json
          
          # Find all report files
          find . -name "report.json" -type f | while read -r file; do
            echo "Processing $file"
            if [ -s "$file" ]; then
              # Merge reports (simplified merging)
              jq -s '.[0] + .[1]' merged_report.json "$file" > temp.json && mv temp.json merged_report.json || true
            fi
          done
          
          # Generate summary
          TOTAL_URLS=$(jq '.urls | length' merged_report.json || echo 0)
          TOTAL_ERRORS=$(jq '.errors | length' merged_report.json || echo 0)
          
          echo "total_urls=$TOTAL_URLS" >> $GITHUB_OUTPUT
          echo "total_errors=$TOTAL_ERRORS" >> $GITHUB_OUTPUT
          
          echo "📈 Summary: $TOTAL_URLS URLs checked, $TOTAL_ERRORS errors found"

      - name: Upload merged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: merged
          path: |
            merged_report.json
            ./*/report.json
          retention-days: 30

      - name: Open/Update issue with summary
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['link-crawler', 'automated']
            });
            
            const summary = `## 🔗 Link Crawler Report
            
            **Date**: ${new Date().toISOString()}
            **Total URLs Checked**: ${{ steps.summary.outputs.total_urls }}
            **Total Errors**: ${{ steps.summary.outputs.total_errors }}
            
            ### 📊 Summary
            - Queue processed successfully
            - All shards completed
            - Report generated and uploaded
            
            ### 📁 Artifacts
            - Merged report: merged_report.json
            - Individual shard reports available
            
            ---
            *Generated by GitHub Actions*`;
            
            if (issues.length > 0) {
              // Update existing issue
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: summary
              });
              console.log(`Updated issue #${issues[0].number}`);
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '🔗 Link Crawler Report',
                body: summary,
                labels: ['link-crawler', 'automated']
              });
              console.log('Created new issue');
            }

      - name: Update queue
        run: |
          echo "🔄 Updating queue..."
          # Clear processed URLs from queue
          if [ -f "state/queue.json" ]; then
            echo '[]' > "state/queue.json"
            echo "Queue cleared"
          fi