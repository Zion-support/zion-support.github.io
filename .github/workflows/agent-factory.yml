name: Link Crawler Factory

on:
  schedule:
    - cron: '0 6 * * *'  # Run daily at 6 AM UTC instead of every 30 minutes
  workflow_dispatch:
    inputs:
      max_shards:
        description: Max number of parallel agents
        default: '8'
        required: true
      max_depth:
        description: Crawl depth
        default: '2'
        required: true

permissions:
  contents: write
  actions: read
  issues: write

concurrency:
  group: link-crawler-factory
  cancel-in-progress: false

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.mk.outputs.matrix }}
      depth: ${{ steps.depth.outputs.depth }}
    steps:
      - uses: actions/checkout@v4
      
      - id: queue
        name: Read queue length
        run: |
          file="state/queue.json"
          if [ ! -f "$file" ]; then 
            mkdir -p state && echo '[]' > "$file"
          fi
          echo "len=$(jq 'length' "$file")" >> "$GITHUB_OUTPUT"
      
      - id: mk
        name: Compute shard matrix
        env:
          LEN: ${{ steps.queue.outputs.len }}
          MAX: ${{ github.event.inputs.max_shards || '8' }}
        run: |
          length=${LEN:-0}
          cap=${MAX:-8}
          # Simplified shard calculation
          if [ "$length" -lt 100 ]; then shards=1; 
          elif [ "$length" -lt 500 ]; then shards=2; 
          elif [ "$length" -lt 1000 ]; then shards=4; 
          else shards=8; fi
          
          if [ "$shards" -gt "$cap" ]; then shards=$cap; fi
          
          jq -n --argjson shards "$shards" '{include: [range(0; $shards) | {shard: ., num_shards: $shards}]}' > matrix.json
          echo "matrix=$(cat matrix.json)" >> "$GITHUB_OUTPUT"
      
      - id: depth
        run: echo "depth=${{ github.event.inputs.max_depth || '2' }}" >> "$GITHUB_OUTPUT"

  agent:
    needs: [generate-matrix]
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 8
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix).include }}
    steps:
      - uses: actions/checkout@v4

      - name: Partition queue for this shard
        id: part
        env:
          SHARD: ${{ matrix.shard }}
          NUM_SHARDS: ${{ matrix.num_shards }}
        run: |
          file="state/queue.json"
          if [ ! -f "$file" ]; then mkdir -p state && echo '[]' > "$file"; fi
          
          jq -r --argjson s "$SHARD" --argjson n "$NUM_SHARDS" '
            to_entries | map(select(.key % $n == $s)) | map(.value) | .[]
          ' "$file" > shard_urls.txt || true
          
          echo "URLs for shard $SHARD: $(wc -l < shard_urls.txt || echo 0)"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install linkinator
        run: yarn global add linkinator

      - name: Run crawler on shard
        run: |
          set -e
          if [ ! -s shard_urls.txt ]; then 
            echo '{"links":[]}' > report.json
            exit 0
          fi
          
          urls=$(paste -sd' ' shard_urls.txt)
          echo "Checking URLs: $urls"
          
          linkinator $urls --recurse --concurrency 10 --skip '.*(logout|signout).*' --format json > report.json || true

      - name: Upload shard report
        uses: actions/upload-artifact@v4
        with:
          name: shard-${{ matrix.shard }}-report
          path: report.json

  aggregate:
    needs: [agent, generate-matrix]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all shard reports
        uses: actions/download-artifact@v4
        with:
          path: reports

      - name: Merge reports and summarize
        id: merge
        run: |
          set -e
          
          # Find and merge all reports
          find reports -name 'report.json' -maxdepth 2 -type f -print0 | xargs -0 jq -s '
            reduce .[] as $r ({"links":[]};
              .links += ($r.links // [])
            )
          ' > merged.json

          # Count broken links
          broken_count=$(jq '[.links[] | select(.state=="BROKEN")] | length' merged.json)
          echo "Found $broken_count broken links"

          # Create summary
          if [ "$broken_count" -gt 0 ]; then
            jq '
              [.links[] | select(.state=="BROKEN") |
                {source:.parent, target:.url, status:(.status // "unknown")}
              ] | sort_by(.source, .target)
            ' merged.json > broken.json
            
            echo "| Source | Target | Status |" > BROKEN_SUMMARY.md
            echo "|---|---|---|" >> BROKEN_SUMMARY.md
            jq -r '.[] | "| " + .source + " | " + .target + " | " + (.status|tostring) + " |"' broken.json >> BROKEN_SUMMARY.md
          else
            echo "No broken links found." > BROKEN_SUMMARY.md
          fi

      - name: Upload merged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: merged
          path: |
            merged.json
            BROKEN_SUMMARY.md

      - name: Create issue for broken links
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Broken links report - ${{ github.run_number }}"
          content-filepath: BROKEN_SUMMARY.md
          labels: link-check,automated
          assignees: ''

      - name: Update queue
        run: |
          mkdir -p state
          # Keep only successful URLs for next run
          jq '[.links[] | select(.state!="BROKEN") | .url] | unique | .[:1000]' merged.json > state/queue.json
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/queue.json
          git commit -m "chore(crawler): update queue with successful URLs" || echo "No queue changes"
          git push || true