name: i18n Context Adapter (Daily)
on:
  schedule:
    - cron: 0 3 * * *
  workflow_dispatch: null
jobs:
  generate-locales:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run i18n Context Adapter
        run: node automation/i18n-context-adapter.cjs
      - name: Commit and push locale changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add locales
          if git diff --cached --quiet; then
            echo "No locale changes"
          else
            git commit -m "chore(i18n): update locale bundles"
            git push origin main
          fi
