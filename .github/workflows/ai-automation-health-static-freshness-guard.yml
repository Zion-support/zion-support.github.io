name: Automation health static freshness guard

permissions:
  contents: read
  issues: write

on:
  schedule:
    - cron: '12 */6 * * *'
  workflow_dispatch:

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main

      - name: Evaluate static health freshness
        id: freshness
        env:
          AUTOMATION_HEALTH_STATIC_MAX_HOURS: ${{ vars.AUTOMATION_HEALTH_STATIC_MAX_HOURS }}
        run: node scripts/automation/check-automation-health-static-freshness.cjs

      - name: Escalate stale static health snapshot
        if: steps.freshness.outputs.static_health_fresh != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_FINGERPRINT: automation-health-static-freshness
          ISSUE_COOLDOWN_HOURS: "24"
          ISSUE_LABELS: automation-incident,automation-fp-automation-health-static-freshness,automation-observability
          ISSUE_TITLE: "Automation health static snapshot stale"
          ISSUE_BODY: |
            The static automation health API snapshot under `public/api/automation-health.json` is stale or invalid.

            Investigate:
            - `scripts/automation/generate-automation-health-snapshot.cjs`
            - deploy/report commit workflows that persist `public/api/automation-health*.json`
            - branch protection and report commit drift on `main`
        run: |
          export ISSUE_FINGERPRINT="automation-health-static-freshness"
          node scripts/automation/gh-issue-dedupe-or-create.cjs

      - name: Close stale-static-health issue on recovery
        if: steps.freshness.outputs.static_health_fresh == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RECOVERY_FINGERPRINT: automation-health-static-freshness
          RECOVERY_COMMENT: "Closing automatically: static automation health snapshot freshness recovered."
        run: node scripts/automation/gh-issue-close-on-recovery.cjs

      - name: Upload freshness report
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
        with:
          name: automation-health-static-freshness-${{ github.run_id }}
          path: automation/reports/automation-health-static-freshness-latest.json
          if-no-files-found: warn
