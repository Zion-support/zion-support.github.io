name: Sitemap Daily

on:

    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
concurrency:
  group: "github.workflow-${{ github.ref }}"
  cancel-in-progress: true

  contents: write

jobs:
  sitemap:
      - name: Checkout
        uses: actions/checkout@v4
          with:
            fetch-depth: 0
fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
          with:
            node-version: \'20\'
            cache: \'npm\'
node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Generate sitemap
        run: npm run sitemap
      - name: Commit sitemap
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore(seo): update sitemap.xml'
          file_pattern: public/sitemap.xml