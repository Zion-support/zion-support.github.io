name: Lighthouse CI Performance Budgets
on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          npm ci
          npm install -g @lhci/cli@0.9.x

      - name: Run Lighthouse CI
        run: |
          lhci collect
          lhci assert
          lhci upload

      - name: Comment results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: runs } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: context.workflow,
              per_page: 1,
            });
            const run = runs.workflow_runs[0];
            const artifactUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${run.id}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `## 🚦 Lighthouse CI Results\n\n| Metric | Budget | Status |\n|--------|--------|--------|\n| FCP | < 2000ms | ${run.conclusion === 'success' ? '✅ Pass' : '❌ Fail'} |\n| LCP | < 2500ms | ${run.conclusion === 'success' ? '✅ Pass' : '❌ Fail'} |\n| TBT | < 300ms | ${run.conclusion === 'success' ? '✅ Pass' : '❌ Fail'} |\n| CLS | < 0.1 | ${run.conclusion === 'success' ? '✅ Pass' : '❌ Fail'} |\n\nRun: ${artifactUrl}`
            });
