name: AI App Improvement Specialist

concurrency:
  group: ai-app-improvement-specialist-${{ github.ref }}
  cancel-in-progress: false

on:
  # Run every 6 hours
  schedule:
    - cron: '0 */6 * * *'
  
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      mode:
        description: 'Operation mode'
        required: false
        default: 'standard'
        type: choice
        options:
          - standard
          - aggressive
          - conservative
      max_improvements:
        description: 'Max improvements to apply'
        required: false
        default: '15'
        type: string
  
  # Run after pushes to main (with delay to avoid conflicts)
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'package.json'
      - 'tsconfig.json'
      - 'eslint.config.mjs'

jobs:
  improve-app:
    name: Run App Improvement Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    permissions:
      contents: write
      issues: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN || github.token }}
      
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Configure Git
        run: |
          git config --global user.name "AI App Improvement Specialist"
          git config --global user.email "ai-specialist@ziontechgroup.com"
      
      - name: Run AI App Improvement Specialist
        env:
          AAIS_MODE: ${{ github.event.inputs.mode || 'standard' }}
          AAIS_MAX_IMPROVEMENTS: ${{ github.event.inputs.max_improvements || '15' }}
          AAIS_AUTO_COMMIT: 'true'
          AAIS_AUTO_PUSH: 'false'
          AAIS_MIN_HEALTH: '80'
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
        run: |
          node automation/ai-app-improvement-specialist.cjs run

      - name: Push changes
        if: success()
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No changes to push"
            exit 0
          fi

          echo "Changes detected, syncing with origin/main before push..."
          git fetch origin main

          if ! git rebase origin/main; then
            echo "::warning::Rebase failed. Skipping push for this run."
            git rebase --abort || true
            exit 0
          fi

          git push origin HEAD:main || {
            echo "::warning::Push rejected after rebase. Skipping without failing workflow."
          }
      
      - name: Upload report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: improvement-report-${{ github.run_number }}
          path: |
            automation/reports/improvement-specialist/*.json
            automation/logs/aais-*.log
          if-no-files-found: ignore
          retention-days: 30
      
      - name: Comment on commit (if changes made)
        if: success()
        run: |
          if [ -f automation/reports/improvement-specialist/latest-report.json ]; then
            echo "📊 AI App Improvement Specialist completed successfully"
            echo "Report available in artifacts"
          fi

