name: AI Openclaw Incident Escalator

permissions:
  contents: read
  issues: write

on:
  schedule:
    - cron: '55 */6 * * *'
  workflow_dispatch:

jobs:
  incident-escalator:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Refresh Openclaw report (best effort)
        run: npm run openclaw:autonomous-once
        continue-on-error: true

      - name: Escalate sustained Openclaw unhealthy state
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          export COOLDOWN_HOURS=$(node -p "try{const j=require('./automation/reports/incident-suppression-registry-latest.json');Number(j.openclawCooldownHours||j.recommendedCooldownHours||12)}catch(e){12}")
          cooldown_hours="$COOLDOWN_HOURS"
          report="automation/reports/openclaw-autonomous-app-improver-latest.json"
          [ -f "$report" ] || exit 0
          unhealthy=$(node -e "const fs=require('fs');const r=JSON.parse(fs.readFileSync('$report','utf8'));const checks=[(r.contractFailures||0)>=1,(r.lowValueCycles||0)>=8,(r.parseFailures||0)>=8,(r.failures||0)>(r.successes||0)+8];console.log(checks.some(Boolean)?'1':'0')")
          if [ "$unhealthy" = "0" ]; then
            echo "Openclaw healthy enough, no escalation needed."
            existing=$(gh issue list --state open --search "in:title Openclaw incident: sustained unhealthy autonomous cycles" --json number --jq '.[0].number')
            if [ -n "${existing:-}" ] && [ "${existing}" != "null" ]; then
              gh issue close "$existing" --comment "Auto-closing: Openclaw incident signals recovered in latest run."
            fi
            exit 0
          fi
          title="Openclaw incident: sustained unhealthy autonomous cycles"
          body_file="openclaw-incident.md"
          {
            echo "## Openclaw incident escalation"
            echo ""
            echo "- Report: \`automation/reports/openclaw-autonomous-app-improver-latest.json\`"
            echo "- Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ""
            node -e "const fs=require('fs');const r=JSON.parse(fs.readFileSync('$report','utf8'));console.log('- successes: '+Number(r.successes||0));console.log('- failures: '+Number(r.failures||0));console.log('- contractFailures: '+Number(r.contractFailures||0));console.log('- parseFailures: '+Number(r.parseFailures||0));console.log('- lowValueCycles: '+Number(r.lowValueCycles||0));console.log('- actionsFound: '+Number(r.actionsFound||0));"
            echo ""
            echo "Please investigate Openclaw worker quality, auth contract stability, and runtime freshness."
          } > "$body_file"
          existing=$(gh issue list --state open --search "in:title $title" --json number,updatedAt --jq '.[0]')
          if [ -n "${existing:-}" ] && [ "${existing}" != "null" ]; then
            issue_number=$(echo "$existing" | node -e "const fs=require('fs');const d=JSON.parse(fs.readFileSync(0,'utf8'));process.stdout.write(String(d.number||''))")
            issue_updated_at=$(echo "$existing" | node -e "const fs=require('fs');const d=JSON.parse(fs.readFileSync(0,'utf8'));process.stdout.write(String(d.updatedAt||''))")
            fresh_update=$(node -e "const ts=Date.parse(process.argv[1]||''); const h=Number(process.env.COOLDOWN_HOURS||process.argv[2]||12); if(!Number.isFinite(ts)){process.stdout.write('0');process.exit(0)} const ageHours=(Date.now()-ts)/3600000; process.stdout.write(ageHours < h ? '1' : '0');" "$issue_updated_at" "$cooldown_hours")
            if [ "$fresh_update" = "1" ]; then
              echo "Cooldown active for issue #$issue_number; skipping duplicate issue/comment."
              exit 0
            fi
            gh issue comment "$issue_number" --body-file "$body_file" || true
            exit 0
          fi
          gh issue create --title "$title" --body-file "$body_file" --label bug || true
