name: Workflow YAML sanity

permissions:
  contents: read

on:
  pull_request:
    paths:
      - ".github/workflows/**/*.yml"
      - ".github/workflows/**/*.yaml"
      - "scripts/automation/parse-github-workflows-yaml.rb"
  push:
    branches: [main]
    paths:
      - ".github/workflows/**/*.yml"
      - ".github/workflows/**/*.yaml"
      - "scripts/automation/parse-github-workflows-yaml.rb"
  workflow_dispatch:

concurrency:
  group: workflow-yaml-sanity-${{ github.ref }}
  cancel-in-progress: true

jobs:
  yaml-parse:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Parse all workflow YAML files
        run: ruby scripts/automation/parse-github-workflows-yaml.rb
