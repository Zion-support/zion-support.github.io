name: Workflow YAML sanity

permissions:
  contents: read

on:
  pull_request:
    paths:
      - ".github/workflows/**/*.yml"
      - ".github/workflows/**/*.yaml"
  push:
    branches: [main]
    paths:
      - ".github/workflows/**/*.yml"
      - ".github/workflows/**/*.yaml"
  workflow_dispatch:

concurrency:
  group: workflow-yaml-sanity-${{ github.ref }}
  cancel-in-progress: true

jobs:
  yaml-parse:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Parse all workflow YAML files
        run: |
          set -euo pipefail
          ruby <<'RUBY'
          require 'yaml'
          files = Dir.glob('.github/workflows/**/*.{yml,yaml}')
          raise 'No workflow files found.' if files.empty?
          failed = []
          files.each do |f|
            begin
              YAML.load_file(f)
              puts "ok: #{f}"
            rescue => e
              warn "error: #{f}: #{e.class}: #{e.message}"
              failed << f
            end
          end
          unless failed.empty?
            warn "YAML parse failures: #{failed.join(', ')}"
            exit 1
          end
          RUBY
