name: Workflow YAML sanity

permissions:
  contents: read

on:
  pull_request:
    paths:
      - ".github/workflows/**/*.yml"
      - ".github/workflows/**/*.yaml"
      - "scripts/automation/parse-github-workflows-yaml.rb"
      - "scripts/automation/run-workflow-grep-guards.sh"
  push:
    branches: [main]
    paths:
      - ".github/workflows/**/*.yml"
      - ".github/workflows/**/*.yaml"
      - "scripts/automation/parse-github-workflows-yaml.rb"
      - "scripts/automation/run-workflow-grep-guards.sh"
  workflow_dispatch:

concurrency:
  group: workflow-yaml-sanity-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Parse workflow YAML (syntax + job contracts)
        run: ruby scripts/automation/parse-github-workflows-yaml.rb

      - name: Workflow grep guards (pin, permissions, push policy)
        run: bash scripts/automation/run-workflow-grep-guards.sh
