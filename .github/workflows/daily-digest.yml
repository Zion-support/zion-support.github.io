name: Daily Automation Digest

on:
  schedule:
    - cron: '0 8 * * *'  # Every day at 08:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate automation digest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID || '8435383377' }}
        run: |
          node automation/daily-automation-digest.cjs

      - name: Upload digest artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: automation-digest
          path: |
            .hermes/memory/digest-latest.json
            .hermes/memory/digest-daily.log
          retention-days: 7
