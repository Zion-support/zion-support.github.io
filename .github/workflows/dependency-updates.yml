name: Dependency Updates

on:
  schedule:
    - cron: '0 3 * * 1'  # Run weekly on Monday at 3 AM UTC
  workflow_dispatch:
    inputs:
      update_type:
        description: 'Type of dependencies to update'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - production
          - development
          - security

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dependencies:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          
      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Check for outdated dependencies
        id: outdated
        run: |
          echo "Checking for outdated dependencies..."
          
          case "${{ github.event.inputs.update_type }}" in
            "production")
              yarn outdated --level=minor || echo "No production updates available"
              ;;
            "development")
              yarn outdated --level=patch || echo "No development updates available"
              ;;
            "security")
              yarn audit --audit-level=moderate || echo "No security updates available"
              ;;
            *)
              yarn outdated || echo "No updates available"
              ;;
          esac
          
          # Check if there are any updates
          if yarn outdated --json | jq -e '.data.body | length > 0' > /dev/null 2>&1; then
            echo "updates=true" >> $GITHUB_OUTPUT
          else
            echo "updates=false" >> $GITHUB_OUTPUT
          fi

      - name: Update dependencies
        if: steps.outdated.outputs.updates == 'true'
        run: |
          case "${{ github.event.inputs.update_type }}" in
            "production")
              yarn upgrade --latest
              ;;
            "development")
              yarn upgrade-interactive --latest
              ;;
            "security")
              yarn audit --fix
              ;;
            *)
              yarn upgrade --latest
              ;;
          esac

      - name: Install updated dependencies
        if: steps.outdated.outputs.updates == 'true'
        run: yarn install --frozen-lockfile

      - name: Run tests to verify updates
        if: steps.outdated.outputs.updates == 'true'
        run: |
          yarn build
          yarn test:ci
        continue-on-error: true

      - name: Check for changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changes=true" >> $GITHUB_OUTPUT
            git add .
            git commit -m "chore(deps): update dependencies" || echo "No changes to commit"
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.changes == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(deps): update dependencies"
          title: "chore(deps): update dependencies"
          body: |
            Automated dependency updates
            
            This PR updates dependencies to their latest versions.
            
            - Update type: ${{ github.event.inputs.update_type || 'all' }}
            - Generated by: dependency-updates workflow
            - Date: $(date -u +%Y-%m-%d)
            
            Please review the changes and ensure all tests pass.
          branch: automation/dependency-updates
          delete-branch: true
          signoff: false
          labels: |
            automation
            dependencies
            maintenance

      - name: Enable Auto-merge
        if: steps.cpr.outputs.pull-request-number
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
          merge-method: squash

  cleanup:
    runs-on: ubuntu-latest
    needs: update-dependencies
    if: always()
    steps:
      - name: Cleanup
        run: |
          echo "Dependency update workflow completed"
          echo "Status: ${{ needs.update-dependencies.result }}"