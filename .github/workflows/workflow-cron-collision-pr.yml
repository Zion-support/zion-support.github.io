name: Workflow cron collision report (PR / main)
permissions:
  contents: read
on:
  pull_request:
    paths:
      - .github/workflows/**
      - automation/ai-cron-collision-tuner.cjs
  push:
    branches:
      - main
    paths:
      - .github/workflows/**
      - automation/ai-cron-collision-tuner.cjs
  workflow_dispatch: null
concurrency:
  group: workflow-cron-collision-pr-${{ github.ref }}
  cancel-in-progress: true
jobs:
  collision-report:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      NEXT_TELEMETRY_DISABLED: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false
      - name: Generate cron collision report
        run: node automation/ai-cron-collision-tuner.cjs
      - name: Upload cron collision report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: cron-collision-pr-${{ github.run_id }}
          path: |
            automation/reports/cron-collision-latest.json
            automation/reports/cron-collision-latest.md
          if-no-files-found: ignore
          retention-days: 14
