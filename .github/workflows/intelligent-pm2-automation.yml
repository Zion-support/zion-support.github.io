name: Intelligent PM2 Automation CI/CD

on:
  push:
    branches: [main, develop, feature/*]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * *' # Daily at 2 AM
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
          - development

env:
  NODE_VERSION: '18'
  PM2_VERSION: 'latest'

jobs:
  intelligent-analysis:
    name: AI-Powered Code Analysis
    runs-on: ubuntu-latest
    outputs:
      quality-score: ${{ steps.quality-analysis.outputs.score }}
      security-score: ${{ steps.security-analysis.outputs.score }}
      performance-score: ${{ steps.performance-analysis.outputs.score }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          npm install -g pm2@${{ env.PM2_VERSION }}

      - name: AI Code Quality Analysis
        id: quality-analysis
        run: |
          node scripts/automation/ai-code-quality-analyzer.cjs
          echo "score=$(cat logs/quality-score.txt)" >> $GITHUB_OUTPUT

      - name: Security Intelligence Scan
        id: security-analysis
        run: |
          node scripts/automation/ai-security-intelligence.cjs
          echo "score=$(cat logs/security-score.txt)" >> $GITHUB_OUTPUT

      - name: Performance Prediction Analysis
        id: performance-analysis
        run: |
          node scripts/automation/ai-performance-predictor.cjs
          echo "score=$(cat logs/performance-score.txt)" >> $GITHUB_OUTPUT

      - name: Upload Analysis Reports
        uses: actions/upload-artifact@v4
        with:
          name: analysis-reports
          path: |
            logs/quality-report.json
            logs/security-report.json
            logs/performance-report.json

  intelligent-testing:
    name: Intelligent Testing Suite
    runs-on: ubuntu-latest
    needs: intelligent-analysis
    if: needs.intelligent-analysis.outputs.quality-score >= 70
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download Analysis Reports
        uses: actions/download-artifact@v4
        with:
          name: analysis-reports

      - name: Run Intelligent Test Suite
        run: |
          node scripts/automation/intelligent-test-orchestrator.cjs
          npm run test:comprehensive

      - name: Generate Test Intelligence Report
        run: |
          node scripts/automation/test-intelligence-generator.cjs

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            logs/test-intelligence-report.json
            coverage/

  intelligent-build:
    name: AI-Optimized Build
    runs-on: ubuntu-latest
    needs: [intelligent-analysis, intelligent-testing]
    if: always() && (needs.intelligent-analysis.result == 'success' || needs.intelligent-testing.result == 'success')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: AI Build Optimization
        run: |
          node scripts/automation/ai-build-optimizer.cjs
          npm run build

      - name: Bundle Analysis
        run: |
          node scripts/automation/bundle-intelligence-analyzer.cjs

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            .next/
            out/
            dist/

  intelligent-deployment:
    name: Smart Deployment
    runs-on: ubuntu-latest
    needs: [intelligent-analysis, intelligent-testing, intelligent-build]
    if: always() && (needs.intelligent-analysis.result == 'success' || needs.intelligent-testing.result == 'success' || needs.intelligent-build.result == 'success')
    environment: ${{ github.event.inputs.environment || 'staging' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install PM2
        run: npm install -g pm2@${{ env.PM2_VERSION }}

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Intelligent Deployment Strategy
        run: |
          node scripts/automation/intelligent-deployment-strategy.cjs
          pm2 deploy ecosystem.enhanced-intelligent-v3.cjs ${{ github.event.inputs.environment || 'staging' }}

      - name: Post-Deployment Health Check
        run: |
          node scripts/automation/post-deployment-health-check.cjs

      - name: Deployment Intelligence Report
        run: |
          node scripts/automation/deployment-intelligence-generator.cjs

  intelligent-monitoring:
    name: Continuous Intelligence Monitoring
    runs-on: ubuntu-latest
    needs: intelligent-deployment
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Start Intelligent Monitoring
        run: |
          node scripts/automation/continuous-intelligence-monitor.cjs

      - name: Generate Monitoring Report
        run: |
          node scripts/automation/monitoring-intelligence-report.cjs

  notification:
    name: Intelligent Notifications
    runs-on: ubuntu-latest
    needs:
      [
        intelligent-analysis,
        intelligent-testing,
        intelligent-build,
        intelligent-deployment,
      ]
    if: always()
    steps:
      - name: Send Intelligent Notifications
        run: |
          node scripts/automation/intelligent-notification-system.cjs
