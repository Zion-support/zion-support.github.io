name: content-generation
'on':
  workflow_dispatch: {}
  schedule:
    - cron: 0 */2 * * *
permissions:
  contents: write
  actions: read
jobs:
  generate-content:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Run workflow
        run: |
          echo "Workflow completed successfully"
          
