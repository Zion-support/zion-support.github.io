name: AI App Improvement Daily Quick
permissions:
  contents: write
on:
  schedule:
    - cron: 0 8 * * *
  workflow_dispatch:
    inputs:
      auto_commit:
        description: Commit and push changes to main
        required: false
        default: true
        type: boolean
      trigger_deploy:
        description: Trigger Netlify deploy after push
        required: false
        default: false
        type: boolean
concurrency:
  group: autonomous-main-writer
  cancel-in-progress: false
jobs:
  daily-quick:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_TELEMETRY_DISABLED: '1'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          token: ${{ github.token }}
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false
      - name: Run app improvement daily quick pipeline
        env:
          AUTO_COMMIT: ${{ (github.event_name == 'schedule' || github.event.inputs.auto_commit != 'false') && '1' || '' }}
          TRIGGER_DEPLOY: ${{ ((github.event_name == 'schedule') || (github.event.inputs.trigger_deploy == 'true')) && '1' || '' }}
          NETLIFY_BUILD_HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
        run: node automation/ai-app-improvement-daily-quick-pipeline.cjs
