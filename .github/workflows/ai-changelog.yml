name: AI Changelog (DISABLED - Migrated to PM2)

on:

    - cron: '0 0 * * *'
  workflow_dispatch: {}

permissions:
concurrency:
  group: "github.workflow-${{ github.ref }}"
  cancel-in-progress: true

  contents: write

jobs:

  generate:
      - name: Checkout
        uses: actions/checkout@v4
          with:
            fetch-depth: 0
fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
          with:
            node-version: \'20\'
            cache: \'npm\'
node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Generate AI changelog
        run: node automation/ai-changelog-generator.cjs || true
      - name: Commit and push
