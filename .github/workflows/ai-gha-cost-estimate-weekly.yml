name: AI GHA scheduled cost estimate

permissions:
  contents: read

on:
  schedule:
    - cron: '12 15 * * 0'
  workflow_dispatch:

concurrency:
  group: ai-gha-cost-estimate
  cancel-in-progress: false

jobs:
  estimate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'

      - name: Estimate scheduled CI minutes
        run: node automation/gha-workflow-cost-estimator.cjs

      - name: Upload report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: gha-workflow-cost-${{ github.run_id }}
          path: automation/reports/gha-workflow-cost-estimate-latest.json
          if-no-files-found: ignore
          retention-days: 90
