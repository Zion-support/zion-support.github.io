# Scheduled scan for unresolved merge conflict markers on main (complements PR-scoped checks).

name: Merge conflict markers (weekly)

permissions:
  contents: read

on:
  schedule:
    - cron: '42 6 * * 0' # Sundays 06:42 UTC
  workflow_dispatch:

concurrency:
  group: workflow-merge-conflict-markers-weekly
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'

      - name: Check tracked files for merge conflict markers
        run: node scripts/automation/check-merge-conflict-markers.cjs
