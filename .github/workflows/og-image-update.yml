name: og-image-update
'on':
  schedule:
    - cron: 0 2 * * *
  workflow_dispatch: null
permissions:
  contents: read
  actions: read
concurrency:
  group: og-image-update-${{ github.ref }}
  cancel-in-progress: true
jobs:
  main:
    name: Main Job
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: npm
    - name: Install dependencies
      run: npm ci
    - name: Clean git state
      run: 'git config --global user.name "github-actions[bot]"

  generate:
          fetch-depth: 0
      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run og image update
        run: |
          echo "Optimizing media..."
          echo "This would handle media optimization and generation"
      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: workflow-results
          path: |
            .github/workflows/
          retention-days: 7
    runs_on: ubuntu-latest
