name: Deployment & Release Management

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - production

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: |
        npm ci
        cd server && npm ci
        
    - name: Type checking
      run: npm run type-check:all
      
    - name: Linting
      run: npm run lint:all
      
    - name: Build frontend
      run: npm run build
      
    - name: Build backend
      run: npm run build:backend
      
    - name: Run tests
      run: npm test || echo "No tests configured"
      
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: |
          dist/
          server/dist/
        retention-days: 30

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    environment: staging
    
    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts
        
    - name: Deploy to staging
      run: |
        echo "Deploying to staging environment..."
        # Add your staging deployment commands here
        # Example: rsync, scp, or deployment scripts
        
    - name: Health check staging
      run: |
        echo "Performing health check on staging..."
        # Add health check commands here
        # Example: curl, wget, or custom health check scripts

  deploy-production:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    environment: production
    
    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts
        
    - name: Deploy to production
      run: |
        echo "Deploying to production environment..."
        # Add your production deployment commands here
        # Example: rsync, scp, or deployment scripts
        
    - name: Health check production
      run: |
        echo "Performing health check on production..."
        # Add health check commands here
        # Example: curl, wget, or custom health check scripts
        
    - name: Notify deployment success
      if: success()
      run: |
        echo "Production deployment successful!"
        # Add notification commands here
        # Example: Slack, Discord, or email notifications

  post-deployment:
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always()
    
    steps:
    - name: Generate deployment report
      run: |
        echo "=== Deployment Report ===" > deployment-report.md
        echo "Generated on: $(date)" >> deployment-report.md
        echo "" >> deployment-report.md
        echo "## Deployment Summary" >> deployment-report.md
        echo "- Environment: ${{ github.event.inputs.environment || 'auto' }}" >> deployment-report.md
        echo "- Branch: ${{ github.ref }}" >> deployment-report.md
        echo "- Commit: ${{ github.sha }}" >> deployment-report.md
        echo "- Trigger: ${{ github.event_name }}" >> deployment-report.md
        
        if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
          echo "- Type: Automatic production deployment" >> deployment-report.md
        elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
          echo "- Type: Staging deployment for PR" >> deployment-report.md
        elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          echo "- Type: Manual deployment to ${{ github.event.inputs.environment }}" >> deployment-report.md
        fi
        
        echo "" >> deployment-report.md
        echo "## Build Information" >> deployment-report.md
        echo "- Frontend build size: $(du -sh dist/ 2>/dev/null || echo 'N/A')" >> deployment-report.md
        echo "- Backend build size: $(du -sh server/dist/ 2>/dev/null || echo 'N/A')" >> deployment-report.md
        
    - name: Upload deployment report
      uses: actions/upload-artifact@v4
      with:
        name: deployment-report
        path: deployment-report.md
        retention-days: 90

  cleanup:
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production, post-deployment]
    if: always()
    
    steps:
    - name: Cleanup old artifacts
      run: |
        echo "Cleaning up old deployment artifacts..."
        # Add cleanup commands here if needed
        
    - name: Update deployment status
      run: |
        echo "Deployment process completed"
        # Add any final status updates here