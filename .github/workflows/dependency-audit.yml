name: Dependency Audit
'on':
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * *'
permissions:
  contents: read
  issues: write
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run npm audit
        id: npm_audit
        continue-on-error: true
        run: |
          npm audit --json > audit-report.json || true
          npm audit --audit-level=high > audit-high.txt || true
      - name: Check for high/critical vulnerabilities
        run: |
          if [ -s audit-high.txt ]; then
            echo "::error::High/critical vulnerabilities found"
            cat audit-high.txt
            exit 1
          fi
      - name: Check outdated dependencies
        id: outdated
        continue-on-error: true
        run: npm outdated --json > outdated-report.json || true
      - name: Create issue on audit failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const audit = fs.readFileSync('audit-report.json', 'utf8');
            const high = fs.readFileSync('audit-high.txt', 'utf8');
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Dependency audit failed on ${context.sha.slice(0,7)}`,
              body: `High/critical vulnerabilities detected.\n\n\`\`\`\n${high.slice(0, 4000)}\n\`\`\``
            })
      - name: Create issue on outdated dependencies
        if: steps.outdated.outcome == 'success' && steps.outdated.conclusion == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const outdated = fs.readFileSync('outdated-report.json', 'utf8');
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Outdated dependencies on ${context.sha.slice(0,7)}`,
              body: `Outdated dependencies detected.\n\n\`\`\`\n${outdated.slice(0, 4000)}\n\`\`\``
            })
