# AI Services & Content Automation
# Promotes under-featured Zion AI products to front page and creates new product pages.
# Runs without LLM (heuristic/template fallback) — no OPENROUTER_API_KEY required.
# Schedule: 2x daily (6 AM + 6 PM UTC) for more services and content on front page

name: AI Services & Content Automation

permissions:
  contents: write

on:
  schedule:
    - cron: '0 6 * * 0'
    - cron: '0 18 * * 0'
    - cron: '0 6 * * 1'
    - cron: '0 18 * * 1'
    - cron: '0 6 * * 2'
    - cron: '0 18 * * 2'
    - cron: '0 6 * * 3'
    - cron: '0 18 * * 3'
    - cron: '0 6 * * 4'
    - cron: '0 18 * * 4'
    - cron: '0 6 * * 5'
    - cron: '0 18 * * 5'
    - cron: '0 6 * * 6'
    - cron: '0 18 * * 6'
  workflow_dispatch:
    inputs:
      skip_services_advertise:
        description: 'Skip services advertiser (promote apps to front page)'
        required: false
        default: false
        type: boolean
      skip_product_pages:
        description: 'Skip product page creator'
        required: false
        default: false
        type: boolean
      skip_template_blog:
        description: 'Skip template blog creation'
        required: false
        default: false
        type: boolean
      skip_template_case_studies:
        description: 'Skip template case studies'
        required: false
        default: false
        type: boolean
      max_product_pages:
        description: 'New product pages to create (default 4)'
        required: false
        default: '4'
      max_add:
        description: 'Max apps to promote to front page (default 8)'
        required: false
        default: '8'
      trigger_deploy:
        description: 'Trigger Netlify deploy after commit'
        required: false
        default: true
        type: boolean

jobs:
  services-content:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run services and content automation
        env:
          AUTO_COMMIT: "1"
          SKIP_IDEATION: "1"
          SKIP_BLOG: "1"
          SKIP_FRONT_PAGE: "1"
          SKIP_SERVICES_ADVERTISE: ${{ github.event.inputs.skip_services_advertise && '1' || '' }}
          SKIP_PRODUCT_PAGES: ${{ github.event.inputs.skip_product_pages && '1' || '' }}
          SKIP_TEMPLATE_BLOG: ${{ github.event.inputs.skip_template_blog && '1' || '' }}
          SKIP_TEMPLATE_CASE_STUDIES: ${{ github.event.inputs.skip_template_case_studies && '1' || '' }}
          MAX_PRODUCT_PAGES: ${{ github.event.inputs.max_product_pages || '4' }}
          MAX_TEMPLATE_BLOG: "2"
          MAX_TEMPLATE_CASE_STUDIES: "2"
          MAX_ADD: ${{ github.event.inputs.max_add || '8' }}
          TRIGGER_DEPLOY: ${{ github.event.inputs.trigger_deploy != 'false' && '1' || '' }}
          NETLIFY_BUILD_HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          node automation/ai-services-and-content-automation.cjs
          git add -A
          git diff --staged --quiet || git commit -m "chore(content): AI services and content - promote apps, new product pages"
          git push
