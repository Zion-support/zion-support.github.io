# AI Services & Content Automation
# Promotes under-featured Zion AI products to front page and creates new product pages.
# Runs without LLM (heuristic/template fallback) — no OPENROUTER_API_KEY required.
# Schedule: Mon + Wed + Fri + Sat 6 AM UTC (4x/week for more services and content on front page)

name: AI Services & Content Automation

permissions:
  contents: write

on:
  schedule:
    - cron: '0 6 * * 1'
    - cron: '0 6 * * 3'
    - cron: '0 6 * * 5'
    - cron: '0 6 * * 6'
  workflow_dispatch:
    inputs:
      skip_services_advertise:
        description: 'Skip services advertiser (promote apps to front page)'
        required: false
        default: false
        type: boolean
      skip_product_pages:
        description: 'Skip product page creator'
        required: false
        default: false
        type: boolean
      max_product_pages:
        description: 'New product pages to create (default 3)'
        required: false
        default: '3'
      trigger_deploy:
        description: 'Trigger Netlify deploy after commit'
        required: false
        default: true
        type: boolean

jobs:
  services-content:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run services and content automation
        env:
          AUTO_COMMIT: "1"
          SKIP_IDEATION: "1"
          SKIP_BLOG: "1"
          SKIP_FRONT_PAGE: "1"
          SKIP_SERVICES_ADVERTISE: ${{ github.event.inputs.skip_services_advertise && '1' || '' }}
          SKIP_PRODUCT_PAGES: ${{ github.event.inputs.skip_product_pages && '1' || '' }}
          MAX_PRODUCT_PAGES: ${{ github.event.inputs.max_product_pages || '3' }}
          MAX_ADD: "5"
          TRIGGER_DEPLOY: ${{ github.event.inputs.trigger_deploy != 'false' && '1' || '' }}
          NETLIFY_BUILD_HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          node automation/ai-services-and-content-automation.cjs
          git add -A
          git diff --staged --quiet || git commit -m "chore(content): AI services and content - promote apps, new product pages"
          git push
