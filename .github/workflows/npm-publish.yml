name: Package Validation

on:
  # Disabled - no triggers
  # push:
  #   branches:
  #     - main
  #   paths-ignore:
  #     - '**/*.md'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test --if-present

      - name: Build project
        run: npm run build

      - name: Validate package
        run: |
          echo "Package validation completed successfully"
          echo "Package name: $(npm run --silent echo:name)"
          echo "Package version: $(npm run --silent echo:version)"
          echo "Package is private: $(npm run --silent echo:private)"
