name: NPM Package Check

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - '.github/**'
      - 'docs/**'

jobs:
  check:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build project
        run: npm run build

      - name: Verify package
        run: |
          echo "Package verification completed"
          echo "Package name: $(npm run --silent echo \$npm_package_name)"
          echo "Package version: $(npm run --silent echo \$npm_package_version)"
          echo "Package private: $(npm run --silent echo \$npm_package_private)"
