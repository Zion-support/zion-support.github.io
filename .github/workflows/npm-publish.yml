name: Publish npm package

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
      - '.github/**'
      - 'docs/**'
      - 'tests/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run tests
        run: yarn test:ci
        continue-on-error: true

      - name: Build project
        run: yarn build

      - name: Check package.json
        run: |
          if [ ! -f "package.json" ]; then
            echo "package.json not found"
            exit 1
          fi
          
          # Check if package is private
          if jq -e '.private == true' package.json > /dev/null; then
            echo "Package is marked as private, skipping publish"
            exit 0
          fi
          
          # Check if package name exists
          if ! jq -e '.name' package.json > /dev/null; then
            echo "Package name not found in package.json"
            exit 1
          fi

      - name: Publish to npm
        if: success()
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create release
        if: success()
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release v${{ github.run_number }}
          body: |
            Automated release from CI/CD pipeline
            
            - Build: ${{ github.run_number }}
            - Commit: ${{ github.sha }}
            - Branch: ${{ github.ref }}
          draft: false
          prerelease: false
