name: Autonomous Release Guardian

permissions:
  contents: read
  issues: write

concurrency:
  group: autonomous-release-guardian
  cancel-in-progress: false

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  release-guardian:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      RELEASE_GUARDIAN_BASE_URL: https://ziontechgroup.com
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Run release guardian
        run: npm run autonomy:release-guardian

      - name: Upload release guardian artifacts
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
        with:
          name: autonomous-release-guardian-${{ github.run_id }}
          path: |
            automation/reports/autonomous-release-guardian-latest.json
            automation/reports/autonomous-release-guardian-latest.md
          if-no-files-found: error
          retention-days: 30

      - name: Escalate release health incident
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          report="automation/reports/autonomous-release-guardian-latest.json"
          [ -f "$report" ] || exit 0
          severity=$(node -e "const fs=require('fs');const r=JSON.parse(fs.readFileSync('$report','utf8'));console.log(r.severity||'ok')")
          if [ "$severity" = "ok" ]; then
            echo "No release incident to escalate."
            exit 0
          fi
          unhealthy=$(node -e "const fs=require('fs');const r=JSON.parse(fs.readFileSync('$report','utf8'));console.log(r.unhealthyCount||0)")
          title="Autonomous Release Guardian alert (${unhealthy} unhealthy routes)"
          body_file="autonomous-release-guardian-incident.md"
          {
            echo "## Release guardian alert"
            echo ""
            echo "- Repository: \`${{ github.repository }}\`"
            echo "- Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "- Severity: \`$severity\`"
            echo "- Unhealthy routes: \`$unhealthy\`"
            echo ""
            echo "### Route list"
            node -e "const fs=require('fs');const r=JSON.parse(fs.readFileSync('$report','utf8'));for(const route of (r.unhealthyRoutes||[])){console.log('- '+route)}"
          } > "$body_file"
          gh issue create --title "$title" --body-file "$body_file" --label bug || true
