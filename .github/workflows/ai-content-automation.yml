# AI Content Automation
# Generates blog posts and front-page content via OpenRouter (openrouter/free).
# Runs: Tue/Thu/Sat 4 AM UTC for faster content deployment, or workflow_dispatch
# Requires: OPENROUTER_API_KEY in repo secrets

name: AI Content Automation

permissions:
  contents: write

on:
  schedule:
    - cron: '0 4 * * 2,4,6'
  workflow_dispatch:
    inputs:
      pipeline:
        description: 'Pipeline (fast=2 posts, turbo=4 posts + ideation, services=industries+blog)'
        required: false
        default: 'turbo'
        type: choice
        options:
          - fast
          - turbo
          - services
      max_blog_posts:
        description: 'Max blog posts (default: turbo=4, fast=2)'
        required: false
        default: ''
      skip_front_page:
        description: 'Skip front page expansion'
        required: false
        default: false
        type: boolean

jobs:
  content:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run content pipeline
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: openrouter/free
          MAX_BLOG_POSTS: ${{ github.event.inputs.max_blog_posts || '4' }}
          SKIP_FRONT_PAGE: ${{ github.event.inputs.skip_front_page && '1' || '' }}
        run: |
          if [ "${{ github.event.inputs.pipeline }}" = "fast" ]; then
            node automation/ai-content-fast-pipeline.cjs
          elif [ "${{ github.event.inputs.pipeline }}" = "services" ]; then
            node automation/ai-services-and-content-automation.cjs
          else
            node automation/ai-content-turbo-pipeline.cjs
          fi

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore(content): AI-generated content via OpenRouter pipeline"
          git push
