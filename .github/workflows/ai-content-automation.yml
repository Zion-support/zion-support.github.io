# AI Content Automation
# Generates blog posts and front-page content via OpenRouter (openrouter-free).
# Runs: Tue/Thu 4 AM UTC, or workflow_dispatch
# Requires: OPENROUTER_API_KEY in repo secrets

name: AI Content Automation

on:
  schedule:
    - cron: '0 4 * * 2,4'
  workflow_dispatch:
    inputs:
      max_blog_posts:
        description: 'Max blog posts to generate (default 2)'
        required: false
        default: '2'
      skip_front_page:
        description: 'Skip front page expansion'
        required: false
        default: false
        type: boolean

jobs:
  content:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run content pipeline
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: openrouter/free
          MAX_BLOG_POSTS: ${{ github.event.inputs.max_blog_posts || '2' }}
          SKIP_FRONT_PAGE: ${{ github.event.inputs.skip_front_page && '1' || '' }}
        run: node automation/ai-content-fast-pipeline.cjs

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore(content): AI-generated content via OpenRouter pipeline"
          git push
