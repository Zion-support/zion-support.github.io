name: AI Openclaw Auth Runtime Diagnostic

permissions:
  contents: read
  issues: write

concurrency:
  group: ai-openclaw-auth-runtime-diagnostic
  cancel-in-progress: false

on:
  schedule:
    - cron: '25 */6 * * *'
  workflow_dispatch:

jobs:
  auth-runtime-diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Run Openclaw auth/runtime diagnostic
        run: npm run openclaw:auth:diagnose
        continue-on-error: true

      - name: Attempt Openclaw self-heal cycle before escalation
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          report="automation/reports/openclaw-auth-runtime-diagnostic-latest.json"
          [ -f "$report" ] || exit 0
          status=$(node -e "const fs=require('fs');const r=JSON.parse(fs.readFileSync('$report','utf8'));console.log(r.status||'unknown')")
          if [ "$status" = "ok" ]; then
            exit 0
          fi
          gh workflow run ai-openclaw-autonomous-cycle.yml || true

      - name: Upload diagnostic artifact
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
        with:
          name: openclaw-auth-runtime-diagnostic-${{ github.run_id }}
          path: automation/reports/openclaw-auth-runtime-diagnostic-latest.json
          if-no-files-found: ignore
          retention-days: 30

      - name: Open issue on diagnostic failure
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          export COOLDOWN_HOURS=$(node -p "try{const j=require('./automation/reports/incident-suppression-registry-latest.json');Number(j.openclawCooldownHours||j.recommendedCooldownHours||12)}catch(e){12}")
          cooldown_hours="$COOLDOWN_HOURS"
          report="automation/reports/openclaw-auth-runtime-diagnostic-latest.json"
          [ -f "$report" ] || exit 0
          status=$(node -e "const fs=require('fs');const r=JSON.parse(fs.readFileSync('$report','utf8'));console.log(r.status||'unknown')")
          if [ "$status" = "ok" ]; then
            echo "Openclaw auth/runtime diagnostic healthy."
            existing=$(gh issue list --state open --search "in:title Openclaw auth/runtime diagnostic warning" --json number --jq '.[0].number')
            if [ -n "${existing:-}" ] && [ "${existing}" != "null" ]; then
              gh issue close "$existing" --comment "Auto-closing: Openclaw auth/runtime checks recovered."
            fi
            exit 0
          fi
          title="Openclaw auth/runtime diagnostic warning"
          body_file="openclaw-auth-runtime-diagnostic.md"
          {
            echo "## Openclaw auth/runtime diagnostic warning"
            echo ""
            echo "- Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "- Report: \`automation/reports/openclaw-auth-runtime-diagnostic-latest.json\`"
            echo ""
            node -e "const fs=require('fs');const r=JSON.parse(fs.readFileSync('$report','utf8'));console.log('### Failing checks');for(const c of (r.failingChecks||[])){console.log('- '+c)}"
            echo ""
            echo "Please remediate Openclaw runtime/auth drift and re-run diagnostic."
          } > "$body_file"
          existing=$(gh issue list --state open --search "in:title $title" --json number,updatedAt --jq '.[0]')
          if [ -n "${existing:-}" ] && [ "${existing}" != "null" ]; then
            issue_number=$(echo "$existing" | node -e "const fs=require('fs');const d=JSON.parse(fs.readFileSync(0,'utf8'));process.stdout.write(String(d.number||''))")
            issue_updated_at=$(echo "$existing" | node -e "const fs=require('fs');const d=JSON.parse(fs.readFileSync(0,'utf8'));process.stdout.write(String(d.updatedAt||''))")
            fresh_update=$(node -e "const ts=Date.parse(process.argv[1]||''); const h=Number(process.env.COOLDOWN_HOURS||process.argv[2]||12); if(!Number.isFinite(ts)){process.stdout.write('0');process.exit(0)} const ageHours=(Date.now()-ts)/3600000; process.stdout.write(ageHours < h ? '1' : '0');" "$issue_updated_at" "$cooldown_hours")
            if [ "$fresh_update" = "1" ]; then
              echo "Cooldown active for issue #$issue_number; skipping duplicate issue/comment."
              exit 0
            fi
            gh issue comment "$issue_number" --body-file "$body_file" || true
            exit 0
          fi
          gh issue create --title "$title" --body-file "$body_file" --label bug || true
