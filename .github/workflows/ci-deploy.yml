name: Auto-Deploy to GitHub Pages
on:
  push:
    branches: [main]
    paths-ignore:
      - 'logs/**'
      - '*.log'
      - 'Zion_Brain_Log.md'
      - 'MEMORY.md'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        env:
          NEXT_PUBLIC_BASE_PATH: /zion.app
          NEXT_TELEMETRY_DISABLED: 'true'
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  monitor:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Verify deployment
        run: |
          echo "🔍 Checking https://zion.app..."
          if curl -f -s -o /dev/null -w "%{http_code}" "https://zion.app" | grep -q "200"; then
            echo "✅ Deployment confirmed healthy"
          else
            echo "⚠️ Health check failed, triggering redeploy..."
            curl -X POST \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/Zion-support/zion.app/actions/workflows/ci-deploy.yml/runs" \
              -d '{"ref":"main"}'
          fi
        continue-on-error: true