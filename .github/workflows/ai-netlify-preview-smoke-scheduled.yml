name: AI Netlify preview smoke

permissions:
  contents: read
  issues: write

concurrency:
  group: ai-netlify-preview-smoke-scheduled
  cancel-in-progress: false

on:
  workflow_dispatch:
  schedule:
    - cron: '15 */2 * * *'

jobs:
  preview:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Ensure smoke / SLO labels exist
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create automation-slo-warning --color FBCA04 --description "Automation SLO warning" 2>/dev/null || true
          gh label create automation-slo-critical --color B60205 --description "Automation SLO critical" 2>/dev/null || true
          gh label create automation-smoke-transport --color C5DEF5 --description "Smoke transport/DNS" 2>/dev/null || true
          gh label create automation-smoke-http --color F9D0C4 --description "Smoke HTTP errors" 2>/dev/null || true

      - name: Resolve deploy URL context
        run: |
          set -euo pipefail
          if [ -f automation/reports/deploy-status-latest.json ]; then
            netlify_url=$(node -e "const fs=require('fs');const p='automation/reports/deploy-status-latest.json';try{const j=JSON.parse(fs.readFileSync(p,'utf8'));process.stdout.write((j.netlifyDeployUrl||'').trim())}catch{process.stdout.write('')}")
            if [ -n "$netlify_url" ]; then
              echo "NETLIFY_DEPLOY_URL=$netlify_url" >> "$GITHUB_ENV"
            fi
          fi

      - name: Netlify preview smoke
        id: netlify_preview
        continue-on-error: true
        env:
          NETLIFY_DEPLOY_URL: ${{ env.NETLIFY_DEPLOY_URL }}
          SMOKE_NETLIFY_MAX_ROUTES: '6'
        run: node scripts/automation/smoke-netlify-deploy-preview.cjs

      - name: Append smoke health snapshot
        if: always()
        run: node scripts/automation/append-smoke-health-snapshot.cjs

      - name: Upload Netlify preview smoke report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: netlify-preview-smoke-${{ github.run_id }}
          path: automation/reports/netlify-preview-smoke-latest.json
          if-no-files-found: ignore
          retention-days: 30

      - name: Route drift diagnostics for HTTP-class preview failures
        if: steps.netlify_preview.outcome != 'success'
        continue-on-error: true
        env:
          SITEMAP_URL: https://ziontechgroup.com/sitemap.xml
        run: |
          set -euo pipefail
          report="automation/reports/netlify-preview-smoke-latest.json"
          [ -f "$report" ] || exit 0
          fc=$(node -e "const fs=require('fs');try{const r=JSON.parse(fs.readFileSync('$report','utf8'));process.stdout.write(String(r.failureClass||''))}catch{process.stdout.write('')}")
          case "$fc" in
            http|mixed)
              node automation/app-route-sitemap-drift.cjs || true
              ;;
            *)
              echo "Skipping route drift diagnostics for failure class: ${fc:-unknown}"
              ;;
          esac

      - name: Escalate on Netlify preview smoke failure
        if: steps.netlify_preview.outcome != 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          report="automation/reports/netlify-preview-smoke-latest.json"
          [ -f "$report" ] || exit 0
          skipped=$(node -e "const fs=require('fs');try{const r=JSON.parse(fs.readFileSync('$report','utf8'));process.stdout.write(r.skipped ? '1' : '0')}catch{process.stdout.write('1')}")
          [ "$skipped" = "0" ] || exit 0
          fc=$(node -e "const fs=require('fs');try{const r=JSON.parse(fs.readFileSync('$report','utf8'));process.stdout.write(String(r.failureClass||'unknown'))}catch{process.stdout.write('unknown')}")
          drift_summary=$(node -e "const fs=require('fs');const p='automation/reports/app-route-sitemap-drift-latest.json';try{const j=JSON.parse(fs.readFileSync(p,'utf8'));const miss=(j.inAppNotSitemap||[]).length;const stale=(j.inSitemapNotApp||[]).length;process.stdout.write('inAppNotSitemap='+miss+', inSitemapNotApp='+stale)}catch{process.stdout.write('n/a')}")
          body_file="netlify-preview-smoke-fail.md"
          {
            echo "## Netlify preview smoke failed"
            echo ""
            echo "- **Dedupe key:** \`netlify-preview-smoke\`"
            echo "- **Failure class:** \`$fc\` (transport vs HTTP routing)"
            echo "- **Route drift diagnostics:** ${drift_summary}"
            echo ""
            echo "- Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ""
            node -e "const fs=require('fs');const r=JSON.parse(fs.readFileSync('$report','utf8'));console.log('```json');console.log(JSON.stringify(r.routes.filter(x=>!x.ok),null,2));console.log('```');"
          } > "$body_file"
          export ISSUE_TITLE="Netlify preview smoke failed"
          export ISSUE_FINGERPRINT="netlify-preview-smoke"
          export COOLDOWN_HOURS="2"
          case "$fc" in
            transport)
              export ISSUE_LABELS="bug,automation,automation-slo-warning,automation-smoke-transport"
              ;;
            http)
              export ISSUE_LABELS="bug,automation,automation-slo-warning,automation-smoke-http"
              ;;
            mixed)
              export ISSUE_LABELS="bug,automation,automation-slo-warning,automation-smoke-transport,automation-smoke-http"
              ;;
            *)
              export ISSUE_LABELS="bug,automation,automation-slo-warning"
              ;;
          esac
          export ISSUE_BODY_FILE="$body_file"
          node scripts/automation/gh-issue-dedupe-or-create.cjs || true

      - name: Escalate repeated preview failures (streak)
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          NETLIFY_PREVIEW_SMOKE_STREAK_AUTHORITY: '1'
        run: node scripts/automation/escalate-netlify-preview-smoke.cjs || true

      - name: Upload route drift diagnostics
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: netlify-preview-route-drift-${{ github.run_id }}
          path: automation/reports/app-route-sitemap-drift-latest.json
          if-no-files-found: ignore
          retention-days: 30

      - name: Close Netlify preview smoke issue on recovery
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_FINGERPRINT: netlify-preview-smoke
          CLOSE_COMMENT: "Auto-closing: Netlify preview smoke passed."
        run: |
          set -euo pipefail
          report="automation/reports/netlify-preview-smoke-latest.json"
          [ -f "$report" ] || exit 0
          ok=$(node -e "const fs=require('fs');try{const r=JSON.parse(fs.readFileSync('$report','utf8'));const passed=!r.skipped&&Number(r.unhealthyCount||0)===0;process.stdout.write(passed?'1':'0')}catch{process.stdout.write('0')}")
          [ "$ok" = "1" ] || exit 0
          node scripts/automation/gh-issue-close-on-recovery.cjs || true

      - name: Close repeated-preview issue on recovery
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_FINGERPRINT: netlify-preview-smoke-repeated
          CLOSE_COMMENT: "Auto-closing: Netlify preview smoke streak cleared."
        run: |
          set -euo pipefail
          report="automation/reports/netlify-preview-smoke-latest.json"
          [ -f "$report" ] || exit 0
          ok=$(node -e "const fs=require('fs');try{const r=JSON.parse(fs.readFileSync('$report','utf8'));const passed=!r.skipped&&Number(r.unhealthyCount||0)===0;process.stdout.write(passed?'1':'0')}catch{process.stdout.write('0')}")
          [ "$ok" = "1" ] || exit 0
          node scripts/automation/gh-issue-close-on-recovery.cjs || true
