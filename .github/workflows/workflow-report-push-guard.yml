name: Workflow report push guard

permissions:
  contents: read

on:
  pull_request:
    paths:
      - ".github/workflows/**/*.yml"
      - ".github/workflows/**/*.yaml"
  push:
    branches: [main]
    paths:
      - ".github/workflows/**/*.yml"
      - ".github/workflows/**/*.yaml"
  workflow_dispatch:

jobs:
  check-push-guards:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Reject unguarded direct pushes to main
        run: |
          set -euo pipefail
          mapfile -t hits < <(grep -RIn --include='*.yml' --include='*.yaml' 'git push origin HEAD:main' .github/workflows | grep -v 'workflow-report-push-guard.yml:' || true)
          violations=()
          for rec in "${hits[@]}"; do
            line="${rec#*:*:}"
            [[ "$line" =~ ^[[:space:]]*# ]] && continue
            if [[ "$line" == *"if ! git push origin HEAD:main"* ]]; then continue; fi
            if [[ "$line" == *"if git push origin HEAD:main"* ]]; then continue; fi
            if [[ "$line" == *"||"* ]]; then continue; fi
            violations+=("$rec")
          done
          if [ ${#violations[@]} -gt 0 ]; then
            echo "::error::Unguarded push to main — use 'if ! git push …; then …', 'if git push …; then …', or append '|| …' / '(push || echo …)' fallback:"
            printf '%s\n' "${violations[@]}"
            exit 1
          fi
          echo "All workflow pushes to main are guarded."
