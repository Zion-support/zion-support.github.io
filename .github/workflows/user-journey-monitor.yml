name: User Journey & Critical Path Monitor

on:
  schedule:
    - cron: '30 9 * * *'   # Daily 09:30 UTC
  workflow_dispatch:       # Manual trigger

permissions:
  contents: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run User Journey Monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID || '8435383377' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node automation/user-journey-monitor.cjs

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: user-journey-report
          path: |
            .hermes/memory/user-journey/daily-aggregates.json
            .hermes/memory/user-journey/history.json
            .hermes/memory/user-journey/monitor.log
          retention-days: 30
