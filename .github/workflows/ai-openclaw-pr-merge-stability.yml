name: OpenClaw PR merge stability

permissions:
  contents: read

concurrency:
  group: openclaw-pr-merge-stability-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    paths:
      - 'automation/**'
      - 'package.json'
      - 'package-lock.json'

jobs:
  merge-stability:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Fetch base ref for PR diff
        run: git fetch origin "${{ github.base_ref }}" --depth=64

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: OpenClaw autonomy stability
        run: npm run openclaw:autonomy:stability

      - name: PR report-only budget (mirrors pre-commit for bots)
        env:
          PR_BUDGET_BASE: origin/${{ github.base_ref }}
        run: node automation/openclaw-report-commit-budget-pr.cjs

      - name: Lint check
        run: npm run lint:check
