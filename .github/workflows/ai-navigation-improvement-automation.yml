# AI Navigation Improvement Automation
# Audits ziontechgroup.com navigation + site links with OpenRouter LLM suggestions.
# Runs: Weekly Thursday 9 AM UTC, or workflow_dispatch
#
# Setup: Add OPENROUTER_API_KEY to repo secrets for LLM suggestions.

name: AI Navigation Improvement Automation

permissions:
  contents: read

on:
  schedule:
    - cron: '0 9 * * 4'
  workflow_dispatch:
    inputs:
      create_pages:
        description: 'Create missing pages via OpenRouter'
        required: false
        default: false
        type: boolean

jobs:
  nav-improve:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run navigation & pages audit
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.create_pages }}" = "true" ]; then
            npm run nav:pages:audit-create
          else
            npm run nav:pages:audit
          fi

      - name: Upload reports
        uses: actions/upload-artifact@v7
        with:
          name: nav-pages-reports
          path: |
            automation/reports/navigation-audit-latest.json
            automation/reports/navigation-improvement-audit-latest.json
            automation/reports/site-link-audit-latest.json
            automation/reports/navigation-pages-audit-latest.json
          if-no-files-found: ignore
