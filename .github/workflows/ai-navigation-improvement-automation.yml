# AI Navigation Improvement Automation
# Audits ziontechgroup.com navigation with OpenRouter LLM, suggests improvements.
# Runs: Weekly Thursday 9 AM UTC, or workflow_dispatch
#
# Setup: Add OPENROUTER_API_KEY to repo secrets for LLM suggestions.

name: AI Navigation Improvement Automation

on:
  schedule:
    - cron: '0 9 * * 4'
  workflow_dispatch:

jobs:
  nav-improve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run navigation improvement audit
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: npm run nav:improve

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: nav-improvement-report
          path: automation/reports/navigation-improvement-audit-latest.json
          if-no-files-found: ignore
