name: Emergency Recovery - Minimal Build
on:
  workflow_dispatch:
  push:
    branches: [main]
jobs:
  recovery:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: rm -rf node_modules .next node
      - run: npm install --force
      - run: npm run build
