name: AI Mid-Week Auto-Implementation

permissions:
  contents: write

concurrency:
  group: ai-midweek-auto-impl
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 14 * * 3'
  workflow_dispatch:

jobs:
  auto-impl:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      SKIP_TELEGRAM: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Run Auto-Implementation (ecosystem intel + suggestion importer)
        run: node automation/ai-auto-implementation-agent.cjs run

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet automation/ .github/ 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
          git diff --stat automation/ .github/ 2>/dev/null || true

      - name: Commit and push automation updates
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add automation/ automation/cron/ .github/
          git diff --staged --quiet || git commit -m "chore(automation): mid-week ecosystem suggestions"
          git push origin HEAD:main 2>/dev/null || echo "Push skipped (may need manual merge)"
