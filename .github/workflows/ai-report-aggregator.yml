name: AI Report Aggregator

permissions:
  contents: read

concurrency:
  group: ai-report-aggregator
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 11 * * 1'
  workflow_dispatch:

jobs:
  report-aggregator:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Run health monitor
        run: node automation/ai-automation-health-monitor.cjs
        continue-on-error: true

      - name: Run Report Aggregator
        run: node automation/ai-report-aggregator-agent.cjs

      - name: Upload aggregate dashboard
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: aggregate-dashboard-${{ github.run_id }}
          path: |
            automation/reports/aggregate-dashboard.json
            automation/reports/aggregate-dashboard.html
          if-no-files-found: ignore
          retention-days: 30
