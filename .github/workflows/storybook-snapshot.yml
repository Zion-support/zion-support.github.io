name: Storybook Snapshot Regeneration

on:
  schedule:
    - cron: '0 9 * * *'  # Daily at 9 AM UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: storybook-snapshot
  cancel-in-progress: true

jobs:
  storybook-regeneration:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          npm install --save-dev @storybook/cli @storybook/testing-library

      - name: Check schema changes
        id: schema
        run: |
          if [ -f scripts/check-schema-changes.sh ]; then
            ./scripts/check-schema-changes.sh
          fi

      - name: Run Storybook Snapshot Regenerator
        if: steps.schema.outputs.changed == 'true'
        run: node automation/storybook-snapshot-regenerator.cjs

      - name: Create regression issue if needed
        if: steps.schema.outputs.changed == 'true'
        env:
          GH_TOKEN: *** secrets.GITHUB_TOKEN }}
        run: |
          if [ -f .hermes/memory/storybook-regression-report.json ]; then
            REPORT=$(cat .hermes/memory/storybook-regression-report.json)
            TITLE=$(echo "$REPORT" | jq -r .title)
            BODY=$(echo "$REPORT" | jq -r .body)
            gh issue create --title "$TITLE" --body "$BODY" --label "storybook,visual-regression" || true
          fi

      - name: Upload snapshot artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: storybook-snapshots
          path: .hermes/memory/storybook-snapshots/
          retention-days: 7