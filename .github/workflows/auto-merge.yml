name: Auto-merge labeled PRs

on:
  pull_request_target:
    types: [labeled, unlabeled, opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    if: >-
      ${
        {
          contains(github.event.pull_request.labels.*.name, 'automerge') &&
          github.event.pull_request.draft == false
        }
      }
    runs-on: ubuntu-latest
    steps:
      - name: Ensure required checks are successful
        id: checks
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const { data: combined } = await github.repos.getCombinedStatusForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: pr.head.sha,
            });
            // Conclusion can be success, failure, pending etc. If no statuses, allow merge by default.
            const state = combined.state || 'success';
            core.info(`Combined status: ${state}`);
            core.setOutput('ok', state === 'success');

      - name: Enable PR auto-merge (squash)
        if: steps.checks.outputs.ok == 'true'
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          merge-method: squash
          pull-request-number: ${{ github.event.pull_request.number }}

