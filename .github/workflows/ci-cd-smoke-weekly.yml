name: CI/CD pipeline smoke (weekly)
permissions:
  contents: read
on:
  schedule:
    - cron: 56 10 * * 4
  workflow_dispatch: null
concurrency:
  group: ci-cd-smoke-weekly
  cancel-in-progress: true
jobs:
  ci-cd-anchors:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: ci-cd.yml anchors
        run: |
          set -euo pipefail
          f=.github/workflows/ci-cd.yml
          test -f "$f"
          test -s "$f"
          grep -Fq 'name: CI/CD Pipeline' "$f"
          grep -Fq 'branches: [main, develop]' "$f"
          grep -Fq 'pull_request:' "$f"
          grep -Fq 'workflow_dispatch:' "$f"
          grep -Fq 'github.workflow' "$f"
          grep -Fq 'npm ci --prefer-offline --no-audit --fund=false' "$f"
          grep -Fq 'npm run automation:preflight' "$f"
          grep -Fq 'npm run type-check' "$f"
          grep -Fq 'npm run test:ci' "$f"
          echo "ok: $f"
