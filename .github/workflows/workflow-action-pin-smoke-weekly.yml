name: Workflow action pin smoke (weekly)
permissions:
  contents: read
on:
  schedule:
    - cron: 20 6 * * 0
  workflow_dispatch: null
concurrency:
  group: workflow-action-pin-smoke-weekly
  cancel-in-progress: true
jobs:
  pin:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Canonical action pins (grep --pin)
        run: bash scripts/automation/run-workflow-grep-guards.sh --pin
