name: AI autonomous self-heal factory
permissions:
  contents: read
  issues: write
on:
  workflow_dispatch: null
  schedule:
    - cron: '*/10 * * * *'
concurrency:
  group: ai-autonomous-self-heal-factory
  cancel-in-progress: true
jobs:
  self_heal:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      NEXT_TELEMETRY_DISABLED: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false
      - name: Run self-heal factory
        id: factory
        run: node automation/autonomous-self-heal-factory.cjs
      - name: Build fix-agent plan
        run: node automation/autonomous-fix-agent-factory.cjs
      - name: Open deduped issue on critical status
        if: steps.factory.outputs.factory_status == 'critical'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_TITLE: Autonomous self-heal factory critical findings
          ISSUE_BODY_FILE: automation/reports/autonomous-fix-agent-plan-latest.md
          ISSUE_LABELS: automation,self-heal,critical
          ISSUE_FINGERPRINT: autonomous-self-heal-factory-critical
          COOLDOWN_HOURS: '6'
        run: |
          export ISSUE_FINGERPRINT="autonomous-self-heal-factory-critical"
          node scripts/automation/gh-issue-dedupe-or-create.cjs
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: autonomous-self-heal-factory-${{ github.run_id }}
          path: |
            automation/reports/autonomous-self-heal-factory-latest.json
            automation/reports/autonomous-fix-agent-queue.json
            automation/reports/autonomous-fix-agent-plan-latest.json
            automation/reports/autonomous-fix-agent-plan-latest.md
          if-no-files-found: ignore
          retention-days: 14
