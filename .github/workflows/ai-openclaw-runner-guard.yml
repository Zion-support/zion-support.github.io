name: OpenClaw runner guard

permissions:
  contents: read
  issues: write

on:
  schedule:
    - cron: '35 */6 * * *'
  workflow_dispatch:

concurrency:
  group: openclaw-runner-guard
  cancel-in-progress: true

jobs:
  dry-run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Refresh OpenClaw action queue + policy + handoff
        run: |
          npm run openclaw:actions:queue || true
          npm run openclaw:actions:policy || true
          node automation/openclaw-autonomy-handoff.cjs || true

      - name: Runner dry-run (must pass unless policy/queue inconsistent)
        id: runner
        run: npm run openclaw:runner
        continue-on-error: true

      - name: Open deduped issue on runner failure
        if: steps.runner.outcome != 'success'
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          ISSUE_TITLE: "[automation] OpenClaw runner dry-run failed"
          ISSUE_LABELS: "automation,openclaw"
          ISSUE_FINGERPRINT: "openclaw-runner-guard|dry-run-fail|v2"
          COOLDOWN_HOURS: "6"
          ISSUE_BODY_FILE: "automation/reports/openclaw-runner-guard-issue.md"
        run: |
          set -euo pipefail
          body="$ISSUE_BODY_FILE"
          {
            echo "## OpenClaw approved-action runner dry-run failed"
            echo ""
            echo "The scheduled \`ai-openclaw-runner-guard\` job detected \`npm run openclaw:runner\` exit non-zero."
            echo ""
            echo "Common causes: stale \`openclaw-action-approved-queue-latest.json\` vs \`openclaw-action-policy-latest.json\`, or missing policy snapshot."
            echo ""
            echo "Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ""
            echo "**Dedupe key:** \`openclaw-runner-guard|dry-run-fail|v2\`"
            if [ -f automation/reports/openclaw-runner-latest.json ]; then
              echo ""
              echo '```json'
              node -e "const fs=require('fs');process.stdout.write(fs.readFileSync('automation/reports/openclaw-runner-latest.json','utf8').slice(0,12000))"
              echo ""
              echo '```'
            fi
          } > "$body"
          node scripts/automation/gh-issue-dedupe-or-create.cjs
