name: OpenClaw runner guard

permissions:
  contents: read
  issues: write

on:
  schedule:
    - cron: '35 */6 * * *'
  workflow_dispatch:

concurrency:
  group: openclaw-runner-guard
  cancel-in-progress: true

jobs:
  dry-run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Restore OpenClaw runner guard cross-run state
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            automation/reports/openclaw-runner-guard-state.json
            automation/reports/openclaw-runner-history.json
          key: openclaw-runner-guard-v1-${{ github.repository }}

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Refresh OpenClaw action queue + policy + handoff
        run: |
          npm run openclaw:actions:queue || true
          npm run openclaw:actions:policy || true
          node automation/openclaw-autonomy-handoff.cjs || true

      - name: Runner dry-run (must pass unless policy/queue inconsistent)
        id: runner
        run: npm run openclaw:runner
        continue-on-error: true

      - name: Self-heal refresh + one retry on runner failure
        id: runner_retry
        if: steps.runner.outcome != 'success'
        run: |
          npm run openclaw:actions:queue || true
          npm run openclaw:actions:policy || true
          node automation/openclaw-autonomy-handoff.cjs || true
          npm run openclaw:runner
        continue-on-error: true

      - name: Update runner guard streak + bounded history
        id: guard_state
        if: always()
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          HEALTHY_STREAK_TO_CLOSE: '2'
        run: node scripts/automation/openclaw-runner-guard-state.cjs

      - name: Close fingerprint issue after healthy streak
        if: (steps.runner.outcome == 'success' || steps.runner_retry.outcome == 'success') && steps.guard_state.outputs.should_close == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          ISSUE_FINGERPRINT: 'openclaw-runner-guard|dry-run-fail|v2'
          CLOSE_COMMENT: >-
            Auto-closing: OpenClaw runner dry-run succeeded for consecutive scheduled runs
            (openclaw-runner-guard streak satisfied).
        run: node scripts/automation/gh-issue-close-on-recovery.cjs

      - name: Prepare severity labels for runner incident
        if: steps.runner.outcome != 'success' && steps.runner_retry.outcome != 'success'
        run: |
          echo "RUNNER_SEVERITY_LABEL=${{ steps.guard_state.outputs.severity_label }}" >> "$GITHUB_ENV"
          echo "RUNNER_REASON_CLASS=${{ steps.guard_state.outputs.reason_class }}" >> "$GITHUB_ENV"
          echo "RUNNER_REASON_REPEATS=${{ steps.guard_state.outputs.reason_repeat_count }}" >> "$GITHUB_ENV"

      - name: Build issue body + open deduped issue on final runner failure
        if: steps.runner.outcome != 'success' && steps.runner_retry.outcome != 'success'
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          ISSUE_TITLE: '[automation] OpenClaw runner dry-run failed'
          ISSUE_LABELS: automation,openclaw,${{ env.RUNNER_SEVERITY_LABEL }}
          ISSUE_FINGERPRINT: 'openclaw-runner-guard|dry-run-fail|v2'
          COOLDOWN_HOURS: '6'
          ISSUE_BODY_FILE: automation/reports/openclaw-runner-guard-issue.md
          OPENCLAW_RUNNER_REASON_CLASS: ${{ env.RUNNER_REASON_CLASS }}
          OPENCLAW_RUNNER_REASON_REPEATS: ${{ env.RUNNER_REASON_REPEATS }}
          OPENCLAW_RUNNER_SELF_HEAL_ATTEMPTED: '1'
        run: |
          set -euo pipefail
          node scripts/automation/build-openclaw-runner-guard-issue-body.cjs
          node scripts/automation/gh-issue-dedupe-or-create.cjs
