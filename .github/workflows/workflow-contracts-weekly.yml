name: Workflow contracts weekly

permissions:
  contents: read

on:
  schedule:
    - cron: '25 10 * * 1' # Mondays 10:25 UTC — lightweight contract pass without a full npm install
  workflow_dispatch:

concurrency:
  group: workflow-contracts-weekly
  cancel-in-progress: true

jobs:
  contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Parse workflow YAML (syntax)
        run: ruby scripts/automation/parse-github-workflows-yaml.rb

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'

      - name: Workflow issue dedupe contract
        run: node scripts/automation/validate-workflow-issue-dedupe-contract.cjs

      - name: Workflow integrity audit
        run: node automation/github-workflow-integrity-auditor.cjs

      - name: Strict action SHA pin audit
        run: PIN_ACTIONS_STRICT=true node scripts/automation/pin-actions-weekly.cjs

      - name: Cron schedule collision report
        run: node automation/ai-cron-collision-tuner.cjs

      - name: Upload cron collision report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: cron-collision-weekly-${{ github.run_id }}
          path: |
            automation/reports/cron-collision-latest.json
            automation/reports/cron-collision-latest.md
          if-no-files-found: ignore
          retention-days: 14
