name: WORKFLOW_NAME_PLACEHOLDER
'on':
  workflow_dispatch: {}
  schedule:
  - cron: '*/30 * * * *'
concurrency:
  group: workflow-workflow_name_placeholder-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: read
jobs:
  main:
    name: Main Job
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Run commitlint
        run: |
          # Get the last 50 commits and validate them
          git log --oneline -50 | cut -d' ' -f2- | npx commitlint --from HEAD~50 --to HEAD --verbose
