name: AI Autonomous Opportunity Radar Refresh

on:
  schedule:
    - cron: '17 5 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh-radar:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh autonomous opportunity radar report
        run: node automation/ai-autonomous-opportunity-radar-agent.cjs

      - name: Commit report updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f automation/reports/autonomous-opportunity-radar-latest.json
          git diff --cached --quiet || (git commit -m "chore(automation): refresh autonomous opportunity radar report" && (git push origin HEAD:main || echo "::warning::Push rejected (remote may have advanced main)."))

      - name: Upload report artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: autonomous-opportunity-radar-${{ github.run_id }}
          path: automation/reports/autonomous-opportunity-radar-latest.json
