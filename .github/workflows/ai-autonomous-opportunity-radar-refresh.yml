name: AI Autonomous Opportunity Radar Refresh

on:
  schedule:
    - cron: '17 5 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh-radar:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh autonomous opportunity radar report
        run: node automation/ai-autonomous-opportunity-radar-agent.cjs

      - name: Commit report updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add automation/reports/autonomous-opportunity-radar-latest.json
          git diff --cached --quiet || (git commit -m "chore(automation): refresh autonomous opportunity radar report" && git push origin HEAD:main)

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: autonomous-opportunity-radar-${{ github.run_id }}
          path: automation/reports/autonomous-opportunity-radar-latest.json
