name: Auto PR + Automerge

on:
  push:
    branches-ignore:
      - main

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: workflow-workflow_name_placeholder-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: write
  actions: read
jobs:
  main:
    name: Main Job
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: npm
    - name: Install dependencies
      run: npm ci
    - name: Clean git state
      run: 'git config --global user.name "github-actions[bot]"

  open-and-automerge:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

        git rebase --abort 2>/dev/null || true

        rm -rf .git/rebase-merge .git/rebase-apply 2>/dev/null || true

        git reset --hard HEAD

        git clean -fd'
    - name: Run automation
      run: echo "Automation workflow placeholder - customize as needed"
