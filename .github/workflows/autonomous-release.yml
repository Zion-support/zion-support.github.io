name: Autonomous Release

on:

    branches: [main]
  workflow_dispatch: {}

permissions:
concurrency:
  group: "github.workflow-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  create-release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
          with:
            fetch-depth: 0
fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
          with:
            node-version: \'20\'
            cache: \'npm\'
node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Determine version
        id: ver
          DATE_VER=$(date +"%Y.%m.%d")
          COUNT=$(git tag -l "v$DATE_VER.*" | wc -l | tr -d ' ')
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          NEXT=$((COUNT+1))
          echo "version=v$DATE_VER.$NEXT" >> $GITHUB_OUTPUT

      - name: Create tag
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
          echo "last=$LAST_TAG" >> $GITHUB_OUTPUT
          if [ "$LAST_TAG" = "none" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            if git rev-list "$LAST_TAG"..HEAD --count | grep -q '^[1-9]'; then
              echo "has_changes=true" >> $GITHUB_OUTPUT
            else
              echo "has_changes=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Create tag and release
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +"%Y.%m.%d")
          TAG="auto-$DATE.${{ github.run_number }}"
          git tag -a "$TAG" -m "Autonomous release $TAG"
          git push origin "$TAG"
          gh release create "$TAG" --prerelease --title "Autonomous $TAG" --notes "Automated changes from cloud orchestrations"

      - name: No changes
        if: steps.changes.outputs.has_changes != 'true'
        run: echo "No changes since last tag"