# AI Ultra-Fast Content Pipeline
# Maximum-velocity content: industry solution pages (template) + blog + front page + products.
# Runs at 10 AM UTC (between ideas-implementation 4 AM and 4 PM) for 3x daily content velocity.
# Phase 0 (industry pages) requires no LLM. Phase 1-2 require OPENROUTER_API_KEY.

name: AI Ultra-Fast Content

permissions:
  contents: write

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      max_blog_posts:
        description: 'Max blog posts (default 8)'
        required: false
        default: '8'
      max_product_pages:
        description: 'New product pages (default 2)'
        required: false
        default: '2'
      max_industry_pages:
        description: 'New industry solution pages (default 2)'
        required: false
        default: '2'
      trigger_deploy:
        description: 'Trigger Netlify deploy after commit'
        required: false
        default: true
        type: boolean

jobs:
  ultra-fast:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ultra-fast content pipeline
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: openrouter/free
          AUTO_COMMIT: "1"
          TRIGGER_DEPLOY: ${{ github.event.inputs.trigger_deploy != 'false' && '1' || '' }}
          NETLIFY_BUILD_HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
          MAX_BLOG_POSTS: ${{ github.event.inputs.max_blog_posts || '8' }}
          MAX_PRODUCT_PAGES: ${{ github.event.inputs.max_product_pages || '2' }}
          MAX_INDUSTRY_PAGES: ${{ github.event.inputs.max_industry_pages || '2' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          node automation/ai-ultra-fast-content-pipeline.cjs
          git add -A
          git diff --staged --quiet || git commit -m "chore(content): ultra-fast pipeline - industry pages + blog + front page + products"
          git push
