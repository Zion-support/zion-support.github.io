name: Workflow Node contracts only (manual)
permissions:
  contents: read
on:
  workflow_dispatch: null
concurrency:
  group: workflow-node-contracts-dispatch
  cancel-in-progress: true
jobs:
  contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: .nvmrc
      - name: Workflow contracts (dedupe, integrity, pin strict)
        run: npm run workflows:contracts:node
