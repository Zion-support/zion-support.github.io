name: Monetization Automation Daily
'on':
  workflow_dispatch: {}
  schedule:
    - cron: 0 2 * * *
jobs:
  monetization:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
        continue-on-error: true
      - name: Run monetization orchestrator (single cycle)
        if: always()
        run: node automation/monetization-orchestrator.cjs once | cat
        continue-on-error: true
      - name: Upload monetization artifacts
        uses: actions/upload-artifact@v4
        with:
          name: monetization-artifacts
          path: |
            data/reports/monetization/**/*
            automation/logs/**/*.log
          if-no-files-found: ignore
          retention-days: 7
        if: always()
      - name: Create summary
        if: always()
        run: |
          echo "## Monetization Daily Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** Monetization automation daily completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $(date -u)" >> $GITHUB_STEP_SUMMARY
    timeout-minutes: 30
    runs_on: ubuntu-latest
permissions:
  contents: read
  actions: read
concurrency:
  group: monetization-daily.yml-${{ github.ref }}
  cancel-in-progress: true
