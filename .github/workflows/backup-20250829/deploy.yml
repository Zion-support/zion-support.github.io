name: Deploy (DISABLED - Migrated to PM2)

on:
  # This workflow is disabled and migrated to PM2 automation
  # The original workflow was handling automation tasks
  # Now handled by PM2 processes as configured in ecosystem.config.cjs
  workflow_dispatch: # Only manual triggers allowed
  # All automatic triggers removed

jobs:
  disabled:
    runs-on: ubuntu-latest
    steps:
      - name: Workflow Disabled
        run: |
          echo "This workflow has been disabled and migrated to PM2 automation."
          echo "Automation tasks are now handled by PM2 processes:"
          echo "- console-error-fixer (every 15 minutes)"
          echo "- link-checker (every 30 minutes)"
          echo "- continuous-improvement (every 2 hours)"
          echo "- daily-build-test (every hour)"
          echo "- security-audit (every 4 hours)"
          echo "- dependency-updates (every 6 hours)"
          echo "- performance-monitor (every 2 hours)"
          echo "- quality-checks (every 3 hours)"
          echo "- link-integrity (every 2 hours)"
          echo "- front-maximizer (every 4 hours)"
          echo "- sitemap-runner (every 6 hours)"
          echo ""
          echo "PM2 ecosystem.config.cjs contains the full automation configuration."
          echo "Check PM2 status with: pm2 status"
          exit 0
