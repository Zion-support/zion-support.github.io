name: Workflow grep guards weekly

permissions:
  contents: read

on:
  schedule:
    - cron: '35 11 * * 3' # Wednesdays 11:35 UTC — shell guards (pin, permissions, push) without Node
  workflow_dispatch:

concurrency:
  group: workflow-grep-guards-weekly
  cancel-in-progress: true

jobs:
  grep-guards:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run all workflow grep guards
        run: bash scripts/automation/run-workflow-grep-guards.sh
