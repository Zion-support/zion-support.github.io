name: Workflow grep guards (weekly)
permissions:
  contents: read
on:
  schedule:
    - cron: 55 6 * * 0
  workflow_dispatch: null
concurrency:
  group: workflow-grep-guards-weekly
  cancel-in-progress: true
jobs:
  guards:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Run workflow grep guards (full)
        run: bash scripts/automation/run-workflow-grep-guards.sh
