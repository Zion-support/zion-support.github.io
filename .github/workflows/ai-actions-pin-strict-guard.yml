name: AI Actions pin strict guard

permissions:
  contents: read

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '.github/workflows/**'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'

concurrency:
  group: ai-actions-pin-strict-guard
  cancel-in-progress: true

jobs:
  strict-pin-audit:
    if: github.event_name == 'workflow_dispatch' || (vars.ACTIONS_PIN_STRICT == 'true' && (github.event_name == 'pull_request' || (github.event_name == 'push' && vars.ACTIONS_PIN_STRICT_MAIN_PUSH == 'true')))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Strict pin audit (fails if any external action is not SHA-pinned)
        run: npm run pin-actions:strict

      - name: Hint
        if: failure()
        run: |
          echo "::notice::Strict pin runs on pull_request (workflow file changes) when ACTIONS_PIN_STRICT=true. Optional: set ACTIONS_PIN_STRICT_MAIN_PUSH=true to also run on push to main. Set ACTIONS_PIN_STRICT=false to disable, or run npm run pin-actions / weekly pin workflow to SHA-pin remaining actions."
