name: Workflow Auto Healer Auto-Healer
'on':
  workflow_dispatch: {}
permissions:
  contents: write
  pull-requests: write
concurrency:
  group: workflow-auto-healer
  cancel-in-progress: false
jobs:
  detect-broken-workflows:
    name: 🔍 Detect Broken Workflows
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install PyYAML
        run: pip install pyyaml
      
      - name: Detect broken workflows
        id: count
        run: |
          BROKEN_COUNT=0
          BROKEN_FILES=""
          
          for file in .github/workflows/*.yml; do
            if ! python3 -c "import yaml; yaml.safe_load(open('$file'))" 2>/dev/null; then
              BROKEN_COUNT=$((BROKEN_COUNT + 1))
              BROKEN_FILES="$BROKEN_FILES $file"
              echo "❌ Broken workflow: $file"
            fi
          done
          
          echo "broken_count=$BROKEN_COUNT" >> $GITHUB_OUTPUT
          echo "broken_files=$BROKEN_FILES" >> $GITHUB_OUTPUT
          echo "Total broken workflows: $BROKEN_COUNT"
      
      - name: Create issue if workflows are broken
        if: steps.count.outputs.broken_count > 0
        uses: actions/github-script@v7
        with:
          script: >
            const invalidCount = '${{ steps.validate.outputs.invalid_count }}';

            const message = `🔧 **Workflow Auto-Healer Report**\n\nFound ${invalidCount} invalid workflow files that
            need manual attention.\n\nPlease review and fix these workflows manually.`;


            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['workflow-auto-healer']
            });
    runs_on: ubuntu-latest
