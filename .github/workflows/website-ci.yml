name: zion-website CI

on:
  push:
    branches: [ main ]
    paths:
      - 'zion-website/**'
      - 'netlify.toml'
      - '.github/workflows/website-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'zion-website/**'
      - 'netlify.toml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: zion-website
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: zion-website/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build

      - name: Lint (non-blocking)
        run: npm run lint || echo "Lint warnings/errors detected (non-blocking)"
