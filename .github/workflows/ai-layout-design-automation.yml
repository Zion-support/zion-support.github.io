# AI Layout Design Automation
# Full pipeline: UX audit + layout audit + implementation. Optional commit & deploy.
# Runs weekly Friday 11 UTC. Requires OPENROUTER_API_KEY, NETLIFY_BUILD_HOOK for deploy.

name: AI Layout Design Automation

permissions:
  contents: write

on:
  schedule:
    - cron: '0 11 * * 5'
  workflow_dispatch:
    inputs:
      auto_commit:
        description: 'Commit and push changes'
        required: false
        default: false
        type: boolean
      trigger_deploy:
        description: 'Trigger Netlify deploy after commit'
        required: false
        default: false
        type: boolean
      skip_ux_audit:
        description: 'Skip live site UX audit'
        required: false
        default: false
        type: boolean
      skip_layout_audit:
        description: 'Skip layout design audit'
        required: false
        default: false
        type: boolean

jobs:
  layout-automation:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run layout design automation pipeline
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          AUTO_COMMIT: ${{ github.event_name == 'schedule' && '0' || (github.event.inputs.auto_commit == 'true' && '1' || '') }}
          TRIGGER_DEPLOY: ${{ github.event.inputs.trigger_deploy == 'true' && '1' || '' }}
          NETLIFY_BUILD_HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
          SKIP_UX_AUDIT: ${{ github.event.inputs.skip_ux_audit == 'true' && '1' || '' }}
          SKIP_LAYOUT_AUDIT: ${{ github.event.inputs.skip_layout_audit == 'true' && '1' || '' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          node automation/ai-layout-design-automation-pipeline-full.cjs

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: layout-design-automation-${{ github.run_id }}
          path: |
            automation/reports/live-site-ux-audit-latest.json
            automation/reports/layout-design-audit-latest.json
            automation/reports/layout-design-implementation-latest.json
            automation/reports/layout-design-automation-pipeline-latest.json
          if-no-files-found: ignore
          retention-days: 30
