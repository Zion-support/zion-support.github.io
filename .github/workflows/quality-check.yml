name: Quality Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM

permissions:
  contents: read
  pull-requests: read

jobs:
  quality-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint
        continue-on-error: true

      - name: Type check
        run: npm run type-check
        continue-on-error: true

      - name: Security audit
        run: npm run security:scan
        continue-on-error: true

      - name: Run tests
        run: npm run test:ci
        continue-on-error: true

      - name: Build project
        run: npm run build
        continue-on-error: true

      - name: Check bundle size
        if: success()
        run: |
          if [ -d dist ]; then
            echo "Bundle size analysis:"
            du -sh dist/*
            echo "Total bundle size:"
            du -sh dist
          else
            echo "Build failed - no dist folder found"
          fi

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist/
          retention-days: 7

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let comment = '## Quality Check Results\n\n';
            
            // Check if build succeeded
            if (fs.existsSync('dist')) {
              comment += '✅ **Build**: Success\n';
              const stats = fs.statSync('dist');
              comment += `📦 **Bundle Size**: ${(stats.size / 1024 / 1024).toFixed(2)} MB\n`;
            } else {
              comment += '❌ **Build**: Failed\n';
            }
            
            comment += '\n---\n';
            comment += 'This comment was automatically generated by the quality check workflow.';
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });