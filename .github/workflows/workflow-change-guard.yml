name: Workflow Change Guard

permissions:
  contents: read

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - 'automation/**'
      - 'scripts/automation/**'
      - 'package.json'
      - 'package-lock.json'
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - 'automation/**'
      - 'scripts/automation/**'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

concurrency:
  group: workflow-change-guard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Parse workflow YAML (fail fast)
        run: npm run workflows:yaml-parse

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Automation preflight
        run: npm run automation:preflight

      - name: Workflow contracts (dedupe, integrity, pin)
        run: npm run workflows:contracts:node
