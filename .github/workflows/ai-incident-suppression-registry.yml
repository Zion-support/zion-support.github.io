name: AI Incident Suppression Registry

permissions:
  contents: write
  issues: read

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:

jobs:
  suppression-registry:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main

      - name: Write suppression registry snapshot
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
        run: |
          set -euo pipefail
          node automation/generate-incident-suppression-registry.cjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add automation/reports/incident-suppression-registry-latest.json
          if git diff --staged --quiet; then
            echo "No suppression registry changes."
            exit 0
          fi
          git commit -m "chore(reports): refresh incident suppression registry snapshot"
          git push origin HEAD:main
