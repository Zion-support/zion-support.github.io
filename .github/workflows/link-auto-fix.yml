name: Broken Link Auto-Fix

on:

    - cron: '7 4 * * 1'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: link-auto-fix
  cancel-in-progress: true

jobs:

  crawl-and-fix:
          fetch-depth: 0
      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
          with:
            node-version: \'20\'
            cache: \'npm\'
node-version: 20.x
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Crawl site links and attempt fixes
        run: node automation/site-link-crawler.cjs && node automation/site-link-fixer.cjs
      - name: Commit changes if any
        run: |
          git config user.email "link-bot@zion.app"
          git config user.name "Zion Link Bot"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "chore(links): auto-fix broken links"
            git push origin dev
          else
            echo "No changes"
          fi