name: Node.js CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund
        env:
          CI: true

      - name: Lint
        run: npm run lint
        env:
          CI: true

      - name: Type check
        run: npm run type-check
        env:
          CI: true

      - name: Build
        run: npm run build
        env:
          CI: true

      - name: Test
        run: npm test --silent
        env:
          CI: true