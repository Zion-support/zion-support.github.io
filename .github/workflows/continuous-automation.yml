name: Continuous Automation

on:
  schedule:
    - cron: '0 */6 * * *' # Every 6 hours
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  automation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run automation scripts
        run: |
          echo "🚀 Running automation scripts..."
          node scripts/automation/automation-orchestrator.cjs

      - name: Run comprehensive automation
        run: |
          echo "🎯 Running comprehensive automation..."
          node scripts/automation/comprehensive-continuous-automation.cjs

      - name: Run marketing automation
        run: |
          echo "📢 Running marketing automation..."
          node scripts/linkedin_automation.js

      - name: Security audit
        run: |
          echo "🔒 Running security audit..."
          npm audit

      - name: Upload automation reports
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: automation-reports
          path: automation-reports/

      - name: Upload automation logs
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: automation-logs
          path: automation/logs/
