name: ai aggregate regression alert workflow smoke (weekly)
permissions:
  contents: read
on:
  schedule:
    - cron: 0 13 * * 3
  workflow_dispatch: null
concurrency:
  group: ai-aggregate-regression-alert-smoke-weekly
  cancel-in-progress: true
jobs:
  aggregate-regression-alert-anchors:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: ai-aggregate-regression-alert.yml anchors
        run: |
          set -euo pipefail
          f=.github/workflows/ai-aggregate-regression-alert.yml
          test -f "$f"
          test -s "$f"
          grep -Fq 'name: AI aggregate regression alert' "$f"
          grep -Fq 'group: ai-aggregate-regression-alert' "$f"
          grep -Fq 'cancel-in-progress: false' "$f"
          grep -Fq "cron: '20 */12 * * *'" "$f"
          grep -Fq 'reports:aggregate' "$f"
          grep -Fq 'aggregate:regression:check' "$f"
          grep -Fq 'aggregate-regression-' "$f"
          grep -Fq 'aggregate-dashboard-regression-latest.json' "$f"
          grep -Fq 'aggregate-regression-escalate.cjs' "$f"
          grep -Fq 'gh-issue-close-on-recovery.cjs' "$f"
          grep -Fq 'actions/upload-artifact@' "$f"
          grep -Fq 'GH_TOKEN:' "$f" && grep -Fq 'github.token' "$f"
          echo "ok: $f"
