name: CI/CD Pipeline

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Restore Next.js cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-next-${{ hashFiles('**/package-lock.json') }}-
            ${{ runner.os }}-next-
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false
      - name: Automation preflight
        run: npm run automation:preflight
      - name: Lint
        run: npm run lint:check
      - name: Type check
        run: npm run type-check
      - name: Test
        run: npm run test:ci
      - name: Build
        id: build
        run: |
          npm run build
          if [ -d "out" ]; then
            PAGE_COUNT=$(find out -name '*.html' | wc -l)
            BUILD_SIZE=$(du -sh out | awk '{print $1}')
          elif [ -d ".next" ]; then
            PAGE_COUNT=$(find .next -name '*.html' 2>/dev/null | wc -l)
            BUILD_SIZE=$(du -sh .next | awk '{print $1}')
          else
            PAGE_COUNT=0
            BUILD_SIZE="unknown"
          fi
          echo "pages=$PAGE_COUNT" >> "$GITHUB_OUTPUT"
          echo "size=$BUILD_SIZE" >> "$GITHUB_OUTPUT"

      - name: Sitemap validation
        if: success()
        continue-on-error: true
        run: npm run sitemap:validate

      - name: CI Summary
        if: always()
        run: |
          {
            echo "## CI/CD Pipeline Results"
            echo ""
            echo "| Check | Status |"
            echo "|-------|--------|"
            echo "| Automation Preflight | ${{ steps.build.outcome != 'skipped' && '✅' || '❌' }} |"
            echo "| Lint | ${{ steps.build.outcome != 'skipped' && '✅' || '❌' }} |"
            echo "| Type Check | ${{ steps.build.outcome != 'skipped' && '✅' || '❌' }} |"
            echo "| Tests | ${{ steps.build.outcome != 'skipped' && '✅' || '❌' }} |"
            echo "| Build | ${{ steps.build.outcome == 'success' && '✅' || '❌' }} |"
            echo ""
            if [ "${{ steps.build.outcome }}" = "success" ]; then
              echo "**Build output:** ${{ steps.build.outputs.size }} (${{ steps.build.outputs.pages }} pages)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
