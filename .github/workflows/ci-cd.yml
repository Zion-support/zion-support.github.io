name: CI/CD Pipeline
on:
  push:
    branches: [ main, develop, feature/*, hotfix/* ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - production

env:
  NODE_VERSION: '20.18.1'
  NPM_VERSION: '10.0.0'

jobs:
  code-quality:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: package-lock.json
    - name: Install dependencies
      run: npm ci
    - name: Run linting
      run: npm run lint
    - name: Run type checking
      run: npm run type-check
    - name: Run security audit
      run: npm audit --audit-level=moderate || true

  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: code-quality
    timeout-minutes: 20
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: package-lock.json
    - name: Install dependencies
      run: npm ci
    - name: Build project
      run: npm run build
      env:
        NODE_OPTIONS: "--max-old-space-size=6144 --openssl-legacy-provider"
    - name: Verify build output
      run: |
        if [ ! -d dist ]; then
          echo "Build failed: dist folder not found"
          exit 1
        fi
        echo "✅ Build output verified - dist folder exists"
    - name: Archive build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist-build
        path: dist/
        retention-days: 7
    - name: Deploy to Netlify (Staging)
      if: github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/heads/feature/') || startsWith(github.ref, 'refs/heads/hotfix/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
      uses: nwtgck/actions-netlify@v2.0.0
      with:
        publish-dir: './dist'
        production-branch: main
        github-token: ${{ secrets.GITHUB_TOKEN }}
        netlify-auth-token: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        netlify-site-id: ${{ secrets.NETLIFY_SITE_ID_STAGING }}
        functions-dir: './netlify/functions'
        deploy-message: "Deploy from GitHub Actions (Staging)"
      timeout-minutes: 10
    - name: Deploy to Netlify (Production)
      if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
      uses: nwtgck/actions-netlify@v2.0.0
      with:
        publish-dir: './dist'
        production-branch: main
        github-token: ${{ secrets.GITHUB_TOKEN }}
        netlify-auth-token: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        netlify-site-id: ${{ secrets.NETLIFY_SITE_ID_PRODUCTION }}
        functions-dir: './netlify/functions'
        deploy-message: "Deploy from GitHub Actions (Production)"
      timeout-minutes: 10