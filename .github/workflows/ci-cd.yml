name: CI/CD Pipeline

permissions:
  contents: read

# Prevent overlapping workflow runs on same ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Restore Next.js cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            .next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-next-
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false
      - name: Automation preflight
        run: npm run automation:preflight
      - name: Lint
        run: |
          if npm run | grep -q "lint:check"; then
            npm run lint:check
          else
            npx eslint . --max-warnings 0
          fi
      - name: Type check
        run: npm run type-check
      - name: Test
        run: npm run test:ci
      - name: Build
        run: npm run build

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Deploy to Production
        run: echo "Deploy to production"
