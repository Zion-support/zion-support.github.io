name: CI/CD Pipeline (DISABLED - Migrated to PM2)

on:
  # This workflow is disabled and migrated to PM2 automation
  # The original workflow was handling CI/CD pipeline
  # Now handled by PM2 processes: daily-build-test (every hour), continuous-improvement (every 2 hours), quality-checks (every 3 hours)
  workflow_dispatch: # Only manual triggers allowed
  # All automatic triggers removed
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - production
env:
  NODE_VERSION: '20.18.1'
  NPM_VERSION: '10.0.0'
jobs:
  disabled:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run linting
      run: npm run lint
    
    - name: Run type check
      run: npm run type-check
    
    - name: Run tests
      run: npm test -- --passWithNoTests
    
    - name: Build application
      run: npm run build
    
    - name: Run security audit
      run: npm audit --audit-level moderate

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build application
      run: npm run build
    
    - name: Deploy to production
      run: echo "Deploying to production..."
      # Add your deployment commands here
