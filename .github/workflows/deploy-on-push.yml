# Deploy on Push to Main
# Triggers Netlify deploy when CI/CD succeeds on main.
# Requires: NETLIFY_BUILD_HOOK in repo secrets
# Runs: after ci-cd.yml completes successfully on main, or workflow_dispatch
# Optimized: No local build (CI already verified; Netlify builds from repo)

name: Deploy on Push

permissions:
  contents: write
  actions: write
  issues: write

concurrency:
  group: deploy-on-push-main
  cancel-in-progress: false

on:
  workflow_run:
    workflows: [CI/CD Pipeline]
    types:
      - completed
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ github.token }}
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Secret preflight
        env:
          REQUIRED_SECRETS: NETLIFY_BUILD_HOOK
          NETLIFY_BUILD_HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
        run: npm run secrets:preflight
        continue-on-error: true

      - name: Trigger Netlify deploy
        env:
          NETLIFY_BUILD_HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
        run: |
          set -euo pipefail
          if [ -n "$NETLIFY_BUILD_HOOK" ]; then
            curl --fail --silent --show-error --retry 3 --retry-delay 2 --max-time 30 -X POST -d {} "$NETLIFY_BUILD_HOOK"
            echo "Netlify deploy triggered successfully"
          else
            echo "::warning::NETLIFY_BUILD_HOOK not set. Proceeding without remote deploy trigger."
          fi

      - name: Write deploy status (triggered)
        env:
          GITHUB_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
        run: |
          DEPLOY_STATUS=triggered DEPLOY_STATUS_SOURCE=deploy-on-push npm run deploy:status:generate

      - name: Upload deploy status artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: deploy-status
          path: automation/reports/deploy-status-latest.json
          if-no-files-found: error

      - name: Post-deploy smoke test
        if: success()
        run: |
          set -euo pipefail
          echo "Waiting 180s for Netlify build to complete..."
          sleep 180
          failed=0
          while IFS= read -r path; do
            if [ -z "$path" ] || [[ "$path" == \#* ]]; then
              continue
            fi
            status=$(curl --silent --show-error --max-time 8 -o /dev/null -w "%{http_code}" "https://ziontechgroup.com$path" || echo "000")
            if [ "$status" = "200" ]; then
              echo "OK $path ($status)"
            else
              echo "FAIL $path ($status)"
              failed=1
            fi
          done < config/smoke-routes.txt
          [ $failed -eq 0 ] || echo "::warning::Some pages failed smoke test"
        continue-on-error: true

      - name: Deploy watchdog
        if: success()
        env:
          DEPLOY_WATCHDOG_BASE_URL: https://ziontechgroup.com
          DEPLOY_WATCHDOG_ROUTES_FILE: config/smoke-routes.txt
          DEPLOY_WATCHDOG_MAX_ROUTES: 15
          DEPLOY_WATCHDOG_ATTEMPTS: 3
          DEPLOY_WATCHDOG_INTERVAL_MS: 20000
        run: |
          set -euo pipefail
          npm run deploy:watchdog
        continue-on-error: true

      - name: Deploy watchdog retry (auto-heal)
        if: success()
        env:
          DEPLOY_WATCHDOG_BASE_URL: https://ziontechgroup.com
          DEPLOY_WATCHDOG_ROUTES_FILE: config/smoke-routes.txt
          DEPLOY_WATCHDOG_MAX_ROUTES: 15
          DEPLOY_WATCHDOG_ATTEMPTS: 3
          DEPLOY_WATCHDOG_INTERVAL_MS: 20000
          NETLIFY_BUILD_HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ -z "${NETLIFY_BUILD_HOOK:-}" ]; then
            echo "NETLIFY_BUILD_HOOK not set; skipping auto-heal deploy retry."
            exit 0
          fi
          report="automation/reports/deploy-watchdog-latest.json"
          if [ ! -f "$report" ]; then
            echo "deploy-watchdog report not found: $report"
            exit 0
          fi

          unhealthyCount="$(node -e "const fs=require('fs');const r=JSON.parse(fs.readFileSync('$report','utf8'));console.log(r.unhealthyCount ?? (r.healthy ? 0 : 1));" 2>/dev/null || echo "0")"
          echo "deploy-watchdog unhealthyCount=$unhealthyCount"

          if [ "$unhealthyCount" = "0" ]; then
            echo "No unhealthy routes; skipping retry."
            exit 0
          fi

          echo "Unhealthy routes detected; triggering one retry deploy."
          curl --fail --silent --show-error --retry 2 --retry-delay 2 --max-time 30 -X POST -d {} "$NETLIFY_BUILD_HOOK"

          echo "Waiting 180s for retry deploy to propagate..."
          sleep 180

          # Re-run watchdog with fewer attempts to keep this step fast.
          DEPLOY_WATCHDOG_ATTEMPTS=2 DEPLOY_WATCHDOG_INTERVAL_MS=15000 npm run deploy:watchdog || true

          report2="automation/reports/deploy-watchdog-latest.json"
          unhealthyAfter="$(node -e "const fs=require('fs');const r=JSON.parse(fs.readFileSync('$report2','utf8'));console.log(r.unhealthyCount ?? (r.healthy ? 0 : 1));" 2>/dev/null || echo "1")"
          echo "unhealthyAfter=$unhealthyAfter"

          if [ "$unhealthyAfter" != "0" ]; then
            body_file="route-autoheal.md"
            {
              echo "## Auto-heal failed"
              echo ""
              echo "- **Dedupe key:** \`deploy-route-autoheal-failed\`"
              echo ""
              echo "- Branch: \`main\`"
              echo "- Commit: \`${{ github.sha }}\`"
              echo "- Workflow: \`${{ github.workflow }}\`"
              echo ""
              echo "### Unhealthy routes (after retry)"
              node -e "const fs=require('fs');const r=JSON.parse(fs.readFileSync('$report2','utf8'));console.log((r.unhealthyRoutes || []).map(x=>'- '+x).join('\\n') || '- none');"
            } > "$body_file"
            export ISSUE_TITLE="Auto-heal failed: promoted routes still 404 after deploy retry"
            export ISSUE_BODY_FILE="$body_file"
            export ISSUE_LABELS="bug"
            export ISSUE_FINGERPRINT="deploy-route-autoheal-failed"
            export COOLDOWN_HOURS="12"
            node scripts/automation/gh-issue-dedupe-or-create.cjs || true
          fi
        continue-on-error: true

      - name: Upload deploy watchdog report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: deploy-watchdog-report
          path: automation/reports/deploy-watchdog-latest.json
          if-no-files-found: warn

      - name: Dispatch fingerprint digest after unhealthy deploy watchdog
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          enabled="${{ vars.AUTOMATION_FP_DIGEST_DISPATCH_ON_DEPLOY_FAILURE }}"
          if [ "$enabled" != "1" ] && [ "$enabled" != "true" ]; then
            echo "AUTOMATION_FP_DIGEST_DISPATCH_ON_DEPLOY_FAILURE not enabled; skipping digest dispatch."
            exit 0
          fi
          report="automation/reports/deploy-watchdog-latest.json"
          if [ ! -f "$report" ]; then
            echo "No deploy-watchdog report; skipping."
            exit 0
          fi
          unhealthy="$(node -e "const fs=require('fs');const r=JSON.parse(fs.readFileSync('$report','utf8'));const u=r.unhealthyCount;const h=r.healthy;const n=typeof u==='number'?u:(h===false?1:0);process.stdout.write(String(n));" 2>/dev/null || echo "0")"
          echo "deploy-watchdog unhealthyCount=$unhealthy"
          if [ "${unhealthy:-0}" = "0" ]; then
            echo "Watchdog healthy; skipping digest dispatch."
            exit 0
          fi
          gh workflow run "AI Automation fingerprint incident digest" --ref main
          echo "Dispatched fingerprint incident digest workflow."

      - name: Homepage promotion assertions
        if: success()
        run: |
          set -euo pipefail
          npm run routes:promotions:check
          homepage=$(curl --fail --silent --show-error --max-time 20 "https://ziontechgroup.com/")
          for token in "Autonomous Conversion Copilot" "Autonomous Incident Commander" "Autonomous Backlog Prioritizer" "Autonomous Retention Playbook" "Autonomous Growth Intelligence"; do
            if printf "%s" "$homepage" | grep -Fq "$token"; then
              echo "OK homepage contains: $token"
            else
              echo "::warning::Homepage missing promoted token: $token"
            fi
          done
        continue-on-error: true

      - name: Post-deploy UX verification
        if: success()
        run: |
          set -euo pipefail
          echo "Running post-deploy UX audit..."
          node automation/ai-live-site-ux-audit-agent.cjs 2>/dev/null || true
          if [ -f automation/reports/live-site-ux-audit-latest.json ]; then
            score=$(node -e "try{console.log(require('./automation/reports/live-site-ux-audit-latest.json').score ?? 'N/A')}catch(e){console.log('N/A')}")
            echo "Live site UX score: $score/100"
          fi
        continue-on-error: true

      - name: Resolve Netlify deploy id (optional API)
        if: success()
        continue-on-error: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          GITHUB_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
        run: node scripts/automation/fetch-netlify-deploy-for-sha.cjs

      - name: Write deploy status (completed)
        if: always()
        env:
          GITHUB_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            DEPLOY_STATUS=success DEPLOY_STATUS_SOURCE=deploy-on-push npm run deploy:status:generate
          else
            DEPLOY_STATUS=failed DEPLOY_STATUS_SOURCE=deploy-on-push npm run deploy:status:generate
          fi

      - name: Smoke Netlify preview (optional)
        if: success()
        continue-on-error: true
        env:
          SMOKE_NETLIFY_MAX_ROUTES: "6"
        run: node scripts/automation/smoke-netlify-deploy-preview.cjs

      - name: Upload Netlify preview smoke artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: netlify-preview-smoke-report
          path: automation/reports/netlify-preview-smoke-latest.json
          if-no-files-found: warn

      - name: Escalate repeated Netlify preview smoke failures
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
          NETLIFY_PREVIEW_SMOKE_FAIL_STREAK: "3"
          NETLIFY_PREVIEW_SMOKE_RECOVERY_STREAK: "2"
        run: node scripts/automation/escalate-netlify-preview-smoke.cjs

      - name: Refresh automation health snapshot
        if: always()
        continue-on-error: true
        run: node scripts/automation/generate-automation-health-snapshot.cjs

      - name: Commit deploy-status snapshot for suppression registry
        if: always()
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f automation/reports/deploy-status-latest.json
          if [ -f automation/reports/netlify-preview-smoke-latest.json ]; then
            git add -f automation/reports/netlify-preview-smoke-latest.json
          fi
          if [ -f automation/reports/netlify-preview-smoke-state.json ]; then
            git add -f automation/reports/netlify-preview-smoke-state.json
          fi
          if [ -f automation/reports/automation-health-latest.json ]; then
            git add -f automation/reports/automation-health-latest.json
          fi
          if [ -f automation/reports/automation-health-history.json ]; then
            git add -f automation/reports/automation-health-history.json
          fi
          if [ -f public/api/automation-health.json ]; then
            git add -f public/api/automation-health.json
          fi
          if [ -f public/api/automation-health-history.json ]; then
            git add -f public/api/automation-health-history.json
          fi
          if git diff --staged --quiet; then
            echo "No deploy-status or preview-smoke changes."
            exit 0
          fi
          bash scripts/automation/commit-and-push-main.sh "chore(reports): sync deploy-status + Netlify preview smoke state after deploy-on-push"
