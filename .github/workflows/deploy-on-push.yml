# Deploy on Push to Main
# Triggers Netlify deploy when CI/CD succeeds on main.
# Requires: NETLIFY_BUILD_HOOK in repo secrets
# Runs: after ci-cd.yml completes successfully on main, or workflow_dispatch
# Optimized: No local build (CI already verified; Netlify builds from repo)

name: Deploy on Push

permissions:
  contents: read

concurrency:
  group: deploy-on-push-main
  cancel-in-progress: false

on:
  workflow_run:
    workflows: [CI/CD Pipeline]
    types:
      - completed
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Trigger Netlify deploy
        env:
          NETLIFY_BUILD_HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
        run: |
          if [ -n "$NETLIFY_BUILD_HOOK" ]; then
            curl -sS -X POST -d {} "$NETLIFY_BUILD_HOOK"
            echo "Netlify deploy triggered successfully"
          else
            echo "::warning::NETLIFY_BUILD_HOOK not set. Add it to repo secrets for auto-deploy."
          fi

      - name: Post-deploy smoke test
        if: success() && github.event_name == 'workflow_run'
        run: |
          echo "Waiting 180s for Netlify build to complete..."
          sleep 180
          failed=0
          for path in / /services /contact /blog /solutions /about /automation /ai-lab /ai-lab/implementation-readiness-checker /ai-lab/ai-governance-risk-advisor /zion-ai-chatbot-playground /zion-ai-code-sandbox /zion-ai-site-evolution-simulator; do
            status=$(curl -sS -o /dev/null -w "%{http_code}" "https://ziontechgroup.com$path")
            if [ "$status" = "200" ]; then
              echo "OK $path ($status)"
            else
              echo "FAIL $path ($status)"
              failed=1
            fi
          done
          [ $failed -eq 0 ] || echo "::warning::Some pages failed smoke test"
        continue-on-error: true

      - name: Post-deploy UX verification
        if: success() && github.event_name == 'workflow_run'
        run: |
          echo "Running post-deploy UX audit..."
          node automation/ai-live-site-ux-audit-agent.cjs 2>/dev/null || true
          if [ -f automation/reports/live-site-ux-audit-latest.json ]; then
            score=$(node -e "try{console.log(require('./automation/reports/live-site-ux-audit-latest.json').score ?? 'N/A')}catch(e){console.log('N/A')}")
            echo "Live site UX score: $score/100"
          fi
        continue-on-error: true
