# Deploy on Push to Main
# Triggers Netlify deploy when CI/CD succeeds on main.
# Requires: NETLIFY_BUILD_HOOK in repo secrets
# Runs: after ci-cd.yml completes successfully on main

name: Deploy on Push

permissions:
  contents: read

concurrency:
  group: deploy-on-push-main
  cancel-in-progress: false

on:
  workflow_run:
    workflows: [CI/CD Pipeline]
    types:
      - completed
    branches: [main]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Build
        run: npm run build

      - name: Verify build output
        run: |
          if [ -d "dist" ]; then
            echo "Build output: dist ($(find dist -name '*.html' | wc -l) pages)"
          elif [ -d "out" ]; then
            echo "Build output: out ($(find out -name '*.html' | wc -l) pages)"
          else
            echo "::error::Build output not found (expected dist or out)"
            exit 1
          fi

      - name: Trigger Netlify deploy
        env:
          NETLIFY_BUILD_HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
        run: |
          if [ -n "$NETLIFY_BUILD_HOOK" ]; then
            curl -sS -X POST -d {} "$NETLIFY_BUILD_HOOK"
            echo "Netlify deploy triggered successfully"
          else
            echo "::warning::NETLIFY_BUILD_HOOK not set. Add it to repo secrets for auto-deploy."
          fi
