name: AI Workflow SLO Monitor

permissions:
  contents: read
  actions: read
  issues: write

concurrency:
  group: ai-workflow-slo-monitor
  cancel-in-progress: false

on:
  schedule:
    - cron: '20 13 * * 1'
  workflow_dispatch:

jobs:
  slo-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      SLO_LOOKBACK_DAYS: "14"
      SLO_BRANCH: main
      SLO_MIN_RUNS_FOR_ALERT: "5"
      SLO_FAILURE_RATE_ALERT: "0.15"
      SLO_P95_MINUTES_ALERT: "20"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Generate workflow SLO report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node automation/ai-workflow-slo-monitor.cjs

      - name: Upload workflow SLO artifacts
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
        with:
          name: workflow-slo-${{ github.run_id }}
          path: |
            automation/reports/workflow-slo-latest.json
            automation/reports/workflow-slo-latest.md
          if-no-files-found: error
          retention-days: 30

      - name: Open issue on SLO regressions
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          report="automation/reports/workflow-slo-latest.json"
          [ -f "$report" ] || exit 0
          flagged=$(node -e "const fs=require('fs');const r=JSON.parse(fs.readFileSync('$report','utf8'));console.log((r.flagged||[]).length)")
          if [ "$flagged" = "0" ]; then
            echo "No SLO regressions detected."
            exit 0
          fi
          title="Workflow SLO regressions detected (${flagged})"
          body_file="workflow-slo-regressions.md"
          {
            echo "## Workflow SLO regressions"
            echo ""
            echo "- Repository: \`${{ github.repository }}\`"
            echo "- Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "- Thresholds: failure >= 15% or p95 >= 20 min (min 5 runs)"
            echo ""
            echo "### Flagged workflows"
            node -e "const fs=require('fs');const r=JSON.parse(fs.readFileSync('$report','utf8'));for(const wf of (r.flagged||[])){console.log('- '+wf.name+' (failure '+(wf.failureRate*100).toFixed(1)+'%, p95 '+wf.p95Minutes.toFixed(2)+' min, runs '+wf.totalRuns+')')}"
          } > "$body_file"
          gh issue create --title "$title" --body-file "$body_file" --label bug || true
