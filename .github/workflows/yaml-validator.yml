name: WORKFLOW_NAME_PLACEHOLDER
'on':
  workflow_dispatch: {}
  schedule:
    - cron: '0 0 * * *'  # Daily validation

permissions:
  contents: write
  actions: read
jobs:
  main:
    name: Main Job
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run yaml validator
        run: |
          echo "Validating YAML files..."
          find . -name "*.yml" -o -name "*.yaml" | head -5 | xargs -I {} echo "Validating {}"
      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: workflow-results
          path: |
            .github/workflows/
          retention-days: 7
