name: Test Coverage Guard
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 10 * * *'
permissions:
  contents: read
  issues: write
  pull-requests: write
jobs:
  test-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run tests with coverage
        run: npm run test:ci -- --coverage --watchAll=false
      - name: Enforce coverage threshold
        run: |
          COVERAGE=$(awk -F'[ %]+' '/All files/{print $3}' coverage/lcov-report/index.html 2>/dev/null || echo 0)
          if awk "BEGIN{exit !($COVERAGE<60)}"; then
            echo "Coverage too low: $COVERAGE%"
            exit 1
          fi
      - name: Create regression issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Test coverage regression detected on ${context.sha.slice(0,7)}`,
              body: `Test coverage fell below threshold or tests failed. See workflow run in Actions.`
            })
