name: Lighthouse Production Audit

permissions:
  contents: read

concurrency:
  group: lighthouse-production
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 12 * * 0'
  workflow_dispatch:

jobs:
  lighthouse-production:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Run Lighthouse production audit
        run: npm run lighthouse:production

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: lighthouse-production-${{ github.run_id }}
          path: automation/reports/lighthouse-production-latest.json
          if-no-files-found: ignore
          retention-days: 30
