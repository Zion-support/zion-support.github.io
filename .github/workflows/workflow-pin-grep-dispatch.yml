name: Workflow pin grep (manual)

permissions:
  contents: read

on:
  workflow_dispatch:

concurrency:
  group: workflow-pin-grep-dispatch
  cancel-in-progress: true

jobs:
  pin-only:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Pin-related grep guards only
        run: bash scripts/automation/run-workflow-grep-guards.sh --pin
