name: Workflow policy fast smoke (weekly)
permissions:
  contents: read
on:
  schedule:
    - cron: 12 7 * * 4
  workflow_dispatch: null
concurrency:
  group: workflow-policy-fast-smoke-weekly
  cancel-in-progress: true
jobs:
  policy-fast:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Policy fast guards (setup-node + npm-ci + runs-on)
        run: bash scripts/automation/run-workflow-grep-guards.sh --policy-fast
