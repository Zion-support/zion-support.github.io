name: AI Automations (Weekly)

permissions:
  contents: write

on:
  schedule:
    - cron: '0 8 * * 1' # Mondays at 8:00 UTC
  workflow_dispatch:

concurrency:
  group: ai-automations
  cancel-in-progress: false

jobs:
  seo-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_TELEMETRY_DISABLED: '1'
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci --prefer-offline --no-audit --fund=false
      - name: Run SEO Content Optimizer
        run: node automation/ai-seo-content-optimizer.cjs
      - name: Upload SEO report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: seo-report
          path: automation/reports/seo-content-optimizer-latest.json
          retention-days: 30

  changelog:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 100
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci --prefer-offline --no-audit --fund=false
      - name: Generate Changelog
        run: node automation/ai-changelog-generator.cjs
      - name: Upload Changelog
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: changelog
          path: CHANGELOG_LATEST.md
          retention-days: 30

  performance:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_TELEMETRY_DISABLED: '1'
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci --prefer-offline --no-audit --fund=false
      - name: Build site
        run: npm run build
      - name: Run Performance Advisor
        run: node automation/ai-site-performance-advisor.cjs
      - name: Upload Performance report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: performance-report
          path: automation/reports/performance-advisor-latest.json
          retention-days: 30
