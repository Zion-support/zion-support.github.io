name: 'Agent: agent-1755379777746-0-full-stack-advanced'

on:
  workflow_dispatch: {}
  schedule:
  - cron: '*/30 * * * *'
concurrency:
  group: workflow-workflow_name_placeholder-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: write
  actions: read
jobs:
  agent-execution:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install dependencies
          run: npm ci
      - name: Run agent
        run: node automation/agents/full-stack/agent-1755379777746-0-full-stack-advanced/index.cjs
