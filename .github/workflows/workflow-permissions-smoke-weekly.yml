name: Workflow permissions smoke (weekly)
permissions:
  contents: read
on:
  schedule:
    - cron: 40 6 * * 4
  workflow_dispatch: null
concurrency:
  group: workflow-permissions-smoke-weekly
  cancel-in-progress: true
jobs:
  permissions:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Permissions guards (subset)
        run: bash scripts/automation/run-workflow-grep-guards.sh --permissions
