name: AI Ecosystem Intelligence

permissions:
  contents: read

concurrency:
  group: ai-ecosystem-intelligence
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 10 * * 1'
  workflow_dispatch:

jobs:
  ecosystem-intelligence:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Run Ecosystem Intelligence Agent
        run: node automation/ai-ecosystem-intelligence-agent.cjs run

      - name: Run Content Freshness Agent
        run: node automation/ai-content-freshness-agent.cjs run

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ecosystem-intelligence-${{ github.run_id }}
          path: |
            automation/reports/ecosystem-intelligence-latest.json
            automation/reports/content-freshness-latest.json
            automation/data/ecosystem-suggestions.json
          if-no-files-found: ignore
          retention-days: 30
