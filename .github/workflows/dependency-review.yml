name: dependency-review (DISABLED - Migrated to PM2)

on:
  # This workflow is disabled and migrated to PM2 automation
  # The original workflow was handling automation tasks
  # Now handled by PM2 processes as configured in ecosystem.config.cjs
  workflow_dispatch: # Only manual triggers allowed
  # All automatic triggers removed

permissions:
  contents: read

jobs:
  disabled:
    runs-on: ubuntu-latest
    steps:
      - name: Workflow Disabled
        run: |
          echo "This workflow has been disabled and migrated to PM2 automation."
          echo "All automation tasks are now handled by PM2 processes."
          echo "PM2 ecosystem.config.cjs contains the full automation configuration."
          echo "PM2 processes are currently running:"
          pm2 status || echo "PM2 not available in this environment"
          exit 0
