name: AI Automation fingerprint incident digest

permissions:
  contents: read
  issues: read

on:
  schedule:
    - cron: '35 14 * * 1'
  workflow_dispatch:

concurrency:
  group: ai-automation-fingerprint-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Generate fingerprint incident digest
        env:
          GH_TOKEN: ${{ github.token }}
        run: node automation/generate-automation-fingerprint-incident-digest.cjs

      - name: Upload digest artifacts
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
        with:
          name: automation-fingerprint-digest-${{ github.run_id }}
          path: |
            automation/reports/automation-fingerprint-incidents-latest.json
            automation/reports/automation-fingerprint-incidents-latest.md
          if-no-files-found: warn
          retention-days: 30
