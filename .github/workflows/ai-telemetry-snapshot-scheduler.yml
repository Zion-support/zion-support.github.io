name: AI Telemetry Snapshot Scheduler

permissions:
  contents: write

on:
  schedule:
    - cron: '12 * * * *'
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main

      - name: Commit telemetry snapshot bundle
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            automation/reports/openclaw-autonomous-app-improver-latest.json \
            automation/reports/pm2-config-drift-guard-latest.json \
            automation/reports/pm2-restart-guardian-latest.json \
            automation/reports/pm2-slo-latest.json || true
          if git diff --staged --quiet; then
            echo "No telemetry changes to snapshot."
            exit 0
          fi
          git commit -m "chore(reports): hourly telemetry snapshot"
          git push origin HEAD:main

