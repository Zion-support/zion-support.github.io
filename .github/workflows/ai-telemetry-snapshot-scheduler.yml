name: AI Telemetry Snapshot Scheduler

permissions:
  contents: write

on:
  schedule:
    - cron: '12 * * * *'
  workflow_dispatch:

concurrency:
  group: ai-telemetry-snapshot-scheduler
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main

      - name: Commit telemetry snapshot bundle
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          FILES="automation/reports/openclaw-autonomous-app-improver-latest.json automation/reports/pm2-config-drift-guard-latest.json automation/reports/pm2-restart-guardian-latest.json automation/reports/pm2-slo-latest.json"
          git add $FILES || true
          if git diff --staged --quiet; then
            echo "No telemetry changes to snapshot."
            exit 0
          fi
          if ! node automation/telemetry-snapshot-significant.cjs $FILES; then
            echo "No significant telemetry diff; skipping commit."
            git restore --staged $FILES || true
            exit 0
          fi
          git commit -m "chore(reports): hourly telemetry snapshot"
          if ! git push origin HEAD:main; then
            echo "::warning::Push rejected (remote may have advanced main)."
          fi
