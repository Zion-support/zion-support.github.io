name: codeql
'on':
  workflow_dispatch: {}
  schedule:
    - cron: 0 */2 * * *
permissions:
  contents: write
  actions: read
  pull-requests: write
concurrency:
  group: workflow-${{ github.ref }}
  cancel-in-progress: false
jobs:
  disabled:
    runs-on: ubuntu-latest
    steps:
      - name: Workflow Disabled
        run: |
          echo "Workflow Workflow completed successfully"
    runs_on: ubuntu-latest
