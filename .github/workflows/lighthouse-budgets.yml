name: Lighthouse Budgets (PR Gate)

on:

  schedule:
    - cron: '0 0 * * *'

permissions:
concurrency:
  group: "github.workflow-${{ github.ref }}"
  cancel-in-progress: true
jobs:
  lh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
          with:
            fetch-depth: 0
fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
          with:
            node-version: \'20\'
            cache: \'npm\'
node-version: '20'
          cache: 'npm'


