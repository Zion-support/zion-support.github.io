name: AI Build Fixer

permissions:
  contents: write
  issues: write
  actions: read

concurrency:
  group: ai-build-fixer
  cancel-in-progress: false

on:
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    types: [completed]
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'run'
        type: choice
        options:
          - run
          - check
          - continuous

jobs:
  fix-build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure')
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GH_TOKEN || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run AI Build Fixer
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
          AUTO_COMMIT: 'true'
          AUTO_PUSH: 'false'
          MAX_FIX_ATTEMPTS: '10'
          CLEAN_BUILD_ON_FAIL: 'true'
          CONTINUOUS_BUILD_FIXER: 'true'
          BUILD_CHECK_INTERVAL: '1'
          FAST_MODE: 'true'
          PARALLEL_FIXES: 'true'
        run: |
          mode="${{ inputs.mode || 'run' }}"
          node automation/ai-build-fixer-agent.cjs "$mode"

      - name: Upload build fixer report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: build-fixer-report-${{ github.run_id }}
          path: automation/reports/build-fixer-latest.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Push changes
        if: success()
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No changes to push"
            exit 0
          fi
          git fetch origin main --depth=1
          if ! git rebase origin/main; then
            echo "::warning::Rebase conflict — skipping push."
            git rebase --abort || true
            exit 0
          fi
          git push origin HEAD:main || echo "::warning::Push rejected — skipping."
