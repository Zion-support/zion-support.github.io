name: Workflow Status Check

on:
  schedule:
    - cron: '0 */12 * * *'  # Run every 12 hours
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  check-workflows:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check workflow status
        uses: actions/github-script@v7
        with:
          script: |
            const { data: workflows } = await github.rest.actions.listRepoWorkflows({
              owner: context.repo.owner,
              repo: context.repo.repo
            });

            const { data: runs } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: workflows.workflows[0].id,
              per_page: 10
            });

            let status = '✅ All workflows are healthy';
            let failedWorkflows = [];

            for (const run of runs.workflow_runs) {
              if (run.conclusion === 'failure' && run.created_at > new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString()) {
                failedWorkflows.push({
                  name: run.name,
                  conclusion: run.conclusion,
                  created_at: run.created_at,
                  html_url: run.html_url
                });
              }
            }

            if (failedWorkflows.length > 0) {
              status = `❌ ${failedWorkflows.length} workflow(s) failed in the last 24 hours`;
            }

            core.setOutput('status', status);
            core.setOutput('failed-count', failedWorkflows.length);
            core.setOutput('failed-workflows', JSON.stringify(failedWorkflows));

      - name: Create status report
        run: |
          echo "## Workflow Status Report" > status-report.md
          echo "" >> status-report.md
          echo "**Status:** ${{ steps.check-workflows.outputs.status }}" >> status-report.md
          echo "**Failed Workflows:** ${{ steps.check-workflows.outputs.failed-count }}" >> status-report.md
          echo "" >> status-report.md
          
          if [ "${{ steps.check-workflows.outputs.failed-count }}" -gt 0 ]; then
            echo "### Failed Workflows:" >> status-report.md
            echo "${{ steps.check-workflows.outputs.failed-workflows }}" | jq -r '.[] | "- **\(.name)**: \(.conclusion) at \(.created_at) - [View Run](\(.html_url))"' >> status-report.md
          else
            echo "✅ All workflows are running successfully!" >> status-report.md
          fi
          
          echo "" >> status-report.md
          echo "---" >> status-report.md
          echo "*Report generated at $(date)*" >> status-report.md

      - name: Upload status report
        uses: actions/upload-artifact@v4
        with:
          name: workflow-status-report
          path: status-report.md

      - name: Create issue if workflows are failing
        if: steps.check-workflows.outputs.failed-count > 0
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Workflow Status Alert - Some workflows are failing"
          content-filepath: status-report.md
          labels: workflow-status, automated, alert
          assignees: ''