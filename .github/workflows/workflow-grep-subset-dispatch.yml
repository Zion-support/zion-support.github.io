name: Workflow grep subset (manual)

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      subset:
        description: 'Which run-workflow-grep-guards.sh subset to run (always-on safety checks still run after selective flags)'
        required: true
        default: pin
        type: choice
        options:
          - pin
          - permissions
          - push
          - all

concurrency:
  group: workflow-grep-subset-dispatch
  cancel-in-progress: true

jobs:
  grep-subset:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run grep guard subset
        run: |
          set -euo pipefail
          case "${{ inputs.subset }}" in
            pin)          bash scripts/automation/run-workflow-grep-guards.sh --pin ;;
            permissions)  bash scripts/automation/run-workflow-grep-guards.sh --permissions ;;
            push)         bash scripts/automation/run-workflow-grep-guards.sh --push ;;
            all)          bash scripts/automation/run-workflow-grep-guards.sh ;;
            *)
              echo "::error::Unknown subset: ${{ inputs.subset }}"
              exit 2
              ;;
          esac
