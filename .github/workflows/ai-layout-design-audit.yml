name: AI Layout Design Audit

permissions:
  contents: read

concurrency:
  group: ai-layout-design-audit
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 12 * * 6'
  workflow_dispatch:

jobs:
  layout-design-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      LAYOUT_AUDIT_URL: https://ziontechgroup.com
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Run layout design audit
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: npm run layout:audit
        continue-on-error: true

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: layout-design-audit-${{ github.run_id }}
          path: automation/reports/layout-design-audit-latest.json
          if-no-files-found: ignore
          retention-days: 30
