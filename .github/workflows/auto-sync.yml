name: Auto Sync to Main

# Run continuously - cancel old runs when new ones start
concurrency:
  group: auto-sync-main
  cancel-in-progress: true

on:
  # Run every 1 minute for maximum speed (GitHub Actions minimum)
  schedule:
    - cron: '*/1 * * * *'
  
  # Immediate triggers
  workflow_dispatch:
  workflow_call:
  repository_dispatch:
    types: [auto-sync]
  
  # Catch all changes immediately
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - '.github/workflows/auto-sync.yml'

jobs:
  auto-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository (shallow for speed)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GH_TOKEN || github.token }}
      
      - name: Configure Git (fast)
        run: |
          git config --global user.name "Auto Sync Bot"
          git config --global user.email "auto-sync@ziontechgroup.com"
          git config --global advice.detachedHead false
          git config --global core.autocrlf false
      
      - name: Fetch latest (fast)
        run: |
          git fetch origin main --depth=1 --quiet || true
      
      - name: Pull with rebase (fast)
        run: |
          git pull origin main --rebase --quiet || true
      
      - name: Check for changes (fast)
        id: check_changes
        run: |
          git status --porcelain | head -1 > /tmp/changes.txt || true
          if [[ -s /tmp/changes.txt ]]; then
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "📝 Changes detected"
          else
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "✅ No changes"
          fi
      
      - name: Auto-commit changes
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          git add -A
          git commit -m "🤖 Auto-sync: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" || exit 0
      
      - name: Push changes (fast)
        if: steps.check_changes.outputs.changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
        run: |
          git push origin HEAD:main --quiet || {
            echo "Retrying push..."
            git fetch origin main --depth=1 --quiet
            git pull origin main --rebase --quiet || true
            git push origin HEAD:main --quiet
          }
      
      - name: Fast sync summary
        if: always()
        run: |
          echo "🔄 Sync: $(date -u '+%H:%M:%S UTC')"
          echo "Commit: $(git log -1 --oneline 2>/dev/null || echo 'none')"

