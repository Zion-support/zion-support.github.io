name: Sync Health
'on':
  workflow_dispatch: {}
  schedule:
    - cron: 0 2 * * *
jobs:
  check-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run sync health check
        run: node automation/sync-health-check.cjs | tee sync-health.out
      - name: Upload sync health artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sync-health-artifacts
          path: |
            data/reports/sync/sync-health.json
            automation/logs/sync-health.log
            sync-health.out
          if-no-files-found: ignore
          retention-days: 7
    timeout-minutes: 30
    runs_on: ubuntu-latest
permissions:
  contents: read
  actions: read
concurrency:
  group: sync-health.yml-${{ github.ref }}
  cancel-in-progress: true
