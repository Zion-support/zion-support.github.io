name: AI App Improvement Evolution (Full Quality)
permissions:
  contents: write
on:
  schedule:
    - cron: 0 7 1-7 * 0
  workflow_dispatch:
    inputs:
      auto_commit:
        description: Commit and push changes to main
        required: false
        default: true
        type: boolean
      trigger_deploy:
        description: Trigger Netlify deploy after push
        required: false
        default: false
        type: boolean
concurrency:
  group: app-improvement-evolution-full-quality
  cancel-in-progress: false
jobs:
  evolution-full-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      NEXT_TELEMETRY_DISABLED: '1'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          token: ${{ github.token }}
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false
      - name: Run app improvement evolution (full quality)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AUTO_COMMIT: ${{ (github.event_name == 'schedule' || github.event.inputs.auto_commit != 'false') && '1' || '' }}
          TRIGGER_DEPLOY: ${{ github.event.inputs.trigger_deploy && '1' || '' }}
          SKIP_CONTENT: '1'
          TRIGGER_FIXES: '1'
          SKIP_LIGHTHOUSE: ''
          SKIP_PERF_REGRESSION: ''
          SKIP_LIVE_A11Y: ''
          NETLIFY_BUILD_HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
        run: node automation/ai-app-improvement-evolution-pipeline.cjs
