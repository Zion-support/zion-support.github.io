name: Daily Security Audit

on:
  schedule:
    - cron: '0 8 * * *'   # 8 AM UTC (3 AM São Paulo)
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: npm audit --audit-level moderate

      - name: Create PR if issues found
        if: failure()
        run: |
          echo "🔒 Security audit found issues. Creating PR..."
          # Placeholder for PR creation logic
          echo "PR creation logic would run here"
