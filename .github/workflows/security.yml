name: Security & Dependency Scanning

on:
  push:
    branches: [main, develop, cursor/**]
  pull_request:
    branches: [main, develop, cursor/**]
  schedule:
    - cron: '0 2 * * 1'  # Every Monday at 2 AM

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  dependency-check:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
        
      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true
        
      - name: Check for secrets in code
        uses: trufflesecurity/trufflehog@v3
        with:
          path: .
          base: ${{ github.event.before }}
          head: ${{ github.event.after }}
          extra_args: --only-verified
        continue-on-error: true
        
      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-report
          path: |
            npm-audit.json
          retention-days: 30

  code-scanning:
    name: Code Security Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run ESLint security rules
        run: |
          npm run lint -- --max-warnings 0 || echo "Linting completed with warnings"
        continue-on-error: true
        
      - name: Run security-focused tests
        run: |
          if npm run | grep -q "test:security"; then
            npm run test:security
          else
            echo "No security tests configured"
          fi
        continue-on-error: true
        
      - name: Check for sensitive files
        run: |
          echo "## Sensitive Files Check" > SENSITIVE_FILES.md
          echo "" >> SENSITIVE_FILES.md
          echo "Checking for potentially sensitive files..." >> SENSITIVE_FILES.md
          echo "" >> SENSITIVE_FILES.md
          
          # Check for common sensitive file patterns
          find . -type f \( -name "*.env*" -o -name "*.key" -o -name "*.pem" -o -name "*.p12" -o -name "*.pfx" \) | head -20 >> SENSITIVE_FILES.md || echo "No sensitive files found" >> SENSITIVE_FILES.md
          
          # Check for hardcoded secrets
          grep -r "password\|secret\|key\|token" --include="*.js" --include="*.ts" --include="*.jsx" --include="*.tsx" . | grep -v "node_modules" | head -20 >> SENSITIVE_FILES.md || echo "No hardcoded secrets found" >> SENSITIVE_FILES.md
          
      - name: Upload security analysis
        uses: actions/upload-artifact@v4
        with:
          name: security-analysis
          path: SENSITIVE_FILES.md

  container-scanning:
    name: Container Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Check for outdated dependencies
        run: npm outdated --json > outdated-deps.json || true
        
      - name: Check for vulnerable dependencies
        run: npm audit --json > audit-report.json || true
        
      - name: Upload dependency reports
        uses: actions/upload-artifact@v4
        with:
          name: security-summary
          path: SECURITY_SUMMARY.md
          
      - name: Comment on PR with security summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs')
            const summary = fs.readFileSync('SECURITY_SUMMARY.md', 'utf8')
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: summary
            })