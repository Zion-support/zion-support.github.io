        echo "Dependency Scan: ${{ needs.dependency-scan.result }}"
        echo "Code Security: ${{ needs.code-security.result }}"
        echo "Container Security: ${{ needs.container-security.result }}"
        
        if [ "${{ needs.dependency-scan.result }}" == "failure" ] || \
           [ "${{ needs.code-security.result }}" == "failure" ] || \
           [ "${{ needs.container-security.result }}" == "failure" ]; then
          echo "⚠️ Security issues detected!"
          exit 1
        fi
        
        echo "✅ All security checks passed"
    
    - name: Notify security team
      if: failure()
      run: |
        echo "🚨 Security issues detected - notifying team"
        # Add notification logic here (Slack, email, etc.)
=======
name: Security

on:
  schedule:
    - cron: '0 2 * * 1'  # Run every Monday at 2 AM
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          
      - name: Install dependencies
        run: yarn install --frozen-lockfile
        
      - name: Run security audit
        run: |
          echo "Running security audit..."
          yarn audit --audit-level moderate || true
          
      - name: Check for known vulnerabilities
        run: |
          echo "Checking for known vulnerabilities..."
          if [ -f "yarn.lock" ]; then
            echo "yarn.lock found, checking for vulnerabilities..."
            yarn audit --audit-level moderate --json > audit-report.json || true
            echo "Audit report generated"
          else
            echo "No yarn.lock found, skipping audit"
          fi
          
      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: security-audit
          path: audit-report.json
          retention-days: 90
          if-no-files-found: ignore
          
      - name: Security summary
        run: |
          echo "Security scan completed"
          echo "Check the uploaded artifacts for detailed vulnerability information"
          echo "Consider running 'yarn audit fix' locally if vulnerabilities are found"
