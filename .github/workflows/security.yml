        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Check for outdated packages
      run: |
        echo "📦 Checking for outdated packages..."
        npm outdated || echo "All packages are up to date"
    
    - name: Run npm update check
      run: |
        echo "🔄 Checking for available updates..."
        npm update --dry-run || echo "Update check completed"
    
    - name: Create dependency update PR
      if: github.event_name == 'schedule'
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        title: '🔒 Security: Update dependencies'
        body: |
          ## 🔒 Security Dependency Updates
          
          This PR updates dependencies to address security vulnerabilities.
          
