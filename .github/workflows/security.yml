name: Security & Dependency Management

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run every 12 hours as an alternative to PM2 automation
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: |
        npm ci
        cd server && npm ci
        
    - name: Run security audit
      run: |
        npm audit --audit-level=moderate || true
        cd server && npm audit --audit-level=moderate || true
        
    - name: Run CodeQL Analysis
      uses: github/codeql-action/init@v3
      with:
        languages: javascript, typescript
        
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      
    - name: Check for known vulnerabilities
      run: |
        npx audit-ci --moderate || echo "Audit CI not available"
        
    - name: Check for license compliance
      run: |
        npx license-checker --summary || echo "License checker not available"

  dependency-updates:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Check for outdated dependencies
      run: |
        echo "=== Frontend Dependencies ==="
        npm outdated || echo "All frontend dependencies are up to date"
        echo "=== Backend Dependencies ==="
        cd server && npm outdated || echo "All backend dependencies are up to date"
        
    - name: Check for security updates
      run: |
        echo "=== Security Updates Available ==="
        npm audit fix --dry-run || echo "No security updates available"
        cd server && npm audit fix --dry-run || echo "No backend security updates available"
        
    - name: Create dependency update issue
      if: always()
      uses: actions/github-script@v7
      with:
        script: |
          const { data: issues } = await github.rest.issues.listForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            state: 'open',
            labels: ['dependencies', 'automation']
          });
          
          if (issues.length === 0) {
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔧 Dependency Updates Available',
              body: 'Automated dependency update check completed. Review and update dependencies as needed.',
              labels: ['dependencies', 'automation', 'maintenance']
            });
          }