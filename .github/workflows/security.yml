name: Security & Dependency Scanning

on:
  push:
    branches: [main, develop, cursor/**]
  pull_request:
    branches: [main, develop, cursor/**]
  schedule:
    - cron: '0 2 * * 1'  # Every Monday at 2 AM

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  dependency-check:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true
        
      - name: Run npm outdated check
        run: npm outdated || echo "All dependencies are up to date"
        
      - name: Generate dependency report
        run: |
          echo "## Dependency Security Report" > DEPENDENCY_REPORT.md
          echo "" >> DEPENDENCY_REPORT.md
          echo "Generated on: $(date)" >> DEPENDENCY_REPORT.md
          echo "" >> DEPENDENCY_REPORT.md
          
          echo "### NPM Audit Results" >> DEPENDENCY_REPORT.md
          npm audit --json > audit.json 2>/dev/null || echo "Audit failed" > audit.json
          jq -r '.metadata.vulnerabilities | to_entries[] | "- \(.key): \(.value) vulnerabilities"' audit.json >> DEPENDENCY_REPORT.md 2>/dev/null || echo "- Unable to parse audit results" >> DEPENDENCY_REPORT.md
          
          echo "" >> DEPENDENCY_REPORT.md
          echo "### Outdated Dependencies" >> DEPENDENCY_REPORT.md
          npm outdated --json > outdated.json 2>/dev/null || echo "{}" > outdated.json
          jq -r 'to_entries[] | "- \(.key): \(.value.current) → \(.value.latest)"' outdated.json >> DEPENDENCY_REPORT.md 2>/dev/null || echo "- All dependencies are up to date" >> DEPENDENCY_REPORT.md
          
      - name: Upload dependency report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-report
          path: |
            DEPENDENCY_REPORT.md
            audit.json
            outdated.json
            
      - name: Create security issue if vulnerabilities found
        if: failure()
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Security Alert: Dependency Vulnerabilities Detected"
          content-filepath: DEPENDENCY_REPORT.md
          labels: security,dependencies,vulnerability
          assignees: ''

  code-scanning:
    name: Code Security Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run ESLint security rules
        run: |
          npm run lint -- --max-warnings 0 || echo "Linting completed with warnings"
        continue-on-error: true
        
      - name: Run security-focused tests
        run: |
          if npm run | grep -q "test:security"; then
            npm run test:security
          else
            echo "No security tests configured"
          fi
        continue-on-error: true
        
      - name: Check for sensitive files
        run: |
          echo "## Sensitive Files Check" > SENSITIVE_FILES.md
          echo "" >> SENSITIVE_FILES.md
          echo "Checking for potentially sensitive files..." >> SENSITIVE_FILES.md
          echo "" >> SENSITIVE_FILES.md
          
          # Check for common sensitive file patterns
          find . -type f \( -name "*.env*" -o -name "*.key" -o -name "*.pem" -o -name "*.p12" -o -name "*.pfx" \) | head -20 >> SENSITIVE_FILES.md || echo "No sensitive files found" >> SENSITIVE_FILES.md
          
          # Check for hardcoded secrets
          grep -r "password\|secret\|key\|token" --include="*.js" --include="*.ts" --include="*.jsx" --include="*.tsx" . | grep -v "node_modules" | head -20 >> SENSITIVE_FILES.md || echo "No hardcoded secrets found" >> SENSITIVE_FILES.md
          
      - name: Upload security analysis
        uses: actions/upload-artifact@v4
        with:
          name: security-analysis
          path: SENSITIVE_FILES.md

  container-scanning:
    name: Container Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Check for Dockerfile
        run: |
          if [ -f "Dockerfile" ]; then
            echo "Dockerfile found, would scan here in production"
            echo "Consider adding container scanning with tools like Trivy or Snyk"
          else
            echo "No Dockerfile found, skipping container scan"
          fi
        continue-on-error: true

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [dependency-check, code-scanning, container-scanning]
    timeout-minutes: 5
    
    steps:
      - name: Download all security artifacts
        uses: actions/download-artifact@v4
        with:
          path: security-artifacts
          
      - name: Generate security summary
        run: |
          echo "## Security Scan Summary" > SECURITY_SUMMARY.md
          echo "" >> SECURITY_SUMMARY.md
          echo "Generated on: $(date)" >> SECURITY_SUMMARY.md
          echo "" >> SECURITY_SUMMARY.md
          
          echo "### Scan Results" >> SECURITY_SUMMARY.md
          echo "- Dependency Check: ${{ needs.dependency-check.result }}" >> SECURITY_SUMMARY.md
          echo "- Code Scanning: ${{ needs.code-scanning.result }}" >> SECURITY_SUMMARY.md
          echo "- Container Scan: ${{ needs.container-scanning.result }}" >> SECURITY_SUMMARY.md
          echo "" >> SECURITY_SUMMARY.md
          
          if [ "${{ needs.dependency-check.result }}" = "failure" ] || [ "${{ needs.code-scanning.result }}" = "failure" ]; then
            echo "⚠️ **Security issues detected!** Please review the detailed reports above." >> SECURITY_SUMMARY.md
          else
            echo "✅ **All security checks passed!**" >> SECURITY_SUMMARY.md
          fi
          
      - name: Upload security summary
        uses: actions/upload-artifact@v4
        with:
          name: security-summary
          path: SECURITY_SUMMARY.md
          
      - name: Comment on PR with security summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs')
            const summary = fs.readFileSync('SECURITY_SUMMARY.md', 'utf8')
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: summary
            })