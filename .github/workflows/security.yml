name: Security

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level moderate || true

      - name: Run npm outdated check
        run: npm outdated || true

      - name: Check for known vulnerabilities
        run: |
          echo "Checking for known vulnerabilities..."
          if [ -f package-lock.json ]; then
            echo "Package lock file found"
            npm audit --json > audit-report.json || echo "{}" > audit-report.json
          else
            echo "No package lock file found"
            echo "{}" > audit-report.json
          fi

      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: audit-report.json
          retention-days: 30

      - name: Create security issue if vulnerabilities found
        if: failure()
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Security Alert: Vulnerabilities Detected"
          content-filepath: .github/ISSUE_TEMPLATE/security-alert.md
          labels: security, vulnerability, automated
          assignees: ''