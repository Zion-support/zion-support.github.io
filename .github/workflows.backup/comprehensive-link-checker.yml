name: Comprehensive Link Checker (DISABLED - Migrated to PM2)

on:
  # This workflow is disabled and migrated to PM2 automation
  # The original workflow was handling comprehensive link checking
  # Now handled by PM2 processes: link-checker + link-integrity (every 30min + 2hr)
  workflow_dispatch: # Only manual triggers allowed
  # All automatic triggers removed

permissions:
  contents: write
  issues: write

concurrency:
  group: comprehensive-link-checker
  cancel-in-progress: false

jobs:
  disabled:
    name: Workflow Disabled
    runs-on: ubuntu-latest
    steps:
      - name: Workflow Disabled
        run: |
          echo "This workflow has been disabled and migrated to PM2 automation."
          echo "The following PM2 processes now handle these tasks:"
          echo "- link-checker (every 30 minutes)"
          echo "- link-integrity (every 2 hours)"
          echo "PM2 ecosystem.config.cjs contains the full automation configuration."
          exit 0
