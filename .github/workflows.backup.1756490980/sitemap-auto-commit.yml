name: Sitemap Auto Commit (DISABLED - Migrated to PM2)

on:
  # This workflow is disabled and migrated to PM2 automation
  # The original workflow was handling sitemap generation and commits
  # Now handled by PM2 process: sitemap-runner (every 6 hours)
  workflow_dispatch: # Only manual triggers allowed
  # All automatic triggers removed

jobs:
  disabled:
    runs-on: ubuntu-latest
    steps:
      - name: Workflow Disabled
        run: |
          echo "This workflow has been disabled and migrated to PM2 automation."
          echo "Sitemap generation is now handled by:"
          echo "- sitemap-runner PM2 process (every 6 hours)"
          echo "PM2 ecosystem.config.cjs contains the full automation configuration."
          exit 0