name: "CodeQL Config"

paths:
  - "src/**"
  - "components/**"
  - "pages/**"
  - "utils/**"
  - "hooks/**"
  - "types/**"

paths-ignore:
  - "**/*.test.ts"
  - "**/*.test.tsx"
  - "**/*.spec.ts"
  - "**/*.spec.tsx"
  - "**/node_modules/**"
  - "**/dist/**"
  - "**/build/**"
  - "**/*.d.ts"

queries:
  - uses: security-and-quality
  - uses: security-and-quality:javascript/security-extended
  - uses: security-and-quality:javascript/security-and-quality
  - uses: security-and-quality:typescript/security-extended
  - uses: security-and-quality:typescript/security-and-quality

query-filters:
  - include:
      tags contain: security
  - include:
      tags contain: external
  - exclude:
      tags contain: experimental