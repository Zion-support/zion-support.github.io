<!DOCTYPE html>
<html>
<head>
    <title>Placeholder Image Generator</title>
    <style>
        body { margin: 0; padding: 20px; font-family: Arial, sans-serif; }
        .placeholder { 
            background: #f3f4f6; 
            border: 2px dashed #d1d5db; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: #6b7280;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Placeholder Image Generator</h1>
    <p>This service generates placeholder images for development purposes.</p>
    <p>Usage: <code>/api/placeholder/width/height</code></p>
    
    <div class="placeholder" style="width: 200px; height: 200px; margin: 20px 0;">
        200x200
    </div>
    
    <div class="placeholder" style="width: 400px; height: 300px; margin: 20px 0;">
        400x300
    </div>
    
    <div class="placeholder" style="width: 600px; height: 400px; margin: 20px 0;">
        600x400
    </div>
</body>
</html>
