<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Zion Tech Group</title>
    <meta name="description" content="You're currently offline. Check your internet connection and try again.">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Orbitron', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #020617 0%, #0f172a 50%, #020617 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .offline-container {
            text-align: center;
            max-width: 600px;
            background: rgba(30, 41, 59, 0.8);
            padding: 3rem;
            border-radius: 1rem;
            border: 1px solid rgba(34, 221, 210, 0.2);
            backdrop-filter: blur(10px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .offline-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 2rem;
            background: linear-gradient(135deg, #22ddd2, #2e73ea);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #22ddd2, #2e73ea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #94a3b8;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.4);
            border-radius: 2rem;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #ef4444;
            border-radius: 50%;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.3; }
        }

        .actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 2rem;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            font-family: inherit;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #22ddd2, #2e73ea);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(34, 221, 210, 0.3);
        }

        .btn-secondary {
            background: rgba(148, 163, 184, 0.2);
            color: #94a3b8;
            border: 1px solid rgba(148, 163, 184, 0.3);
        }

        .btn-secondary:hover {
            background: rgba(148, 163, 184, 0.3);
            color: white;
        }

        .cached-content {
            margin-top: 2rem;
            padding: 1.5rem;
            background: rgba(34, 221, 210, 0.1);
            border: 1px solid rgba(34, 221, 210, 0.2);
            border-radius: 0.5rem;
        }

        .cached-content h3 {
            color: #22ddd2;
            margin-bottom: 1rem;
        }

        .cached-links {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .cached-links a {
            color: #94a3b8;
            text-decoration: none;
            padding: 0.5rem;
            border-radius: 0.25rem;
            transition: all 0.2s ease;
        }

        .cached-links a:hover {
            color: #22ddd2;
            background: rgba(34, 221, 210, 0.1);
        }

        .network-status {
            position: fixed;
            top: 1rem;
            right: 1rem;
            padding: 0.5rem 1rem;
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid rgba(34, 197, 94, 0.4);
            border-radius: 0.5rem;
            font-size: 0.8rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .network-status.online {
            opacity: 1;
        }

        @media (max-width: 768px) {
            .offline-container {
                padding: 2rem;
                margin: 1rem;
            }

            h1 {
                font-size: 2rem;
            }

            .actions {
                flex-direction: column;
                align-items: center;
            }

            .btn {
                width: 100%;
                max-width: 300px;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="network-status" id="networkStatus">
        <span id="statusText">Checking connection...</span>
    </div>

    <div class="offline-container">
        <div class="offline-icon">📡</div>
        
        <h1>You're Offline</h1>
        <p class="subtitle">
            It looks like you've lost your internet connection. Don't worry - some content may still be available offline.
        </p>

        <div class="status-indicator">
            <div class="status-dot"></div>
            <span>No Internet Connection</span>
        </div>

        <div class="actions">
            <button class="btn btn-primary" onclick="window.location.reload()">
                🔄 Try Again
            </button>
            <button class="btn btn-secondary" onclick="checkConnection()">
                📡 Check Connection
            </button>
        </div>

        <div class="cached-content">
            <h3>📱 Available Offline</h3>
            <div class="cached-links">
                <a href="/" onclick="navigateToCachedPage(event, '/')">🏠 Home</a>
                <a href="/about" onclick="navigateToCachedPage(event, '/about')">ℹ️ About</a>
                <a href="/services" onclick="navigateToCachedPage(event, '/services')">🛠️ Services</a>
                <a href="/contact" onclick="navigateToCachedPage(event, '/contact')">📞 Contact</a>
            </div>
        </div>
    </div>

    <script>
        // Check network status
        function checkConnection() {
            const statusElement = document.getElementById('networkStatus');
            const statusText = document.getElementById('statusText');
            
            if (navigator.onLine) {
                statusText.textContent = '✅ Back Online!';
                statusElement.classList.add('online');
                statusElement.style.background = 'rgba(34, 197, 94, 0.2)';
                statusElement.style.borderColor = 'rgba(34, 197, 94, 0.4)';
                
                setTimeout(() => {
                    window.location.reload();
                }, 2000);
            } else {
                statusText.textContent = '❌ Still Offline';
                statusElement.classList.add('online');
                statusElement.style.background = 'rgba(239, 68, 68, 0.2)';
                statusElement.style.borderColor = 'rgba(239, 68, 68, 0.4)';
                
                setTimeout(() => {
                    statusElement.classList.remove('online');
                }, 3000);
            }
        }

        // Navigate to cached pages
        function navigateToCachedPage(event, path) {
            event.preventDefault();
            
            // Check if the page is available in cache
            if ('caches' in window) {
                caches.match(path)
                    .then(response => {
                        if (response) {
                            window.location.href = path;
                        } else {
                            alert('This page is not available offline. Please check your connection and try again.');
                        }
                    })
                    .catch(() => {
                        alert('Unable to check offline availability. Please check your connection and try again.');
                    });
            } else {
                window.location.href = path;
            }
        }

        // Listen for online/offline events
        window.addEventListener('online', () => {
            const statusElement = document.getElementById('networkStatus');
            const statusText = document.getElementById('statusText');
            
            statusText.textContent = '✅ Back Online!';
            statusElement.classList.add('online');
            statusElement.style.background = 'rgba(34, 197, 94, 0.2)';
            statusElement.style.borderColor = 'rgba(34, 197, 94, 0.4)';
            
            setTimeout(() => {
                window.location.reload();
            }, 2000);
        });

        window.addEventListener('offline', () => {
            const statusElement = document.getElementById('networkStatus');
            const statusText = document.getElementById('statusText');
            
            statusText.textContent = '❌ Connection Lost';
            statusElement.classList.add('online');
            statusElement.style.background = 'rgba(239, 68, 68, 0.2)';
            statusElement.style.borderColor = 'rgba(239, 68, 68, 0.4)';
            
            setTimeout(() => {
                statusElement.classList.remove('online');
            }, 3000);
        });

        // Initial connection check
        window.addEventListener('load', () => {
            setTimeout(checkConnection, 1000);
        });

        // Periodic connection check
        setInterval(checkConnection, 10000);
    </script>
</body>
</html>
