<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Zion Tech Group</title>
    <meta name="description" content="You're currently offline. Some features may not be available.">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #000000 0%, #1a1a2e 50%, #16213e 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        
        .offline-container {
            max-width: 500px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 48px 32px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        }
        
        .offline-icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 32px;
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            animation: pulse 2s infinite;
        }

        .offline-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .offline-message {
            font-size: 1.2rem;
            color: #b0b0b0;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .retry-button {
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 16px 8px;
        }

        .retry-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(78, 205, 196, 0.3);
        }

        .home-button {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 16px 8px;
            text-decoration: none;
            display: inline-block;
        }

        .home-button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .connection-info {
            margin-top: 32px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .connection-info h3 {
            font-size: 1.1rem;
            margin-bottom: 16px;
            color: #4ecdc4;
        }

        .connection-info p {
            color: #a0a0a0;
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 8px;
        }

        .tech-support {
            margin-top: 24px;
            padding: 20px;
            background: linear-gradient(135deg, rgba(78, 205, 196, 0.1), rgba(68, 160, 141, 0.1));
            border-radius: 12px;
            border: 1px solid rgba(78, 205, 196, 0.2);
        }

        .tech-support h3 {
            font-size: 1.1rem;
            margin-bottom: 16px;
            color: #4ecdc4;
        }

        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #a0a0a0;
            font-size: 0.9rem;
        }

        .contact-icon {
            width: 16px;
            height: 16px;
            background: #4ecdc4;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            color: white;
        }

        @media (max-width: 768px) {
            .offline-container {
                padding: 32px 24px;
                margin: 20px;
            }
            
            h1 {
                font-size: 2rem;
            }

            .subtitle {
                font-size: 1.1rem;
            }

            .retry-button,
            .home-button {
                display: block;
                width: 100%;
                margin: 8px 0;
            }
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">📡</div>
        
        <h1 class="offline-title">You're Offline</h1>
        
        <p class="offline-message">
            It looks like you've lost your internet connection. Don't worry - some of our content is available offline.
        </p>
        
        <button class="retry-button" onclick="retryConnection()">
            Try Again
        </button>
        
        <div class="status-indicator">
            <span class="connection-status"></span>
            <span class="status-text">Checking connection...</span>
        </div>
        
        <div class="cached-content">
            <h3>Available Offline</h3>
            <div class="cached-links">
                <a href="/" class="cached-link">Home</a>
                <a href="/services" class="cached-link">Services</a>
                <a href="/about" class="cached-link">About</a>
                <a href="/contact" class="cached-link">Contact</a>
            </div>
        </div>
    </div>

    <script>
        // Check connection status
        function checkConnection() {
            const statusText = document.querySelector('.status-text');
            const statusIndicator = document.querySelector('.connection-status');
            
            if (navigator.onLine) {
                statusText.textContent = 'Connection restored!';
                statusIndicator.style.background = '#2ed573';
                statusIndicator.style.animation = 'none';
                
                // Redirect to home page after a short delay
                setTimeout(() => {
                    window.location.href = '/';
                }, 2000);
            } else {
                statusText.textContent = 'Still offline';
                statusIndicator.style.background = '#ff4757';
            }
        }

        // Retry connection
        function retryConnection() {
            const statusText = document.querySelector('.status-text');
            const statusIndicator = document.querySelector('.connection-status');
            
            statusText.textContent = 'Checking connection...';
            statusIndicator.style.background = '#ffa502';
            statusIndicator.style.animation = 'pulse 1s infinite';
            
            // Simulate connection check
            setTimeout(() => {
                checkConnection();
            }, 1000);
        }

        // Listen for online/offline events
        window.addEventListener('online', () => {
            checkConnection();
        });

        window.addEventListener('offline', () => {
            const statusText = document.querySelector('.status-text');
            const statusIndicator = document.querySelector('.connection-status');
            
            statusText.textContent = 'Connection lost';
            statusIndicator.style.background = '#ff4757';
            statusIndicator.style.animation = 'pulse 2s infinite';
        });

        // Check connection on page load
        document.addEventListener('DOMContentLoaded', () => {
            checkConnection();
        });

        // Periodic connection check
        setInterval(checkConnection, 5000);
    </script>
</body>
</html>
