<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Zion Tech Group</title>
    <meta name="description" content="You're currently offline. Some features may not be available.">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#22ddd2">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .offline-container {
            text-align: center;
            max-width: 640px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(18px);
            border-radius: 20px;
            padding: 40px 28px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        .offline-title {
            font-size: 2.25rem;
            font-weight: 800;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #22ddd2, #0ea5e9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .offline-subtitle { font-size: 1.1rem; color: #cbd5e1; margin-bottom: 24px; }
        .status-indicator {
            display: inline-flex; align-items: center; gap: 10px;
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.35);
            border-radius: 999px; padding: 8px 14px; color: #fecaca;
            margin-bottom: 20px;
        }
        .status-dot { width: 10px; height: 10px; background: #ef4444; border-radius: 50%; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0.3; } }
        .actions { display: flex; gap: 12px; justify-content: center; margin: 20px 0 10px; flex-wrap: wrap; }
        .btn {
            padding: 12px 20px; border-radius: 10px; font-weight: 700; cursor: pointer; text-decoration: none; transition: all .2s ease;
            border: none;
        }
        .btn-primary { background: linear-gradient(135deg, #22ddd2, #2e73ea); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(34,221,210,0.3); }
        .btn-secondary { background: transparent; color: #22ddd2; border: 2px solid rgba(34,221,210,0.35); }
        .btn-secondary:hover { background: rgba(34,221,210,0.1); border-color: #22ddd2; }
        .features { text-align: left; margin-top: 16px; padding: 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; }
        .features h3 { color: #0ea5e9; margin-bottom: 10px; font-size: 1.1rem; }
        .features ul { list-style: none; }
        .features li { padding: 6px 0; color: #cbd5e1; display: flex; align-items: center; gap: 10px; }
        .features li::before { content: "✓"; color: #10b981; }
        .footer { margin-top: 22px; color: #94a3b8; font-size: .9rem; }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-title">You're Offline</div>
        <p class="offline-subtitle">Some features may be unavailable. We'll reconnect automatically when you're back online.</p>
        <div class="status-indicator"><span class="status-dot"></span><span>No Internet Connection</span></div>
        <div class="actions">
            <button class="btn btn-primary" onclick="window.location.reload()">Try Again</button>
            <a class="btn btn-secondary" href="/">Go Home</a>
        </div>
        <div class="features">
            <h3>Available Offline:</h3>
            <ul>
                <li>View cached pages and content</li>
                <li>Access company information and contact details</li>
                <li>Basic navigation</li>
            </ul>
        </div>
        <div class="footer">&copy; 2025 Zion Tech Group</div>
    </div>
    <script>
        function updateConnectionStatus() { if (navigator.onLine) { window.location.reload(); } }
        window.addEventListener('online', updateConnectionStatus);
        window.addEventListener('offline', updateConnectionStatus);
        setInterval(updateConnectionStatus, 30000);
    </script>
</body>
</html>
