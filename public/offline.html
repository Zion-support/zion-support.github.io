<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zion Tech Group - Offline</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .offline-container {
            text-align: center;
            max-width: 500px;
            padding: 2rem;
        }
        .offline-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.7;
        }
        .offline-title {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 1rem;
            color: #22ddd2;
        }
        .offline-message {
            font-size: 1.1rem;
            margin-bottom: 2rem;
            line-height: 1.6;
            color: #94a3b8;
        }
        .retry-button {
            background: linear-gradient(135deg, #22ddd2 0%, #3b82f6 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .retry-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(34, 221, 210, 0.3);
        }
        .status-indicator {
            margin-top: 2rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">📡</div>
        <h1 class="offline-title">You're Offline</h1>
        <p class="offline-message">
            It looks like you've lost your internet connection. Don't worry - some features of Zion Tech Group are still available offline.
        </p>
        <button class="retry-button" onclick="window.location.reload()">
            Try Again
        </button>
        <div class="status-indicator">
            <div>Connection Status: <span id="status">Checking...</span></div>
            <div>Last Online: <span id="lastOnline">Unknown</span></div>
        </div>
    </div>

    <script>
        // Check connection status
        function updateConnectionStatus() {
            const statusElement = document.getElementById('status');
            const lastOnlineElement = document.getElementById('lastOnline');
            
            if (navigator.onLine) {
                statusElement.textContent = 'Online';
                statusElement.style.color = '#22ddd2';
                // Redirect to main page when back online
                setTimeout(() => {
                    window.location.href = '/';
                }, 1000);
            } else {
                statusElement.textContent = 'Offline';
                statusElement.style.color = '#ef4444';
            }
        }

        // Update last online time
        function updateLastOnline() {
            const lastOnline = localStorage.getItem('lastOnline');
            if (lastOnline) {
                document.getElementById('lastOnline').textContent = new Date(parseInt(lastOnline)).toLocaleString();
            }
        }

        // Listen for online/offline events
        window.addEventListener('online', updateConnectionStatus);
        window.addEventListener('offline', updateConnectionStatus);

        // Store current time as last online
        localStorage.setItem('lastOnline', Date.now().toString());

        // Initial status check
        updateConnectionStatus();
        updateLastOnline();

        // Periodic status check
        setInterval(updateConnectionStatus, 5000);
    </script>
</body>
</html>
