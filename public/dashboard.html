<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zion Techgroup – Pipeline Dashboard</title>
  <style>
    /* ... existing styles ... */
    .monet-banner { ... }
  </style>
</head>
<body>
  <h1>CI Pipeline Health</h1>
  <div id="data"></div>

  <!-- Monetization Section -->
  <div class="monet-banner" style="margin-top:30px;">
    <h2>Support Us</h2>
    <p>Free tools used: GitHub Sponsors, PayPal, affiliate links, analytics.</p>
    <div style="display:flex;gap:15px;">
      <a href="https://amzn.to/3wxy123" target="_blank">Amazon CI Tools</a> |
      <a href="/sponsors" target="_blank">GitHub Sponsors</a> |
      <form action="https://www.paypal.com/donate" method="post" target="_blank">
        <input type="hidden" name="hosted_button_id" value="BTN12345" />
        <input type="image" src="https://example.com/paypal-button.png" />
      </form>
      <a href="https://buttondown.email/embed/subscribe" target="_blank">Newsletter</a> |
      <a href="https://ga.example.com/analytics" target="_blank">Analytics</a>
    </div>
  </div>

  <!-- Sponsor Script -->
  <script>
    fetch('/sponsors.json')
      .then(r => r.json())
      .then(sponsors => {
        const container = document.getElementById('sponsors');
        sponsors.forEach(s => {
          const img = document.createElement('img'); img.src = s.avatar_url;
          container.appendChild(img);
        });
      });
  </script>
</body>
</html>
