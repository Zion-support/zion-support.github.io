# Yarn configuration optimized for Netlify builds
# This configuration prevents common build failures

# Disable immutable installs to allow cache recovery
enableImmutableInstalls: false

# Set network timeout for slow connections
httpTimeout: 300000

# Use local cache folder
cacheFolder: ".yarn/cache"

# Conservative network concurrency to avoid rate limits
networkConcurrency: 2

# Set registry timeout
registryTimeout: 300000

# Enable progress bars for debugging
enableProgressBars: true

# Disable telemetry
enableTelemetry: false

# Disable global cache to avoid conflicts
enableGlobalCache: false

# Use standard cache mode
cacheMode: copy

# Enable strict peer dependencies
enableStrictPeerDependencies: false

# Disable workspaces to prevent conflicts
enableWorkspaces: false