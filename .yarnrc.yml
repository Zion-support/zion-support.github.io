# Yarn configuration for Netlify builds
# This configuration helps prevent cache-related build failures

# Disable immutable installs to allow cache recovery
enableImmutableInstalls: false

# Set network timeout to handle slow downloads
httpTimeout: 300000

# Disable cache for problematic packages
cacheFolder: ".yarn/cache"

# Enable network concurrency for faster downloads
networkConcurrency: 8

# Set registry timeout
registryTimeout: 300000

# Enable progress bars for better debugging
enableProgressBars: true

# Disable telemetry
enableTelemetry: false

# Set compression level
compressionLevel: mixed

# Enable global cache
enableGlobalCache: true

# Set cache mode to avoid cache corruption issues
cacheMode: hardlinks-global