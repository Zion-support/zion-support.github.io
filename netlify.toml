[build]
  # Build the project on Netlify
  command = "echo 'Skipping build: deploying prebuilt dist'"
  publish = "dist"
  functions = "netlify/functions"
  command_timeout = "15m"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--omit=optional"
  NETLIFY_NEXT_PLUGIN_SKIP = "true"
  NETLIFY_FUNCTIONS_TIMEOUT = "30"

# Next.js plugin is disabled via UI for prebuilt static deploys

# Function bundling optimization
[functions]
  node_bundler = "esbuild"
  external_node_modules = ["aws-sdk"]

# SPA routing - redirect all routes to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Optimized cache headers for better performance
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
