# This is a VITE project, NOT a Next.js project
# The build process uses Vite to create a static site in the 'dist' folder
# No Next.js plugins or configurations are needed

[build]
  # Use `npm ci` for deterministic installs, Vite builds to dist folder
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NODE_OPTIONS = "--max_old_space_size=4096"
  NPM_FLAGS = "--prefer-offline"

# Redirects for legacy URLs
[[redirects]]
  from = "/ai-autonomous-ecosystem"
  to = "/ai-autonomous-ecosystem-manager"
  status = 301

