[build]
  # Skipping build: deploying prebuilt dist
  command = "echo 'Skipping build: deploying prebuilt dist'"
  publish = "dist"
  functions = "netlify/functions"
  command_timeout = "30m"
  # Only run when files outside dist/ change
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- . ':(exclude)dist'"

[build.environment]
  NODE_VERSION = "20"
  PYTHON_VERSION = "3.11"
  # Do not install dependencies during deploy; avoids Yarn on Netlify
  NETLIFY_SKIP_INSTALL = "true"
  NETLIFY_USE_YARN = "false"
  NPM_FLAGS = "--omit=optional"
  # Disable Next.js runtime plugin since we deploy a prebuilt static dist
  NETLIFY_NEXT_PLUGIN_SKIP = "true"



[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Set basic cache headers for static assets for better performance
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=300"
