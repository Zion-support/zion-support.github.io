[build]
  functions = "netlify/functions"
  command = "yarn build:netlify"

[build.environment]
  # Set Node.js version
  NODE_VERSION = "20.18.1"
  # Set production environment
  NODE_ENV = "production"
  # Increase timeout for dependency installation
  NETLIFY_TIMEOUT = "600"
  # Force use of Yarn instead of pnpm
  NPM_CONFIG_PACKAGE_MANAGER = "yarn"
  # Yarn version
  YARN_VERSION = "1.22.22"
  # NPM flags for better performance
  NPM_FLAGS = "--prefer-offline --no-audit --progress=false"
  # Node.js options for build
  NODE_OPTIONS = "--max-old-space-size=6144 --openssl-legacy-provider"
  # Disable Next.js telemetry
  NEXT_TELEMETRY_DISABLED = "1"
  # Force SWC to use JavaScript fallback
  SWC_BINARY_PATH = ""
  NEXT_SWC_BINARY_PATH = ""

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[plugins]]
  package = "netlify-plugin-cloudinary"

# Static redirects for exported site
