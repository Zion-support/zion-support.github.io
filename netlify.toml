[[redirects]]
  from = "/api/*"
  to = "https://backend.example.com/:splat"
  status = 200
 
[build]
  command = "pnpm build"
  publish = "dist"
  command_timeout = "30m"

[build.environment]
  NODE_VERSION = "24.0.0"
  PNPM_VERSION = "10.17.1"
  NETLIFY_USE_PNPM = "true"

[[plugins]]
  package = "netlify-plugin-cloudinary"
  [plugins.inputs]

# Compression is handled by Netlify's built-in compression
# No additional plugin needed

[context.production.environment]
  NODE_ENV = "production"
  NPM_CONFIG_PRODUCTION = "false"

[context.deploy-preview]
  command = "pnpm build"

[context.branch-deploy]
  command = "pnpm build"
