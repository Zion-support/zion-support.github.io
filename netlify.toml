[build]
  # Use `npm ci` for deterministic installs, Next.js plugin expects .next
  command = "npm ci && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NODE_OPTIONS = "--max-old-space-size=6144 --openssl-legacy-provider"
  NPM_FLAGS = "--prefer-offline"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Redirects to resolve broken internal slugs
