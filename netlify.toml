[build]
  # Install Python dependencies first, then Node.js dependencies and build
  # Explicitly use system Python to avoid mise shim issues
  # Use a non-standard requirements file name to prevent Netlify's auto Python install step
  command = "/usr/bin/python3 -m pip install -r requirements.build.txt && npm ci && npm run build"
  publish = "dist"
  command_timeout = "30m"

[build.environment]
  NODE_VERSION = "20"
  # Use image's system Python to avoid mise/asdf auto-install stage
  PYTHON_VERSION = "system"
  # Skip Netlify auto installers; rely on build command
  NETLIFY_SKIP_INSTALL = "true"

[[plugins]]
  package = "netlify-plugin-compress"
  [plugins.inputs]
    gzip = true
    brotli = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
