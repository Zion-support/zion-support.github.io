[build]
  command = "npm install --ignore-scripts --legacy-peer-deps && npm install --save-dev @types/react@^17.0.0 @types/react-dom@^17.0.0 typescript --legacy-peer-deps && NODE_OPTIONS='--openssl-legacy-provider' npm run export"
  publish = "out"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--legacy-peer-deps"
  NODE_OPTIONS = "--openssl-legacy-provider"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[plugins]]
  package = "netlify-plugin-cloudinary" 