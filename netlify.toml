[build]
  # Use `npm ci` for deterministic installs
  # Generate Prisma client before building to ensure models are up to date
  command = "npm run build:netlify:prepare"
  # Netlify UI sets `publish` to `out` which causes the Next.js plugin to fail
  # because no exported directory exists. Explicitly publish the `.next`
  # directory so the plugin can run correctly.
  publish = ".next"
  # Increase build timeout for 176+ pages
  command_timeout = "30m"

[build.environment]
  NODE_VERSION = "22.18.0"
  NEXT_PUBLIC_SITE_URL = "https://ziontechgroup.com"

# [[plugins]]
#   package = "@netlify/plugin-nextjs"

[[plugins]]
  package = "netlify-plugin-cloudinary"

  schedule = "*/20 * * * *" # every 20 minutes

[[scheduled.functions]]
  name = "cloud_orchestrator"
  schedule = "0 */4 * * *" # every 4 hours

[[scheduled.functions]]
  name = "front-enhancer"
  schedule = "*/10 * * * *" # every 10 minutes

[[scheduled.functions]]
  name = "front-ads-scheduler"
  schedule = "*/10 * * * *" # every 10 minutes

[[scheduled.functions]]
  name = "front-futurizer"
  schedule = "*/15 * * * *" # every 15 minutes

[[scheduled.functions]]
  name = "marketing-and-features-promo"
  schedule = "*/30 * * * *" # every 30 minutes

[[scheduled.functions]]
  name = "homepage-updater"
  schedule = "0 */6 * * *" # every 6 hours
=======
[[plugins]]
  package = "netlify-plugin-cloudinary"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://plausible.io; connect-src 'self' https://plausible.io; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; frame-ancestors 'none'"

# Cache static assets
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/favicon.ico"
  [headers.values]
    Cache-Control = "public, max-age=604800"
