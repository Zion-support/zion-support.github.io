[build]
  command = "npm ci && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NODE_OPTIONS = "--max_old_space_size=4096"
  NPM_FLAGS = "--prefer-offline"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Static redirects for exported/broken legacy routes
[[redirects]]
  from = "/ai-content-marketing-automation"
  to = "/ai-content-generator"
  status = 301

[[redirects]]
  from = "/ai-customer-success-automation"
  to = "/ai-customer-success-platform"
  status = 301

[[redirects]]
  from = "/autonomous-it-operations"
  to = "/autonomous-it-operations-center"
  status = 301

[[redirects]]
  from = "/quantum-internet-security"
  to = "/quantum-internet-security-platform"
  status = 301

[[redirects]]
  from = "/quantum-materials-discovery"
  to = "/quantum-materials-discovery-platform"
  status = 301

[[redirects]]
  from = "/quantum-networking"
  to = "/quantum-services"
  status = 301

[[redirects]]
  from = "/quantum-data-center"
  to = "/quantum-services"
  status = 301
