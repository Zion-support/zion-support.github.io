[build]
  command = "npm install --legacy-peer-deps && NODE_OPTIONS='--openssl-legacy-provider' npm run build && node generate-static.js"
  publish = "out"

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true

[build.environment]
  NODE_VERSION = "22.16.0"
  NPM_FLAGS = "--legacy-peer-deps"
  NODE_OPTIONS = "--openssl-legacy-provider"

# Performance optimizations
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Image optimization
[[plugins]]
  package = "netlify-plugin-cloudinary"

# Cache optimization - moved to _headers file for static export compatibility
# [[headers]]
#   for = "/*"
#   [headers.values]
#     Cache-Control = "public, max-age=31536000, immutable"

# [[headers]]
#   for = "/_next/static/*"
#   [headers.values]
#     Cache-Control = "public, max-age=31536000, immutable"

# Security headers - moved to _headers file for static export compatibility
# [[headers]]
#   for = "/*"
#   [headers.values]
#     X-Frame-Options = "DENY"
#     X-Content-Type-Options = "nosniff"
#     Referrer-Policy = "origin-when-cross-origin"
#     Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Redirects are now handled by _redirects file

[functions]
  node_bundler = "esbuild" 
