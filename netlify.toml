[build]
  # Publish a minimal static site to unblock Netlify while the main app is repaired
  command = "mkdir -p site && echo '<!doctype html><html><head><meta charset=\"utf-8\"><meta name=\"viewport\" content=\"width=device-width,initial-scale=1\"><title>Maintenance</title><style>body{margin:0;display:flex;align-items:center;justify-content:center;height:100vh;font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,Noto Sans,sans-serif;background:#0b1220;color:#e5e7eb} .card{max-width:680px;padding:32px;border:1px solid #1f2a44;border-radius:12px;background:#0e1628} h1{margin:0 0 8px;font-size:28px;color:#ffffff} p{margin:0 0 16px;line-height:1.6;color:#9aa4b2} .tag{display:inline-block;margin-top:8px;padding:4px 8px;border:1px solid #1f2a44;border-radius:999px;color:#9aa4b2;font-size:12px}</style></head><body><div class=\"card\"><h1>Site under maintenance</h1><p>We\'re deploying updates and will be back shortly.</p><div class=\"tag\">Temporary fallback via Netlify</div></div></body></html>' > site/index.html"
  publish = "site"
  command_timeout = "30m"

[build.environment]
  NODE_VERSION = "20"
  PYTHON_VERSION = "3.11"
  MISE_PYTHON_COMPILE = "false"
  # Disable Netlify's auto dependency installers; we handle installs in the build command
  NETLIFY_SKIP_INSTALL = "true"
  # Disable mise shims entirely during Netlify builds
  MISE_DISABLE = "1"
  MISE_SHIMS = "0"
  # Force mise to use system Python even during Netlify's dependency stage (defensive)
  MISE_TOOL_VERSIONS__python = "system"
  # Skip large binary downloads during CI to stabilize installs
  ELECTRON_SKIP_BINARY_DOWNLOAD = "1"
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD = "1"
  PUPPETEER_SKIP_DOWNLOAD = "1"
  CYPRESS_INSTALL_BINARY = "0"

[[plugins]]
  package = "netlify-plugin-compress"
  [plugins.inputs]
    gzip = true
    brotli = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
