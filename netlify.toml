[build]
  # Deploy prebuilt assets from dist without running a build on Netlify
  command = "echo Skipping build; deploying prebuilt dist"
  publish = "dist"
  command_timeout = "30m"

[build.environment]
  NODE_VERSION = "20"
  NETLIFY_SKIP_INSTALL = "true"




[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
