[build]
  publish = "dist"
  command = "npm run build"
  framework = "vite"

# Disable automatic framework detection
[build.processing]
  skip_processing = false

[build.environment]
  NODE_VERSION = "20.19.0"
  NODE_OPTIONS = "--max-old-space-size=6144"
  # Ensure pnpm installs with updated lockfile and includes devDependencies needed for Vite build
  PNPM_FLAGS = "--no-frozen-lockfile --prod=false"
  # Skip Sharp postinstall to avoid NAPI issues
  SHARP_IGNORE_GLOBAL_LIBVIPS = "1"
  SHARP_DIST_BASE_URL = "https://github.com/lovell/sharp-libvips/releases/download/v1.2.0/"
  # Force Vite build
  VITE_BUILD = "true"
  # Ensure proper build environment
  NODE_ENV = "production"
  CI = "true"
  # Disable linting during build to prevent failures
  ESLINT_NO_DEV_ERRORS = "true"
  # Optimize build performance
  VITE_LEGACY_BUILD = "false"
  # Explicitly skip Next.js plugin (plugin installed via Netlify UI)
  NETLIFY_NEXT_PLUGIN_SKIP = "true"
  # Enable build caching
  NETLIFY_CACHE_DIR = ".netlify/cache"
  # Netlify Secrets Scanner: allow public client-side env var
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME"

# IMPORTANT: This is a Vite project, NOT a Next.js project
# The @netlify/plugin-nextjs plugin is NOT needed and should NOT be installed
# This plugin is specifically for Next.js projects and will cause build failures
# if configured incorrectly (e.g., with invalid inputs like "skip: true")

# SPA routing redirects for Vite build
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security and caching headers for static assets
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    X-Frame-Options = "DENY"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-DNS-Prefetch-Control = "on"
    Content-Security-Policy = "default-src 'self'; object-src 'none'; upgrade-insecure-requests; script-src 'self' 'unsafe-inline' https://plausible.io; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://plausible.io; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; report-uri /api/csp-report"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"
    X-Permitted-Cross-Domain-Policies = "none"
    Origin-Agent-Cluster = "?1"

# Static redirects for exported site
