[build]
  # Use `npm ci` for deterministic installs
  # Generate Prisma client before building to ensure models are up to date
  command = "npm run build:netlify:prepare"
  # Netlify UI sets `publish` to `out` which causes the Next.js plugin to fail
  # because no exported directory exists. Explicitly publish the `.next`
  # directory so the plugin can run correctly.
  publish = ".next"
  # Increase build timeout for 176+ pages
  command_timeout = "30m"
[build.environment]
[[plugins]]
  package = "netlify-plugin-cloudinary"
  NODE_OPTIONS = "--max_old_space_size=4096"
  NPM_FLAGS = "--prefer-offline"
  NODE_VERSION = "20"
[[plugins]]
  package = "@netlify/plugin-nextjs"
=======
  publish = "dist"
[build.environment]
  NODE_OPTIONS = "--max-old-space-size=6144 --openssl-legacy-provider"
  NETLIFY_NEXT_PLUGIN_SKIP = "true"
# SPA routing redirects for Vite
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
# Headers for static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
[[headers]]
  for = "/*.css"
  [headers.values]
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-DNS-Prefetch-Control = "on"
    Content-Security-Policy = "default-src 'self'; object-src 'none'; upgrade-insecure-requests; script-src 'self' 'unsafe-inline' https://plausible.io; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://plausible.io; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"
    X-Permitted-Cross-Domain-Policies = "none"
    Origin-Agent-Cluster = "?1"
