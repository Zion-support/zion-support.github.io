[build]
  # Install Python dependencies first, then Node.js dependencies and build
  command = "pip install -r requirements.txt && npm ci && npm run build"
  publish = "dist"
  command_timeout = "30m"

[build.environment]
  NODE_VERSION = "20"
  MISE_PYTHON_COMPILE = "false"
  # Force mise to use system Python even during Netlify's dependency stage
  MISE_TOOL_VERSIONS__python = "system"

[[plugins]]
  package = "netlify-plugin-compress"
  [plugins.inputs]
    gzip = true
    brotli = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
