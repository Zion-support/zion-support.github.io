# This is a VITE project, NOT a Next.js project
# The build process uses Vite to create a static site in the 'dist' folder
# No Next.js plugins or configurations are needed

[build]
  # Use `yarn install` for deterministic installs, Vite builds to dist/
  command = "yarn cache clean && yarn install --frozen-lockfile && yarn build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NODE_OPTIONS = "--max_old_space_size=4096"
  # Force Yarn usage and skip npm
  YARN_FLAGS = "--frozen-lockfile"
  NPM_FLAGS = "--ignore-scripts"
  # Skip Netlify's Next.js plugin since this is a Vite static site
  NETLIFY_NEXT_PLUGIN_SKIP = "true"
  CANONICAL_URL = "https://ziontechgroup.com"

# Removed Next.js plugin since this is a Vite project

# Redirects for SEO/legacy URLs
[[redirects]]
  from = "/ai-autonomous-ecosystem"
  to = "/ai-autonomous-ecosystem-manager"
  status = 301

[[redirects]]
  from = "/autonomous-it-operations"
  to = "/autonomous-it-operations-center"
  status = 301

[[redirects]]
  from = "/quantum-internet-security"
  to = "/quantum-internet-security-platform"
  status = 301

[[redirects]]
  from = "/quantum-materials-discovery"
  to = "/quantum-materials-discovery-platform"
  status = 301

[[redirects]]
  from = "/autonomous-vehicle-ai"
  to = "/autonomous-vehicle-ai-platform"
  status = 301

[[redirects]]
  from = "/ai-content-marketing-automation"
  to = "/ai-content-generator"
  status = 301

[[redirects]]
  from = "/ai-customer-success-automation"
  to = "/ai-customer-success-platform"
  status = 301

[[redirects]]
  from = "/browser-automation-cloud/"
  to = "/browser-automation-cloud"
  status = 301

# Handle client-side routing for SPA (this is also in _redirects file)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

