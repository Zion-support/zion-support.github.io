[build]
  # Use prebuilt static output in 'dist' to avoid failing source build
  command = "echo Using prebuilt dist directory"
  publish = "dist"
  command_timeout = "30m"

[build.environment]
  NODE_VERSION = "20"
  NETLIFY_SKIP_INSTALL = "true"


[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
