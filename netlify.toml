[build]
  command = "mise install --yes && python -m pip install -r requirements.txt && npm ci --no-audit --no-fund && npm run build"
  publish = "dist"
  command_timeout = "30m"

[build.environment]
  NODE_VERSION = "20"
  PYTHON_VERSION = "3.11"
  NETLIFY_SKIP_INSTALL = "true"
  MISE_PYTHON_COMPILE = "false"

[[plugins]]
  package = "netlify-plugin-compress"
  [plugins.inputs]
    gzip = true
    brotli = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
