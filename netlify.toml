# This is a VITE project, NOT a Next.js project
# The build process uses Vite to create a static site in the 'dist' folder
# No Next.js plugins or configurations are needed

[build]
  # Use a build script that forces npm usage
  command = "bash ./scripts/netlify-build.sh"
  publish = "dist"
  base = "."
  # Explicitly override any package manager detection
  ignore = "yarn.lock .yarnrc .yarnrc.yml .yarn"

[build.environment]
  NODE_VERSION = "20"
  NODE_OPTIONS = "--max_old_space_size=6144"
  # Force npm for dependency management - AGGRESSIVE SETTINGS
  NPM_FLAGS = "--ignore-scripts --no-optional"
  # Skip Netlify's Next.js plugin since this is a Vite static site
  NETLIFY_NEXT_PLUGIN_SKIP = "true"
  # Force npm usage and disable Yarn completely - MORE AGGRESSIVE
  NETLIFY_USE_YARN = "false"
  NETLIFY_USE_NPM = "true"
  # Disable framework detection
  NETLIFY_DISABLE_FRAMEWORK_DETECTION = "true"
  # Force static site build
  NETLIFY_FORCE_STATIC_BUILD = "true"
  # Skip all framework plugins
  NETLIFY_SKIP_FRAMEWORK_PLUGINS = "true"
  # Disable Corepack to prevent Yarn detection
  COREPACK_ENABLE = "false"
  # Force npm install
  NPM_CONFIG_PACKAGE_MANAGER = "npm"
  # Additional npm forcing
  NPM_CONFIG_ENGINE_STRICT = "false"
  NPM_CONFIG_FUND = "false"
  NPM_CONFIG_AUDIT = "false"
  NPM_CONFIG_UPDATE_NOTIFIER = "false"
  NPM_CONFIG_PREFER_OFFLINE = "true"
  CANONICAL_URL = "https://ziontechgroup.com"
  # Fix Rollup module issues
  NPM_CONFIG_OPTIONAL = "false"
  NPM_CONFIG_PLATFORM = "linux"
  NPM_CONFIG_ARCH = "x64"
  NPM_CONFIG_TARGET_PLATFORM = "linux"
  NPM_CONFIG_TARGET_ARCH = "x64"
  NPM_CONFIG_LEGACY_PEER_DEPS = "true"
  NPM_CONFIG_STRICT_SSL = "false"
  NPM_CONFIG_BUILD_FROM_SOURCE = "false"
  # Additional Rollup fixes
  VITE_ROLLUP_PLATFORM = "linux"
  VITE_ROLLUP_ARCH = "x64"
  ROLLUP_PLATFORM = "linux"
  ROLLUP_ARCH = "x64"
  # Explicitly disable Yarn and force npm
  YARN_ENABLE = "false"
  YARN_IGNORE_PATH = "true"
  YARN_IGNORE_ENGINES = "true"
  YARN_IGNORE_PLATFORM = "true"
  YARN_IGNORE_SCRIPTS = "true"

# Fix MIME type issues
[[headers]]
  for = "/js/*"
  [headers.values]
    Content-Type = "application/javascript"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Content-Type = "text/css"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Content-Type = "application/javascript"

[[headers]]
  for = "*.css"
  [headers.values]
    Content-Type = "text/css"

[[headers]]
  for = "*.svg"
  [headers.values]
    Content-Type = "image/svg+xml"

[[headers]]
  for = "*.ico"
  [headers.values]
    Content-Type = "image/x-icon"

[[headers]]
  for = "*.png"
  [headers.values]
    Content-Type = "image/png"

[[headers]]
  for = "*.jpg"
  [headers.values]
    Content-Type = "image/jpeg"

[[headers]]
  for = "*.jpeg"
  [headers.values]
    Content-Type = "image/jpeg"

[[headers]]
  for = "*.gif"
  [headers.values]
    Content-Type = "image/gif"

[[headers]]
  for = "*.webp"
  [headers.values]
    Content-Type = "image/webp"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Content-Type = "application/javascript"

[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Content-Type = "application/javascript"

[[headers]]
  for = "/site.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"

# Removed Next.js plugin since this is a Vite project

