# Netlify configuration for Zion Tech Group
[build]
  command = "npm run build"

[build.environment]
  NODE_VERSION = "18"

## Use Netlify Next.js plugin for SSR/ISR. Remove SPA catch‑all that breaks Next routing
[[plugins]]
  package = "@netlify/plugin-nextjs"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
