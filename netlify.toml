[build]
  # Install Python dependencies first (if used), then Node.js dependencies and build
  # Use npm ci with production deps to avoid dev-only native installs during Netlify build
  command = "/usr/bin/python3 -m pip install -r requirements.txt || true && npm ci --omit=dev && npm run build"
  publish = "dist"
  command_timeout = "30m"

[build.environment]
  NODE_VERSION = "20"
  PYTHON_VERSION = "3.11"
  MISE_PYTHON_COMPILE = "false"
  # Disable Netlify's auto dependency installers; we handle installs in the build command
  NETLIFY_SKIP_INSTALL = "true"
  # Disable mise shims entirely during Netlify builds
  MISE_DISABLE = "1"
  MISE_SHIMS = "0"
  # Force mise to use system Python even during Netlify's dependency stage (defensive)
  MISE_TOOL_VERSIONS__python = "system"

[[plugins]]
  package = "netlify-plugin-compress"
  [plugins.inputs]
    gzip = true
    brotli = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
