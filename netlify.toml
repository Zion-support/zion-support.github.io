[build]
  # Use custom build script to handle TypeScript configuration issues
  command = "bash scripts/netlify-build.sh"
  publish = "out"
  # Explicitly specify this is a Next.js static site
  base = "."

[build.environment]
  NODE_VERSION = "22"
  NODE_OPTIONS = "--max-old-space-size=8192 --openssl-legacy-provider"
  NETLIFY_USE_NPM = "true"
  NETLIFY_DISABLE_FRAMEWORK_DETECTION = "false"
  CANONICAL_URL = "https://ziontechgroup.com"
  # Force npm usage and disable pnpm detection
  NPM_CONFIG_LEGACY_PEER_DEPS = "true"
  NETLIFY_USE_PNPM = "false"

[[plugins]]
  package = "netlify-plugin-cloudinary"

# Next.js routing - remove the catch-all redirect that conflicts with Next.js
# [[redirects]]
#   from = "/*"
#   to = "/index.html"
#   status = 200

[functions]
  node_bundler = "esbuild" 
