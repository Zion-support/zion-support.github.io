[build]
  # Use custom build script to handle TypeScript configuration issues
  command = "bash scripts/netlify-build.sh"
  publish = "out"
  # Explicitly specify this is a Next.js static site
  base = "."

[build.environment]
  NODE_VERSION = "20"
  NODE_OPTIONS = "--max-old-space-size=8192 --openssl-legacy-provider"
  NETLIFY_USE_NPM = "true"
  NETLIFY_DISABLE_FRAMEWORK_DETECTION = "false"
  CANONICAL_URL = "https://ziontechgroup.com"
  # Force npm usage and disable pnpm detection
  NPM_CONFIG_LEGACY_PEER_DEPS = "true"
  NETLIFY_USE_PNPM = "false"

# Performance optimizations
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Image optimization
[[plugins]]
  package = "netlify-plugin-cloudinary"

# Cache optimization
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Redirects for better SEO
[[redirects]]
  from = "/home"
  to = "/"
  status = 301

[[redirects]]
  from = "/index"
  to = "/"
  status = 301

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild" 
