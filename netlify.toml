[build]
  # Build with Vite and deploy dist directory
  command = "pnpm run build:optimized"
  publish = "dist"
  command_timeout = "30m"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  # Avoid optional binary downloads (electron, playwright, cypress)
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD = "1"
  PUPPETEER_SKIP_DOWNLOAD = "1"
  CYPRESS_INSTALL_BINARY = "0"
  ELECTRON_SKIP_DOWNLOAD = "1"
  # Disable Next.js auto-detection
  NEXT_TELEMETRY_DISABLED = "1"

# Disable Next.js plugin auto-detection since we're using Vite
[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

# Cloudinary plugin for image optimization
[[plugins]]
  package = "netlify-plugin-cloudinary"



[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    X-Content-Type-Options = "nosniff"
