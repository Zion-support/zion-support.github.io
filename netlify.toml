[build]
  base = "zion-website"
  command = "npm ci --no-audit --no-fund && npm run build"
  publish = ".next"
  command_timeout = "30m"
  # Next.js on Netlify

[build.environment]
  NODE_VERSION = "20"
  NODE_OPTIONS = "--max-old-space-size=6144"
  NETLIFY_USE_NPM = "true"
  CANONICAL_URL = "https://ziontechgroup.com"
  GIT_SUBMODULE_STRATEGY = "none"
  NPM_CONFIG_LEGACY_PEER_DEPS = "true"
  NPM_CONFIG_STRICT_SSL = "false"
  NPM_CONFIG_BUILD_FROM_SOURCE = "false"
  NPM_CONFIG_PREFER_OFFLINE = "true"

# Enable Next.js runtime
[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.processing]
  skip_processing = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

# Optional CSP for JS if needed
# [[headers]]
#   for = "*.js"
#   [headers.values]
#     Content-Security-Policy = "script-src 'self' 'unsafe-inline' 'unsafe-eval' *.netlify.app *.netlify.com; style-src 'self' 'unsafe-inline' *.googleapis.com; img-src 'self' data: https:; font-src 'self' *.gstatic.com *.googleapis.com"

# Redirects for legacy URLs (optional)
[[redirects]]
  from = "/api/*"
  to = "https://backend.example.com/:splat"
  status = 200

