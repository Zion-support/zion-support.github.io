# Netlify config for a Next.js static export (no SSR / functions)
# We build with npm and publish the exported `out` directory

[build]
  command = "npm ci --no-audit --no-fund --legacy-peer-deps && npm run export"
  publish = "out"
  base = "."

[build.environment]
  NODE_VERSION = "18.20.8"
  NPM_FLAGS = "--legacy-peer-deps"
  NODE_OPTIONS = "--max-old-space-size=4096"
  # Yarn not used; npm is enforced by build command

# No Netlify plugins needed for static export

# Static redirects for exported site
[[redirects]]
  from = "/ai-customer-success-platform"
  to = "/services/ai-customer-success-platform/"
  status = 301

