[build]
  command = "pnpm install && pnpm run build"
  publish = "out"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "16"

[[plugins]]
  package = "@netlify/plugin-nextjs@4.41.3"

# Optional: a few redirects that were present
[[redirects]]
  from = "/ai-autonomous-ecosystem"
  to = "/ai-autonomous-ecosystem-manager"
  status = 301

[[redirects]]
  from = "/autonomous-it-operations"
  to = "/autonomous-it-operations-center"
  status = 301

[[redirects]]
  from = "/quantum-internet-security"
  to = "/quantum-internet-security-platform"
  status = 301

[[redirects]]
  from = "/quantum-materials-discovery"
  to = "/quantum-materials-discovery-platform"
  status = 301

[[redirects]]
  from = "/autonomous-vehicle-ai"
  to = "/autonomous-vehicle-ai-platform"
  status = 301

[[redirects]]
  from = "/ai-content-marketing-automation"
  to = "/ai-content-generator"
  status = 301

[[redirects]]
  from = "/ai-customer-success-automation"
  to = "/ai-customer-success-platform"
  status = 301

[[redirects]]
  from = "/ai-content-marketing-automation"
  to = "/intelligent-content-automation-platform"
  status = 301

[[redirects]]
  from = "/autonomous-it-operations"
  to = "/autonomous-it-operations-center"
  status = 301

[[redirects]]
  from = "/quantum-internet-security"
  to = "/quantum-internet-security-platform"
  status = 301

[[scheduled.functions]]
  name = "fast-orchestrator"
  schedule = "*/1 * * * *" # every minute

[[scheduled.functions]]
  name = "continuous-orchestrator"
  schedule = "*/5 * * * *" # every 5 minutes

[[scheduled.functions]]
  name = "front-visionary-expander"
  schedule = "*/3 * * * *" # fast refresh for front systems

[[scheduled.functions]]
  name = "home-visionary-expander"
  schedule = "*/4 * * * *" # fast refresh for homepage

[[scheduled.functions]]
  name = "ultrafast-orchestrator"
  schedule = "*/1 * * * *" # every minute

[[scheduled.functions]]
  name = "front-maximizer"
  schedule = "*/5 * * * *" # every 5 minutes

[[scheduled.functions]]
  name = "continuous-front-runner"
  schedule = "*/3 * * * *" # every 3 minutes

[[scheduled.functions]]
  name = "readme-advertiser"
  schedule = "13 */6 * * *" # every 6 hours

[[scheduled.functions]]
  name = "front-ads-promoter"
  schedule = "*/10 * * * *" # every 10 minutes

[[scheduled.functions]]
  name = "ultrafast-front-orchestrator"
  schedule = "*/5 * * * *" # every 5 minutes
