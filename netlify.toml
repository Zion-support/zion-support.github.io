[build]
  command = "./build-comprehensive.sh"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20.18.0"
  YARN_VERSION = "1.22.22"
  NPM_FLAGS = "--legacy-peer-deps"
  YARN_FLAGS = "--no-cache --ignore-engines --ignore-platform --force"

[[plugins]]
  package = "@netlify/plugin-lighthouse"

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true