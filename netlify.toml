[build]
  # Install Python dependencies first, then Node.js dependencies and build
  command = "pip install -r requirements.txt && npm ci && npm run build"
  publish = "dist"
  command_timeout = "30m"

[build.environment]
  NODE_VERSION = "20"
  PYTHON_VERSION = "3.11.9"
  # Workaround for Netlify mise building Python from source: force precompiled
  MISE_SETTINGS = "python.compile=false"

[[plugins]]
  package = "netlify-plugin-compress"
  [plugins.inputs]
    gzip = true
    brotli = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
# Netlify configuration - clean version without merge conflicts
