# Netlify configuration for Zion Tech Group
[build]
  publish = ".next"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

## Removed SPA-style redirect to preserve Next.js routing on Netlify

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
