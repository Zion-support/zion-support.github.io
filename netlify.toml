[build]
  # Skip build and serve prebuilt static output from the repository
  command = "echo 'Netlify: Skipping build; serving prebuilt out/ directory'"
  publish = "out"
  command_timeout = "30m"

[build.environment]
  NODE_VERSION = "20"
  PYTHON_VERSION = "3.11"
  NETLIFY_SKIP_INSTALL = "true"


[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
