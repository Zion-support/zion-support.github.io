[build]
  # Use prebuilt static site in 'out' to avoid broken build step
  command = "echo Skipping build; using prebuilt out directory"
  publish = "out"
  command_timeout = "30m"

[build.environment]
  NODE_VERSION = "20"
  PYTHON_VERSION = "3.11"
  # Allow mise to manage tools in CI
  NETLIFY_SKIP_INSTALL = "true"


[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
