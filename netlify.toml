[build]
  command = "npm run build"
  publish = "out"
  command_timeout = "30m"

[build.environment]
  NODE_VERSION = "20"
  NODE_OPTIONS = "--max_old_space_size=4096"

# Static redirects (since Next.js redirects are ignored on export)
[[redirects]]
  from = "/ai-customer-success-platform"
  to = "/services/ai-customer-success-platform/"
  status = 301

