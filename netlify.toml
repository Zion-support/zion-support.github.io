[build]
  # Use npm for dependency installation and build (skip linting due to TypeScript version compatibility)
  command = "npm ci && npm run build"
  publish = "out"
  # Explicitly specify this is a Next.js static site
  base = "."

[build.environment]
  NODE_VERSION = "20"
  NODE_OPTIONS = "--max-old-space-size=8192 --openssl-legacy-provider"
  NETLIFY_USE_NPM = "true"
  NETLIFY_DISABLE_FRAMEWORK_DETECTION = "false"
  CANONICAL_URL = "https://ziontechgroup.com"

# Note: Headers are now handled by the generated _headers file in the out directory
# This ensures compatibility with Next.js static export and avoids conflicts

# Removed Next.js plugin since this is a Vite project

# Note: Redirects are now handled by the generated _redirects file in the out directory
# This ensures compatibility with Next.js static export and avoids conflicts

