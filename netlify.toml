[build]
  # Use build script with fallback Python handling
  command = "bash build.sh"
  publish = "dist"
  command_timeout = "30m"

[build.environment]
  NODE_VERSION = "20"
  MISE_PYTHON_COMPILE = "false"
  # Force Netlify/mise to use the system Python instead of installing a specific version
  PYTHON_VERSION = "system"

[[plugins]]
  package = "netlify-plugin-compress"
  [plugins.inputs]
    gzip = true
    brotli = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
