[build]
  # Ensure required toolchains are present before dependency installation
  command = "mise install && python -m pip install -r requirements.txt && npm ci && npm run build"
  publish = "dist"
  command_timeout = "30m"

[build.environment]
  NODE_VERSION = "20"
  PYTHON_VERSION = "3.11"
  # Allow mise to manage tools in CI
  NETLIFY_SKIP_INSTALL = "true"

[[plugins]]
  package = "netlify-plugin-compress"
  [plugins.inputs]
    gzip = true
    brotli = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
