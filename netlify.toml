# Next.js static export project. The build creates a static site in the 'out' folder.

[build]
  command = "yarn install && yarn build"
  publish = "out"
  base = "."

[build.environment]
  NODE_VERSION = "18"
  NODE_OPTIONS = "--max_old_space_size=6144"
  NETLIFY_NEXT_PLUGIN_SKIP = "true"
  CANONICAL_URL = "https://ziontechgroup.com"

# Fix MIME type issues
[[headers]]
  for = "/js/*"
  [headers.values]
    Content-Type = "application/javascript"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Content-Type = "text/css"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Content-Type = "application/javascript"

[[headers]]
  for = "*.css"
  [headers.values]
    Content-Type = "text/css"

[[headers]]
  for = "*.svg"
  [headers.values]
    Content-Type = "image/svg+xml"

[[headers]]
  for = "*.ico"
  [headers.values]
    Content-Type = "image/x-icon"

[[headers]]
  for = "*.png"
  [headers.values]
    Content-Type = "image/png"

[[headers]]
  for = "*.jpg"
  [headers.values]
    Content-Type = "image/jpeg"

[[headers]]
  for = "*.jpeg"
  [headers.values]
    Content-Type = "image/jpeg"

[[headers]]
  for = "*.gif"
  [headers.values]
    Content-Type = "image/gif"

[[headers]]
  for = "*.webp"
  [headers.values]
    Content-Type = "image/webp"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Content-Type = "application/javascript"

[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Content-Type = "application/javascript"

[[headers]]
  for = "/site.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"

# No Next.js plugin needed for static export

# Redirects for SEO/legacy URLs
[[redirects]]
  from = "/ai-autonomous-ecosystem"
  to = "/ai-autonomous-ecosystem-manager"
  status = 301

[[redirects]]
  from = "/autonomous-it-operations"
  to = "/autonomous-it-operations-center"
  status = 301

[[redirects]]
  from = "/quantum-internet-security"
  to = "/quantum-internet-security-platform"
  status = 301

[[redirects]]
  from = "/quantum-materials-discovery"
  to = "/quantum-materials-discovery-platform"
  status = 301

[[redirects]]
  from = "/autonomous-vehicle-ai"
  to = "/autonomous-vehicle-ai-platform"
  status = 301

[[redirects]]
  from = "/ai-content-marketing-automation"
  to = "/ai-content-generator"
  status = 301

[[redirects]]
  from = "/ai-customer-success-automation"
  to = "/ai-customer-success-platform"
  status = 301

[[redirects]]
  from = "/browser-automation-cloud/"
  to = "/browser-automation-cloud"
  status = 301

# Handle client-side routing for SPA (this is also in _redirects file)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200


