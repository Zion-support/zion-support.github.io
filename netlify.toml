[build]
  # Skip build; deploy prebuilt Next.js static export in out/
  command = "echo 'Skipping build; deploying prebuilt static export'"
  publish = "out"
  command_timeout = "30m"
  # Only run when files outside out/ change
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- . ':(exclude)out'"

[build.environment]
  NODE_VERSION = "20"
  PYTHON_VERSION = "3.11"
  # Avoid optional binary downloads (electron, playwright, cypress)
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD = "1"
  PUPPETEER_SKIP_DOWNLOAD = "1"
  CYPRESS_INSTALL_BINARY = "0"
  ELECTRON_SKIP_DOWNLOAD = "1"

# Attempt to disable Next.js plugin if installed via file-based config
[[plugins]]
  package = "@netlify/plugin-nextjs"
  enabled = false

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Set basic cache headers for static assets for better performance
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=300"
