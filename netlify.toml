[build]
  # Build command for Vite
  command = "npm run build"
  
  # Directory to publish (Vite output)
  publish = "dist"
  
  # Functions directory
  functions = "netlify/functions"
  
  # Processing settings for Vite builds
  processing = { skip_processing = false }

[build.environment]
  # Node.js version
  NODE_VERSION = "20"
  
  # Yarn version
  YARN_VERSION = "1.22.22"
  
  # Build environment
  NODE_OPTIONS = "--max-old-space-size=6144"
  NODE_ENV = "production"
  
  # Yarn configuration
  YARN_CACHE_FOLDER = "/opt/buildhome/.yarn_cache"
  YARN_ENABLE_IMMUTABLE_INSTALLS = "false"
  
  # Install devDependencies for build tools
  YARN_INSTALL_DEV = "true"
  
  # Ensure Vite is available
  NPM_CONFIG_LEGACY_PEER_DEPS = "true"
  
  # Vite-specific environment variables
  VITE_NODE_ENV = "production"

# Cache configuration for Vite builds
[build.cache]
  directories = [
    "node_modules/.cache",
    "node_modules/.vite"
  ]

# Plugin configurations
[[plugins]]
  package = "netlify-plugin-cloudinary"

# Static redirects for SPA routing (handled by _redirects file in dist/)
# The _redirects file in the dist directory will handle SPA routing

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache Vite assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache API routes
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Cache service worker
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"