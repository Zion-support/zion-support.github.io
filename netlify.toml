# Updated: bump timestamp to trigger Netlify deploy at 2025-09-18T00:00:00Z (refresh 2025-09-18T00:00:00Z-5)
[build]
  # Build Vite app at repository root and publish the dist folder
  command = "npm ci --no-audit --no-fund && npm run build:netlify"
  publish = "dist"
  command_timeout = "30m"
# No-op: trigger Netlify rebuild at 2025-09-18T00:00:00Z-5

[build.environment]
  NODE_VERSION = "20"
  NODE_OPTIONS = "--max-old-space-size=6144"
  NETLIFY_USE_NPM = "true"
  CANONICAL_URL = "https://ziontechgroup.com"
  GIT_SUBMODULE_STRATEGY = "none"
  NPM_CONFIG_LEGACY_PEER_DEPS = "true"
  NPM_CONFIG_STRICT_SSL = "false"
  NPM_CONFIG_BUILD_FROM_SOURCE = "false"
  NPM_CONFIG_PREFER_OFFLINE = "true"

## No Next.js plugin needed for Vite SPA

[functions]
  # Functions live at the repository root
  directory = "netlify/functions"
  node_bundler = "esbuild"
  included_files = ["public/**/*"]

[build.processing]
  skip_processing = true
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Content-Type = "application/javascript"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Content-Type = "text/css"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Content-Type = "application/javascript"

[[headers]]
  for = "*.css"
  [headers.values]
    Content-Type = "text/css"

[[headers]]
  for = "*.svg"
  [headers.values]
    Content-Type = "image/svg+xml"

[[headers]]
  for = "*.ico"
  [headers.values]
    Content-Type = "image/x-icon"

[[headers]]
  for = "*.png"
  [headers.values]
    Content-Type = "image/png"

[[headers]]
  for = "*.jpg"
  [headers.values]
    Content-Type = "image/jpeg"

[[headers]]
  for = "*.jpeg"
  [headers.values]
    Content-Type = "image/jpeg"

[[headers]]
  for = "*.gif"
  [headers.values]
    Content-Type = "image/gif"

[[headers]]
  for = "*.webp"
  [headers.values]
    Content-Type = "image/webp"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Content-Type = "application/javascript"

[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Content-Type = "application/javascript"

[[headers]]
  for = "/site.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    X-DNS-Prefetch-Control = "on"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy-Report-Only = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https: *.netlify.app *.netlify.com; style-src 'self' 'unsafe-inline' https: *.googleapis.com; img-src 'self' data: https:; font-src 'self' https: *.gstatic.com *.googleapis.com; connect-src 'self' https:; frame-ancestors 'none'; base-uri 'self'; object-src 'none'"

# Redirects for legacy URLs
[[redirects]]
  from = "/api/*"
  to = "https://backend.example.com/:splat"
  status = 200

