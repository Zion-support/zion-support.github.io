[build]
  command = "npm run export"
  publish = "out"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20.18.1"
  NPM_VERSION = "10.0.0"

# Scheduled functions for automation
[[scheduled.functions]]
  name = "ultrafast-orchestrator"
  schedule = "*/1 * * * *" # every minute

[[scheduled.functions]]
  name = "ultrafast-front-orchestrator"
  schedule = "*/5 * * * *" # every 5 minutes

[[scheduled.functions]]
  name = "unused-media-scanner"
  schedule = "0 */6 * * *" # every 6 hours

# Redirects for SPA routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-DNS-Prefetch-Control = "on"
    Content-Security-Policy = "default-src 'self'; object-src 'none'; upgrade-insecure-requests; script-src 'self' 'unsafe-inline' https://plausible.io; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://plausible.io; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"

[[redirects]]
  from = "/services/*"
  to = "/:splat"
  status = 301
  force = true
