[build]
  command = "pnpm install && pnpm run build"
  publish = ".next"

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "10"

[[plugins]]
  package = "netlify-plugin-cloudinary"

# Next.js routing - remove the catch-all redirect that conflicts with Next.js
# [[redirects]]
#   from = "/*"
#   to = "/index.html"
#   status = 200

[functions]
  node_bundler = "esbuild" 
