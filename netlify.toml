# This is a VITE project, NOT a Next.js project
# The build process uses Vite to create a static site in the 'dist' folder
# No Next.js plugins or configurations are needed

[build]
  # Use `yarn install` for deterministic installs, Vite builds to dist/
  command = "corepack disable && npm i -g yarn@1.22.22 && yarn cache clean && yarn install --frozen-lockfile && yarn build"
  publish = "dist"
  # Force static site build (not Next.js)
  functions = "netlify/functions"
  edge_functions = "netlify/edge-functions"
  # Explicitly specify this is a static site, not a framework
  base = "."

[build.environment]
  NODE_VERSION = "20"
  NODE_OPTIONS = "--max_old_space_size=6144"
  # Use npm for dependency management
  NPM_FLAGS = "--ignore-scripts"
  # Skip Netlify's Next.js plugin since this is a Vite static site
  NETLIFY_NEXT_PLUGIN_SKIP = "true"
  # Force Vite/static site detection
  NETLIFY_USE_YARN = "false"
  NETLIFY_USE_NPM = "true"
  # Disable framework detection
  NETLIFY_DISABLE_FRAMEWORK_DETECTION = "true"
  # Force static site build
  NETLIFY_FORCE_STATIC_BUILD = "true"
  # Skip all framework plugins
  NETLIFY_SKIP_FRAMEWORK_PLUGINS = "true"
  CANONICAL_URL = "https://ziontechgroup.com"

# Fix MIME type issues
[[headers]]
  for = "/js/*"
  [headers.values]
    Content-Type = "application/javascript"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Content-Type = "text/css"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Content-Type = "application/javascript"

[[headers]]
  for = "*.css"
  [headers.values]
    Content-Type = "text/css"

[[headers]]
  for = "*.svg"
  [headers.values]
    Content-Type = "image/svg+xml"

[[headers]]
  for = "*.ico"
  [headers.values]
    Content-Type = "image/x-icon"

[[headers]]
  for = "*.png"
  [headers.values]
    Content-Type = "image/png"

[[headers]]
  for = "*.jpg"
  [headers.values]
    Content-Type = "image/jpeg"

[[headers]]
  for = "*.jpeg"
  [headers.values]
    Content-Type = "image/jpeg"

[[headers]]
  for = "*.gif"
  [headers.values]
    Content-Type = "image/gif"

[[headers]]
  for = "*.webp"
  [headers.values]
    Content-Type = "image/webp"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Content-Type = "application/javascript"

[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Content-Type = "application/javascript"

[[headers]]
  for = "/site.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"

# Removed Next.js plugin since this is a Vite project

