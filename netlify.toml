[build]
  command = "npm ci && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NODE_OPTIONS = "--max_old_space_size=4096"
  NPM_FLAGS = "--prefer-offline"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Canonical redirects for previously broken internal URLs
[[redirects]]
  from = "/ai-content-marketing-automation"
  to = "/services"
  status = 301

[[redirects]]
  from = "/ai-consciousness-evolution"
  to = "/ai-consciousness-evolution-2029"
  status = 301

[[redirects]]
  from = "/ai-autonomous-ecosystem"
  to = "/2029-innovative-services-showcase"
  status = 301

[[redirects]]
  from = "/ai-ethics-governance"
  to = "/services"
  status = 301

[[redirects]]
  from = "/quantum-compliance-automation"
  to = "/quantum-secure-communication"
  status = 301

[[redirects]]
  from = "/quantum-network-security"
  to = "/quantum-secure-communication"
  status = 301

[[redirects]]
  from = "/quantum-identity-verification"
  to = "/quantum-secure-communication"
  status = 301

[[redirects]]
  from = "/blockchain-enterprise-platform"
  to = "/quantum-blockchain"
  status = 301

[[redirects]]
