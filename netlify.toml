[build]
  # Install Python dependencies first, then Node.js dependencies and build
  # Use python -m pip to avoid mise shim issues during Netlify dependency phase
  command = "python -m pip install -r requirements.txt && npm ci && npm run build"
  publish = "dist"
  command_timeout = "30m"

[build.environment]
  NODE_VERSION = "20"
  MISE_PYTHON_COMPILE = "false"
  # Trust repo's mise config and pin Python used by mise shim
  MISE_TRUSTED_CONFIG = "1"
  MISE_TOOL_VERSIONS__python = "3.11.9"

[[plugins]]
  package = "netlify-plugin-compress"
  [plugins.inputs]
    gzip = true
    brotli = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
