[build]
  # Build the Vite project on Netlify
  command = "npm ci --no-audit --no-fund && npm run build"
  publish = "dist"
  functions = "netlify/functions"
  command_timeout = "30m"

[build.environment]
  NODE_VERSION = "20"
  PYTHON_VERSION = "3.11"

[context.production.environment]
  NODE_ENV = "production"

[context.deploy-preview]
  command = "npm ci --no-audit --no-fund && npm run build"

[context.branch-deploy]
  command = "npm ci --no-audit --no-fund && npm run build"

# Vite/React SPA configuration
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Set basic cache headers for static assets for better performance
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=300"
