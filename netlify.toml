[build]
  command = "pnpm install && pnpm run build"
  publish = "out"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  NODE_OPTIONS = "--max_old_space_size=6144"
  # Use npm for dependency management - force npm usage
  NPM_FLAGS = "--ignore-scripts"
  # Explicitly disable Yarn and force npm
  NETLIFY_USE_YARN = "false"
  NETLIFY_USE_NPM = "true"
  # Disable framework detection
  NETLIFY_DISABLE_FRAMEWORK_DETECTION = "true"
  # Force static site build
  NETLIFY_FORCE_STATIC_BUILD = "true"
  # Skip all framework plugins
  NETLIFY_SKIP_FRAMEWORK_PLUGINS = "true"
  # Additional npm-specific configurations
  NPM_CONFIG_PACKAGE_LOCK_ONLY = "true"
  NPM_CONFIG_AUDIT = "false"
  NPM_CONFIG_FUND = "false"
  # Force npm to be the only package manager
  YARN_IGNORE_PATH = "true"
  YARN_IGNORE_NODE = "true"
  # Skip Netlify's Next.js plugin since this is a Vite static site
  NETLIFY_NEXT_PLUGIN_SKIP = "true"
  CANONICAL_URL = "https://ziontechgroup.com"

[[plugins]]
  package = "@netlify/plugin-nextjs"

