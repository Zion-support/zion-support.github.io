[build]
  # Skip build on Netlify; deploy prebuilt Vite output
  command = "echo 'Skipping build: deploying prebuilt dist'"
  publish = "dist"
  functions = "netlify/functions"
  command_timeout = "30m"
  # Only run when files outside dist/ change
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- . ':(exclude)dist'"

[build.environment]
  NODE_VERSION = "20"
  PYTHON_VERSION = "3.11"
  # Force Netlify to use npm even if yarn.lock exists to avoid Yarn v1 resolution issues
  NETLIFY_USE_YARN = "false"
  # Speed up npm install and reduce noise
  NPM_FLAGS = "--no-audit --no-fund"
  # Avoid optional binary downloads (electron, playwright, cypress)
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD = "1"
  PUPPETEER_SKIP_DOWNLOAD = "1"
  CYPRESS_INSTALL_BINARY = "0"
  ELECTRON_SKIP_DOWNLOAD = "1"



[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Set basic cache headers for static assets for better performance
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=300"
