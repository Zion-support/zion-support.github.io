# Netlify rebuild trigger (minor comment touch to force deploy)
[build]
  # Build the Vite React project on Netlify
  # Minor comment change to trigger Netlify redeploy - 2025-09-09
  command = "npm ci --no-audit --no-fund && npm run build"
  publish = "dist"
  functions = "netlify/functions"
  command_timeout = "30m"
  # Skip TypeScript checking during build

# Trigger: trivial edit to confirm Netlify picks up config and rebuilds

[build.environment]
  NODE_VERSION = "20.18.1"
  SKIP_TYPE_CHECK = "true"

# Headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Strict-Transport-Security = "max-age=31536000"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' plausible.io; connect-src 'self' plausible.io; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/logos/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# SPA fallback - this should be the last redirect rule
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Functions
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Essential scheduled functions only
[[scheduled.functions]]
  name = "health"
  schedule = "*/5 * * * *" # every 5 minutes for health checks

[context.production.environment]
  NODE_ENV = "production"

[context.deploy-preview]
  command = "npm ci --no-audit --no-fund && npm run build"

[context.branch-deploy]
  command = "npm ci --no-audit --no-fund && npm run build"

# Vite/React SPA configuration - SPA fallback for all routes
# Note: SPA fallback is handled in _redirects file to avoid conflicts

# Set basic cache headers for static assets for better performance
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=300"
