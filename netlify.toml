[build]
  # Use prebuilt static site in 'out' to avoid broken build step
  command = "echo Using prebuilt out directory"
  publish = "out"
  functions = "netlify/functions"
  command_timeout = "30m"

[build.environment]
  NODE_VERSION = "20"
  PYTHON_VERSION = "3.11"
  NETLIFY_SKIP_INSTALL = "true"


[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
