[build]
  # Skip heavy build; install minimal Node deps non-interactively and deploy prebuilt dist
  command = "npm ci --ignore-scripts --omit=optional || npm install --ignore-scripts --omit=optional"
  publish = "dist"
  command_timeout = "30m"

[build.environment]
  NODE_VERSION = "20"
  NETLIFY_SKIP_INSTALL = "true"
  # Avoid optional binary downloads (electron, playwright, cypress)
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD = "1"
  PUPPETEER_SKIP_DOWNLOAD = "1"
  CYPRESS_INSTALL_BINARY = "0"
  ELECTRON_SKIP_DOWNLOAD = "1"

[[plugins]]
  package = "netlify-plugin-compress"
  [plugins.inputs]
    gzip = true
    brotli = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
