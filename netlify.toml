[build]
  # Pre-build command to handle dependencies
  command = "bash scripts/netlify-pre-build.sh && npm run build"
  
  # Directory to publish
  publish = "dist"
  
  # Functions directory
  functions = "netlify/functions"

[build.environment]
  # Node.js version
  NODE_VERSION = "20"
  
  # Build environment
  NODE_OPTIONS = "--max-old-space-size=6144"
  NODE_ENV = "production"
  
  # Yarn configuration - optimized for reliable builds
  YARN_CACHE_FOLDER = "/opt/buildhome/.yarn_cache"
  YARN_ENABLE_IMMUTABLE_INSTALLS = "false"
  YARN_NETWORK_TIMEOUT = "1000000"
  YARN_PREFER_OFFLINE = "true"
  YARN_IGNORE_ENGINES = "true"
  YARN_IGNORE_PLATFORM = "true"
  
  # Install devDependencies for build tools
  YARN_INSTALL_DEV = "true"
  
  # Force install all dependencies including devDependencies
  NPM_CONFIG_INCLUDE = "dev"
  
  # Ensure Vite is available and handle peer dependencies
  NPM_CONFIG_LEGACY_PEER_DEPS = "true"
  NPM_CONFIG_AUDIT = "false"
  NPM_CONFIG_FUND = "false"
  NPM_CONFIG_FORCE = "true"
  
  # Disable Next.js auto-detection since this is a Vite project
  NETLIFY_USE_NEXTJS = "false"
  NETLIFY_NEXT_PLUGIN_SKIP = "true"
  NETLIFY_USE_NEXT_PLUGIN = "false"
  
  # Additional build optimizations
  CI = "true"
  GENERATE_SOURCEMAP = "false"

# Cache configuration to prevent dependency issues
[build.cache]
  directories = ["node_modules/.cache", ".yarn/cache"]

# Alternative build configuration for fallback
[build.processing]
  skip_processing = false

# Disable problematic features that can cause EEXIST errors
[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

# Ignore files that might cause conflicts
[[build.ignore]]
  path = "package-lock.json"

[[build.ignore]]
  path = "node_modules/.yarn-integrity"

# Plugin configurations
[[plugins]]
  package = "netlify-plugin-cloudinary"

# Force Vite build detection

# Static redirects for exported site
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache static assets
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache API routes
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"