# Netlify build configuration (resolved)
[build]
  command = "npm ci --no-audit --no-fund --include=optional && npm run build"
  publish = ".next"
  functions = "netlify/functions"
  command_timeout = "30m"

  [build.environment]
    NODE_VERSION = "20.19.0"
    NODE_OPTIONS = "--max-old-space-size=6144"
    SKIP_TYPE_CHECK = "true"
    NPM_CONFIG_PRODUCTION = "false"
    NPM_FLAGS = "--include=dev --include=optional"
    NPM_CONFIG_OPTIONAL = "true"
    NETLIFY_NEXT_PLUGIN_SKIP = "false"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Strict-Transport-Security = "max-age=31536000"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' plausible.io; connect-src 'self' plausible.io; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"

# Static assets caching
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/image/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/logos/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[scheduled.functions]]
  name = "health"
  schedule = "*/5 * * * *"

[context.production.environment]
  NODE_ENV = "production"
  NPM_CONFIG_PRODUCTION = "false"

[context.deploy-preview]
  command = "npm ci --no-audit --no-fund --include=optional && npm run build"

[context.branch-deploy]
  command = "npm ci --no-audit --no-fund --include=optional && npm run build"
