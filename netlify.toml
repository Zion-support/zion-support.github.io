# Netlify configuration for Vite app

[build]
  command = "npm ci --no-audit --no-fund && npm run build:netlify"
  publish = "dist"
  base = "."
  command_timeout = "30m"

[build.environment]
  NODE_VERSION = "20"
  NODE_OPTIONS = "--max-old-space-size=6144"
  NETLIFY_USE_NPM = "true"
  CANONICAL_URL = "https://ziontechgroup.com"
  GIT_SUBMODULE_STRATEGY = "none"
  NPM_CONFIG_LEGACY_PEER_DEPS = "true"
  NPM_CONFIG_STRICT_SSL = "false"
  NPM_CONFIG_BUILD_FROM_SOURCE = "false"
  NPM_CONFIG_PREFER_OFFLINE = "true"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  included_files = ["public/**/*"]

[build.processing]
  skip_processing = true

[[headers]]
  for = "/js/*"
  [headers.values]
    Content-Type = "application/javascript"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Content-Type = "text/css"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# SPA fallback for client-side routing (must be last)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
