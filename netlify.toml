[build]
  # Use Yarn with frozen lockfile to ensure reproducible installs, then build
  command = "corepack enable && yarn install --frozen-lockfile && yarn build"
  publish = "dist"
  command_timeout = "30m"

[build.environment]
  NODE_VERSION = "20"
  # Disable Netlify's auto dependency installers; we handle installs in the build command
  NETLIFY_SKIP_INSTALL = "true"

[[plugins]]
  package = "netlify-plugin-compress"
  [plugins.inputs]
    gzip = true
    brotli = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
