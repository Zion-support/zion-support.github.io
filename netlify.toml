[[redirects]]
  from = "/api/*"
  to = "https://backend.example.com/:splat"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://unpkg.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https: wss:; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self';"
    X-DNS-Prefetch-Control = "on"
    Cross-Origin-Embedder-Policy = "require-corp"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Vary = "Accept-Encoding"
    X-Content-Type-Options = "nosniff"

# Cache HTML files
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Cache service worker
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Service-Worker-Allowed = "/"
 
[build]
  command = "pnpm install --frozen-lockfile && pnpm run build:no-check"
  publish = "dist"
  command_timeout = "30m"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22.16.0"
  PNPM_VERSION = "10.17.1"
  NETLIFY_USE_PNPM = "true"
  # Disable Next.js auto-detection
  NETLIFY_NEXT_PLUGIN_SKIP = "true"
  # Ensure clean installs
  NPM_CONFIG_PRODUCTION = "false"
  NODE_ENV = "production"
  # Optimize build performance
  CI = "true"
  # Enable build optimizations
  VITE_BUILD_OPTIMIZE = "true"
  # Disable telemetry
  VITE_TELEMETRY_DISABLED = "true"

# Explicitly disable Netlify post-processing to avoid transform issues
[build.processing]
  skip_processing = true

# Remove custom plugins that may cause build failures
# (Cloudinary plugin disabled)
# [[plugins]]
#   package = "netlify-plugin-cloudinary"
#   [plugins.inputs]

# Disable Next.js plugin since we're using Vite
[[plugins]]
  package = "@netlify/plugin-nextjs"
  [plugins.inputs]
    disable = true

[context.production.environment]
  NODE_ENV = "production"
  NPM_CONFIG_PRODUCTION = "false"

[context.deploy-preview]
  command = "pnpm build"
  [context.deploy-preview.environment]
    NODE_ENV = "production"

[context.branch-deploy]
  command = "pnpm build"
  [context.branch-deploy.environment]
    NODE_ENV = "production"
