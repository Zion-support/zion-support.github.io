[build]
  # Build the Vite project on Netlify
  command = "npm ci --no-audit --no-fund && npm run build"
  publish = "dist"
  functions = "netlify/functions"
  command_timeout = "30m"

[build.environment]
  NODE_VERSION = "20"
  PYTHON_VERSION = "3.11"
  NPM_FLAGS = "--legacy-peer-deps"
  # Skip the Next.js plugin when deploying a prebuilt static dist
  NETLIFY_NEXT_PLUGIN_SKIP = "true"

# Headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Strict-Transport-Security = "max-age=31536000"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' plausible.io; connect-src 'self' plausible.io; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/logos/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Redirects
[[redirects]]
  from = "/services"
  to = "/services"
  status = 200

[[redirects]]
  from = "/about"
  to = "/about"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/contact"
  status = 200

[[redirects]]
  from = "/blog"
  to = "/blog"
  status = 200

[[redirects]]
  from = "/talent"
  to = "/talent"
  status = 200

[[redirects]]
  from = "/autonomy"
  to = "/autonomy"
  status = 200

[[redirects]]
  from = "/products"
  to = "/products"
  status = 200

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Functions
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Scheduled functions
[[plugins]]
  package = "@netlify/plugin-scheduled-functions"

[plugins.inputs]
  # Daily automation functions
  daily_functions = [
    "a11y_audit",
    "cache_headers_audit", 
    "canonical_audit",
    "content_freshness",
    "deps_vuln_audit",
    "external_link_audit",
    "image_audit",
    "link_audit",
    "og_image_audit",
    "perf_audit",
    "redirects_audit",
    "robots_enforcer",
    "rss_health",
    "security_headers_audit",
    "seo_audit",
    "sitemap_integrity",
    "sitemap_refresh",
    "structured_data_audit",
    "uptime_synthetic"
  ]
  
  # Hourly automation functions
  hourly_functions = [
    "auto_marketing",
    "changelog_digest",
    "newsletter_digest"
  ]

# Edge functions
[[edge_functions]]
