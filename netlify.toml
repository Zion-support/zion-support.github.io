[build]
  # Use `npm ci` for deterministic installs
  # Generate Prisma client before building to ensure models are up to date
  command = "npm run build:netlify:prepare"
  # Netlify UI sets `publish` to `out` which causes the Next.js plugin to fail
  # because no exported directory exists. Explicitly publish the `.next`
  # directory so the plugin can run correctly.
  publish = ".next"
  # Increase build timeout for 176+ pages
  command_timeout = "30m"

[build.environment]
  NODE_VERSION = "22.18.0"
  NEXT_PUBLIC_SITE_URL = "https://ziontechgroup.com"

# [[plugins]]
#   package = "@netlify/plugin-nextjs"

[[plugins]]
  package = "netlify-plugin-cloudinary"

# Scheduled Functions (new automations replacing some GitHub Actions cadence)
[[scheduled.functions]]
  name = "homepage_advertiser"
  schedule = "*/1 * * * *" # every minute

[[headers]]
  for = "/_next/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[scheduled.functions]]
  name = "front-enhancer"
  schedule = "*/1 * * * *" # every minute

[[scheduled.functions]]
  name = "frontpage-enhancer"
  schedule = "*/1 * * * *" # every minute

[[scheduled.functions]]
  name = "marketing-and-features-promo"
  schedule = "*/15 * * * *" # every 15 minutes

[[redirects]]
  from = "/services/ai-customer-success-platform"
  to = "/ai-customer-success-platform/"
  status = 301
  force = true

[[redirects]]
  from = "/services/intelligent-supply-chain-optimization"
  to = "/intelligent-supply-chain-optimization/"
  status = 301
  force = true

[[scheduled.functions]]
  name = "fast-front-promoter"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
  schedule = "*/1 * * * *" # every minute

[[scheduled.functions]]
  name = "hyper-front-runner"
  schedule = "*/1 * * * *" # every minute
=======
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-DNS-Prefetch-Control = "on"
    # Allow Next static, plausible, and same-origin assets
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://plausible.io; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://plausible.io https://*.plausible.io; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
