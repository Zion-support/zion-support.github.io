[build]
  # Skip build and publish prebuilt static files in dist
  command = "echo Skipping build; using prebuilt dist"
  publish = "dist"
  command_timeout = "30m"

[build.environment]
  NODE_VERSION = "20"

# Keep the config minimal to avoid plugin-related build failures

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Set basic cache headers for static assets for better performance
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=300"
