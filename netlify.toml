[build]
  # Skip build on Netlify; deploy prebuilt Vite output
  command = "echo 'Skipping build: deploying prebuilt dist'"
  publish = "dist"
  command_timeout = "30m"
  # Only run when files outside dist/ change
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- . ':(exclude)dist'"

[build.environment]
  NODE_VERSION = "20"
  PYTHON_VERSION = "3.11"
  # Avoid optional binary downloads (electron, playwright, cypress)
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD = "1"
  PUPPETEER_SKIP_DOWNLOAD = "1"
  CYPRESS_INSTALL_BINARY = "0"
  ELECTRON_SKIP_DOWNLOAD = "1"

# Attempt to disable Next.js plugin if installed via file-based config
[[plugins]]
  package = "@netlify/plugin-nextjs"
  pinned_version = "5"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Set basic cache headers for static assets for better performance
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=300"
