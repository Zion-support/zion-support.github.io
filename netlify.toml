[build]
  # Build command
  command = "npm run build"
  
  # Directory to publish
  publish = "dist"
  
  # Functions directory
  functions = "netlify/functions"

[build.environment]
  # Node.js version
  NODE_VERSION = "20"
  
  # Yarn version
  YARN_VERSION = "1.22.22"
  
  # Build environment
  NODE_OPTIONS = "--max-old-space-size=6144"
  NODE_ENV = "production"
  
  # Yarn configuration
  YARN_CACHE_FOLDER = "/opt/buildhome/.yarn_cache"
  YARN_ENABLE_IMMUTABLE_INSTALLS = "false"
  
  # Install devDependencies for build tools
  YARN_INSTALL_DEV = "true"
  
  # Ensure Vite is available
  NPM_CONFIG_LEGACY_PEER_DEPS = "true"
  
  # Vite-specific environment variables
  VITE_BUILD = "true"
  SKIP_REACT_VERSION_CHECK = "true"

# Cache configuration to prevent dependency issues
[build.cache]
  directories = ["node_modules/.cache"]

# Plugin configurations
[[plugins]]
  package = "netlify-plugin-cloudinary"

# Note: This is a Vite-based project, not Next.js
# The @netlify/plugin-nextjs should be disabled in Netlify UI if present

# Static redirects for exported site
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache static assets
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache Vite assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache API routes
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"