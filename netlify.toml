[build]
  # Build the project on Netlify
  command = "npm ci && npm run build"
  publish = "dist"
  functions = "netlify/functions"
  command_timeout = "30m"

[build.environment]
  NODE_VERSION = "20"
  PYTHON_VERSION = "3.11"
  NPM_FLAGS = "--omit=optional"


# Next.js plugin is disabled via UI for prebuilt static deploys



[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Set basic cache headers for static assets for better performance
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=300"
