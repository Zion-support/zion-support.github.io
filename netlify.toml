[build]
  # Temporary: skip building and publish existing dist to unblock Netlify deploy
  command = "/usr/bin/env bash -lc 'echo Skipping build on Netlify; true'"
  publish = "dist"
  command_timeout = "30m"

[build.environment]
  NODE_VERSION = "20"
  PYTHON_VERSION = "3.11"
  # Skip Netlify auto installers; rely on build command
  NETLIFY_SKIP_INSTALL = "true"
  # Explicitly disable the Next.js Netlify plugin/runtime for this Vite SPA
  NETLIFY_NEXT_PLUGIN_SKIP = "true"
  # Disable mise shims entirely during Netlify builds
  MISE_DISABLE = "1"
  MISE_SHIMS = "0"
  # Force mise to use system Python even during Netlify's dependency stage (defensive)
  MISE_TOOL_VERSIONS__python = "system"
  # Skip Electron binary downloads during install to prevent build failures
  ELECTRON_SKIP_DOWNLOAD = "1"

## Plugins removed to avoid extra dependency installation during Netlify build
## Ensure Netlify UI does not inject Next.js runtime for this site
# [[plugins]]
#   package = "@netlify/plugin-nextjs"
#   enabled = false

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Set basic cache headers for static assets for better performance
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=300"
