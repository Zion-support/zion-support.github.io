# Netlify build configuration (resolved)
[build]
  command = "npm ci --no-audit --no-fund --include=optional && npm run build"
  publish = ".next"
  functions = "netlify/functions"
  command_timeout = "30m"

[build.environment]
  NODE_VERSION = "22.12.0"
  NODE_OPTIONS = "--max-old-space-size=6144"
  SKIP_TYPE_CHECK = "true"
  NPM_CONFIG_PRODUCTION = "false"
  NPM_FLAGS = "--include=dev --include=optional"
  NPM_CONFIG_OPTIONAL = "true"
  NETLIFY_NEXT_PLUGIN_SKIP = "false"
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME"
  # Skip Sharp postinstall to avoid NAPI issues
  SHARP_IGNORE_GLOBAL_LIBVIPS = "1"
  SHARP_DIST_BASE_URL = "https://github.com/lovell/sharp-libvips/releases/download/v1.2.0/"
  # Ensure proper build environment
  NODE_ENV = "production"
  CI = "true"
  # Disable linting during build to prevent failures
  ESLINT_NO_DEV_ERRORS = "true"

