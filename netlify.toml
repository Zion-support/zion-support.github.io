[build]
  # Use prebuilt static site to avoid CI build failures
  command = "echo 'Skipping build; using prebuilt out/ directory'"
  publish = "out"
  functions = "netlify/functions"
  command_timeout = "30m"

[build.environment]
  NODE_VERSION = "20"
  PYTHON_VERSION = "3.11"
  NPM_FLAGS = "--legacy-peer-deps"

[context.production.environment]
  NODE_ENV = "production"

[context.deploy-preview]
  command = "echo 'Skipping build; using prebuilt out/ directory'"

[context.branch-deploy]
  command = "echo 'Skipping build; using prebuilt out/ directory'"

# Vite/React SPA configuration
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Set basic cache headers for static assets for better performance
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=300"
