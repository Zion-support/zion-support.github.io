[build]
  # Build the project on Netlify
  command = "echo 'Skipping build: deploying prebuilt dist'"
  publish = "dist"
  functions = "netlify/functions"
  command_timeout = "10m"

[build.environment]
  NODE_VERSION = "20"
  PYTHON_VERSION = "3.11"
  NPM_FLAGS = "--omit=optional"
  # Skip the Next.js plugin when deploying a prebuilt static dist
  NETLIFY_NEXT_PLUGIN_SKIP = "true"
  # Optimize function packaging
  NETLIFY_FUNCTIONS_TIMEOUT = "10"
  NETLIFY_FUNCTIONS_MEMORY = "1024"


# Next.js plugin is disabled via UI for prebuilt static deploys



[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Set basic cache headers for static assets for better performance
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=300"
