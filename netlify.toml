[build]
  # Deterministic install and build for Next static export
  command = "npm ci && npm run export"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"
  NODE_OPTIONS = "--max_old_space_size=4096"
  NPM_FLAGS = "--prefer-offline"

# Use Next.js Netlify plugin for optimal handling
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Static redirects for exported site (since Next redirects don't apply to export)
[[redirects]]
  from = "/ai-customer-success-platform"
  to = "/services/ai-customer-success-platform/"
  status = 301

