[build]
  # Use build script with fallback Python handling
  command = "bash build.sh"
  publish = "dist"
  command_timeout = "30m"

[build.environment]
  NODE_VERSION = "18"
  PYTHON_VERSION = "3.10.12"

[[plugins]]
  package = "netlify-plugin-compress"
  [plugins.inputs]
    gzip = true
    brotli = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
# Netlify configuration - clean version without merge conflicts
