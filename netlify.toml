[build]
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  NODE_OPTIONS = "--max-old-space-size=6144 --openssl-legacy-provider"
  NETLIFY_NEXT_PLUGIN_SKIP = "true"

# SPA routing redirects for Vite
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[plugins]]
  package = "netlify-plugin-cloudinary"

[[redirects]]
  from = "/quantum-internet-security-platform"
  to = "/quantum-internet-security"
  status = 301

[[redirects]]
  from = "/ai-legal-contract-analyzer"
  to = "/ai-legal-analysis"
  status = 301

[[redirects]]
  from = "/ai-cybersecurity-suite"
  to = "/ai-cybersecurity"
  status = 301

[[redirects]]
  from = "/iot-edge-computing-orchestration"
  to = "/edge-computing-orchestration"
  status = 301

[[redirects]]
  from = "/ai-agents"
  to = "/ai-services"
  status = 301